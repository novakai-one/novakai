<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>flowmap · unfold</title>
<!-- SANDBOX. Self-contained (index.html + hierarchy.json). Delete sandbox/unfold/ to remove
     everything; touches no other file, outside tsconfig+build, cannot break the app.
     Reads the LIVE maps at runtime (root.mmd + _bundle.mmd + root-tools.mmd + _tooling.mmd) and
     public/bodies.json. Serve on the dev server: /sandbox/unfold/

     THESIS. The whole codebase is ONE folded organism. You arrive to two things — a spatial
     editor and its tooling — and nothing else. 95% is folded away. You UNFOLD, in place, only
     what you want to understand; everything else stays quiet. Detail is opt-in, never pushed.
     You cannot get lost: the canvas always reframes to hold exactly what is unfolded.

     VISUAL. Warm paper, graphite ink, one muted slate accent. Hairlines, whitespace, stillness.
     No neon, no grid, no decoration that isn't information. Light by default; a soft dark on tap. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    /* light — warm paper + graphite ink + one muted slate */
    --bg:#f3f1ec; --stage:#f6f4ef; --surface:#ffffff; --surface-2:#faf8f3;
    --line:#e6e2d9; --line-soft:#efece4; --line-hair:#f1eee7;
    --ink:#33322e; --ink-2:#605c54; --dim:#948f84; --faint:#bbb4a7;
    --accent:#4a6b8a; --accent-ink:#31506c; --accent-soft:rgba(74,107,138,.10); --accent-line:rgba(74,107,138,.32);
    /* region + kind hues (only applied when the Colour layer is on) */
    --hue-app:#4a6b8a; --hue-tooling:#94734a;
    --k-type:#7c6aa8; --k-function:#4a6b8a; --k-module:#4a8a72; --k-store:#a8824a; --k-class:#a85a6a;
    --shadow:0 1px 2px rgba(40,36,30,.04), 0 6px 20px rgba(40,36,30,.05);
    --shadow-lift:0 2px 6px rgba(40,36,30,.07), 0 14px 40px rgba(40,36,30,.09);
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  body.dark{
    --bg:#131315; --stage:#161618; --surface:#1c1c1f; --surface-2:#212125;
    --line:#2b2b30; --line-soft:#242428; --line-hair:#202024;
    --ink:#e7e4dd; --ink-2:#b4afa5; --dim:#8b867c; --faint:#5c584f;
    --accent:#82a8cc; --accent-ink:#a9c6e2; --accent-soft:rgba(130,168,204,.12); --accent-line:rgba(130,168,204,.34);
    --hue-app:#82a8cc; --hue-tooling:#c7a06a;
    --k-type:#b09bd8; --k-function:#82a8cc; --k-module:#77c2a2; --k-store:#d0a862; --k-class:#d68a9a;
    --shadow:0 1px 2px rgba(0,0,0,.30), 0 8px 26px rgba(0,0,0,.34);
    --shadow-lift:0 2px 8px rgba(0,0,0,.40), 0 18px 48px rgba(0,0,0,.46);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font:14px/1.55 'Inter',-apple-system,BlinkMacSystemFont,ui-sans-serif,system-ui;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .mono{font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px;border:3px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:var(--faint);background-clip:padding-box}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:3px}

  /* ---- shell ---- */
  header{display:flex;align-items:center;gap:16px;height:52px;padding:0 20px;
    border-bottom:1px solid var(--line);background:var(--bg);position:relative;z-index:40}
  .brand{font-weight:600;letter-spacing:-.01em;font-size:15px;color:var(--ink)}
  .brand b{color:var(--accent);font-weight:600}
  .brand .sub{color:var(--faint);font-weight:400;margin-left:9px;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
  .sp{flex:1}
  .hbtn{display:flex;align-items:center;gap:7px;height:32px;padding:0 12px;border:1px solid var(--line);border-radius:7px;
    color:var(--ink-2);background:var(--surface);font-size:12.5px;transition:border-color .15s,color .15s,background .15s}
  .hbtn:hover{color:var(--ink);border-color:var(--faint)}
  .hbtn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  .hbtn.icon{padding:0;width:32px;justify-content:center}

  #body{position:absolute;top:52px;bottom:0;left:0;right:0;display:flex}
  #stage{position:relative;flex:1;overflow:hidden;cursor:grab;background:var(--stage)}
  #stage.grab{cursor:grabbing}
  #world{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
  #world.animate{transition:transform .42s var(--ease)}
  #wires{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
  #content{position:relative}
  .booting{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:13px}

  /* ---- floating stage chrome ---- */
  #dock{position:absolute;left:16px;bottom:16px;display:flex;gap:6px;z-index:20}
  #dock button{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);
    border-radius:8px;background:var(--surface);color:var(--ink-2);box-shadow:var(--shadow);transition:color .15s,border-color .15s}
  #dock button:hover{color:var(--ink);border-color:var(--faint)}
  #dock svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  #hint{position:absolute;left:0;right:0;bottom:18px;text-align:center;z-index:15;pointer-events:none;
    color:var(--faint);font-size:12px;letter-spacing:.02em;transition:opacity .5s}
  #hint b{color:var(--dim);font-weight:500}

  /* ---- containers (unfolded regions/groups) — quiet zones, not boxes that shout ---- */
  .node{position:relative}
  .grp{border:1px solid var(--line);border-radius:12px;background:var(--surface-2);
    padding:14px;flex:none;transition:border-color .18s,box-shadow .18s,background .18s}
  .grp>.ghead{display:flex;align-items:center;gap:9px;padding:2px 4px 12px;cursor:pointer;user-select:none}
  .grp>.ghead .tw{width:15px;height:15px;flex:none;display:flex;align-items:center;justify-content:center;color:var(--faint);transition:transform .2s var(--ease),color .15s}
  .grp>.ghead .tw svg{width:9px;height:9px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .grp.open>.ghead .tw{transform:rotate(90deg)}
  .grp>.ghead:hover .tw{color:var(--dim)}
  .grp>.ghead .gname{font-weight:500;font-size:12px;letter-spacing:.10em;text-transform:uppercase;color:var(--ink-2)}
  .grp>.ghead .gcount{color:var(--faint);font-size:11px;font-family:'IBM Plex Mono',monospace;margin-left:auto}
  .grp>.ghead .grail{width:0;height:0}
  .gbody{display:flex;gap:16px;align-items:flex-start}
  .grp.col>.gbody{flex-direction:column}
  .grp.row>.gbody{flex-direction:row;flex-wrap:wrap}
  .grp.leaf>.gbody{flex-direction:row;flex-wrap:wrap;gap:12px}
  body.compact .grp{padding:10px}
  body.compact .gbody{gap:11px}

  /* region = the two top zones. bigger radius, a hair more presence, its hue rail when colour is on */
  .grp.region{border-radius:16px;background:var(--surface);box-shadow:var(--shadow)}
  .grp.region>.ghead{padding-bottom:14px}
  .grp.region>.ghead .gname{font-size:12.5px;letter-spacing:.14em;color:var(--ink)}
  body.color .grp.region{border-color:color-mix(in srgb,var(--rc) 34%,var(--line))}
  body.color .grp.region>.ghead .gname{color:var(--rc)}
  body.color .grp.region>.ghead .tw{color:color-mix(in srgb,var(--rc) 60%,var(--faint))}

  /* ---- cards (folded things: modules, subsystems, symbols) ---- */
  .card{position:relative;border:1px solid var(--line);border-radius:10px;background:var(--surface);
    padding:12px 14px;cursor:pointer;min-width:150px;max-width:230px;flex:none;box-shadow:var(--shadow);
    transition:border-color .16s,box-shadow .16s,transform .16s,opacity .18s}
  .card:hover{border-color:var(--faint);box-shadow:var(--shadow-lift);transform:translateY(-1px)}
  .card .crow{display:flex;align-items:center;gap:9px}
  .card .dot{width:6px;height:6px;border-radius:50%;flex:none;background:var(--faint)}
  body.color .card .dot{background:var(--kc,var(--faint))}
  .card .cname{font-weight:500;font-size:13.5px;letter-spacing:-.005em;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card.sym .cname{font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:500}
  .card .cmeta{color:var(--faint);font-size:10.5px;font-family:'IBM Plex Mono',monospace;margin-top:5px;letter-spacing:.02em}
  .card .cdesc{color:var(--ink-2);font-size:11.5px;line-height:1.5;margin-top:7px;
    display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .unfold{position:absolute;top:0;right:0;width:26px;height:100%;display:flex;align-items:center;justify-content:center;
    color:var(--faint);opacity:0;transition:opacity .15s,color .15s}
  .card:hover .unfold{opacity:1}
  .card .unfold:hover{color:var(--accent)}
  .card .unfold svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .card.can-unfold{padding-right:26px}
  .card.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),var(--shadow-lift)}
  .card.nbr{border-color:var(--accent-line)}
  .card.dim{opacity:.32}
  .card.hub::after{content:'';position:absolute;top:11px;right:11px;width:5px;height:5px;border-radius:50%;background:var(--k-store);opacity:.9}
  .card.can-unfold.hub::after{right:30px}
  body:not(.metrics) .card .cmeta{display:none}
  body:not(.metrics) .card.hub::after{display:none}
  body:not(.desc) .card .cdesc{display:none}

  /* symbol card interface (opt-in) */
  .iface{margin-top:9px;border-top:1px solid var(--line-hair);padding-top:8px}
  .iface .ilab{color:var(--faint);font-size:8.5px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;font-family:'IBM Plex Mono',monospace}
  .iface .irow{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-2);margin:3px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:250px}
  .iface .vn{color:var(--dim)}
  .card.sym{max-width:280px}
  body.iface .card.sym{min-width:230px}
  body:not(.iface) .card .iface{display:none}

  /* ---- side panel ---- */
  aside#panel{width:340px;flex:none;border-left:1px solid var(--line);background:var(--bg);overflow-y:auto;overflow-x:hidden;z-index:30}
  #panel .sec{border-bottom:1px solid var(--line)}
  #panel .sec-h{display:flex;align-items:center;gap:8px;padding:14px 18px 6px;color:var(--dim);
    font-size:10.5px;font-weight:600;letter-spacing:.13em;text-transform:uppercase}
  #panel .sec-h .n{margin-left:auto;color:var(--faint);font-family:'IBM Plex Mono',monospace;letter-spacing:.02em;font-weight:400}
  #panel .sec-b{padding:4px 12px 16px}

  /* layer toggles */
  .layers{display:flex;flex-direction:column;gap:1px}
  .layer{display:flex;align-items:center;gap:11px;padding:9px 6px;border-radius:8px;cursor:pointer;transition:background .12s}
  .layer:hover{background:var(--surface-2)}
  .layer .sw{width:30px;height:18px;border-radius:10px;background:var(--line);position:relative;flex:none;transition:background .18s}
  .layer .sw::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--surface);
    box-shadow:0 1px 2px rgba(0,0,0,.18);transition:transform .2s var(--ease)}
  .layer.on .sw{background:var(--accent)}
  .layer.on .sw::after{transform:translateX(12px)}
  .layer .lt{font-size:13px;color:var(--ink)}
  .layer .ld{font-size:11px;color:var(--faint);margin-top:1px}
  .layer .lx{flex:1;min-width:0}

  /* browse tree */
  .search{width:100%;height:34px;padding:0 12px;border:1px solid var(--line);border-radius:8px;background:var(--surface);
    color:var(--ink);font-size:13px;margin:2px 0 8px}
  .search::placeholder{color:var(--faint)}
  .tree{display:flex;flex-direction:column;user-select:none}
  .trow{display:flex;align-items:center;gap:6px;min-height:28px;border-radius:7px;padding:0 6px;cursor:pointer;transition:background .1s}
  .trow:hover{background:var(--surface-2)}
  .trow .ttw{width:14px;flex:none;display:flex;align-items:center;justify-content:center;color:var(--faint)}
  .trow .ttw svg{width:8px;height:8px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;transition:transform .18s}
  .trow.open>.ttw svg{transform:rotate(90deg)}
  .trow .tlabel{font-size:12.5px;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .trow.on .tlabel{color:var(--ink)}
  .trow.leaf .tlabel{font-family:'IBM Plex Mono',monospace;font-size:11.5px}
  .trow.sel{background:var(--accent-soft)}
  .trow .tchk{width:15px;height:15px;flex:none;border:1.4px solid var(--line);border-radius:4px;position:relative;transition:background .12s,border-color .12s}
  .trow.on .tchk{background:var(--accent);border-color:var(--accent)}
  .trow.on .tchk::after{content:'';position:absolute;left:4.5px;top:1.5px;width:4px;height:8px;border:solid var(--surface);border-width:0 2px 2px 0;transform:rotate(45deg)}
  .trow .tdot{width:5px;height:5px;border-radius:50%;flex:none;background:transparent}
  body.color .trow .tdot{background:var(--kc,transparent)}
  .tchildren{display:none;margin-left:14px;border-left:1px solid var(--line-soft);padding-left:2px}
  .tchildren.open{display:flex;flex-direction:column}

  /* inspector */
  .insp .ihead{padding:16px 18px 12px}
  .insp .ikind{display:inline-block;font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;
    color:var(--dim);border:1px solid var(--line);border-radius:5px;padding:2px 7px;margin-bottom:9px}
  body.color .insp .ikind{color:var(--kc,var(--dim));border-color:color-mix(in srgb,var(--kc,var(--line)) 34%,var(--line))}
  .insp .iname{font-size:18px;font-weight:600;letter-spacing:-.01em;line-height:1.25;word-break:break-word}
  .insp .iname.mono{font-family:'IBM Plex Mono',monospace;font-size:15px}
  .insp .ipath{color:var(--faint);font-size:11px;font-family:'IBM Plex Mono',monospace;margin-top:6px;letter-spacing:.01em;word-break:break-word}
  .insp .idesc{color:var(--ink-2);font-size:13px;line-height:1.6;margin-top:12px}
  .insp .iact{display:flex;gap:8px;margin-top:14px}
  .insp .ibtn{flex:1;text-align:center;height:34px;line-height:32px;border:1px solid var(--line);border-radius:8px;background:var(--surface);
    color:var(--ink-2);font-size:12.5px;transition:border-color .15s,color .15s}
  .insp .ibtn.pri{border-color:var(--accent-line);color:var(--accent);background:var(--accent-soft)}
  .insp .ibtn:hover{border-color:var(--faint);color:var(--ink)}.insp .ibtn.pri:hover{border-color:var(--accent)}
  .ilab{color:var(--dim);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin:0 0 7px}
  .iline{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-2);margin:3px 0;white-space:pre-wrap;word-break:break-word}
  .iline .vn{color:var(--dim)}
  .conn{display:flex;align-items:center;gap:8px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--surface);cursor:pointer;margin-bottom:5px;transition:border-color .13s}
  .conn:hover{border-color:var(--accent-line)}
  .conn .arw{color:var(--faint);font-size:12px;flex:none}
  .conn .cn{font-size:12.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .conn .cl{color:var(--faint);font-size:10.5px;margin-left:auto;font-family:'IBM Plex Mono',monospace;flex:none}
  .body-src{margin-top:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;overflow:auto;max-height:340px}
  .body-src pre{margin:0;padding:12px 14px;font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.6;color:var(--ink-2);white-space:pre}
  .empty{color:var(--faint);font-size:12px;padding:2px 6px}
  .phint{padding:26px 20px;color:var(--dim);font-size:13px;line-height:1.65}
  .phint b{color:var(--ink-2);font-weight:500}
</style>
</head>
<body>
<header>
  <div class="brand"><b>flow</b>map<span class="sub">unfold</span></div>
  <div class="sp"></div>
  <button class="hbtn" id="foldAll" title="Fold everything back to the two regions">
    <svg viewBox="0 0 16 16"><path d="M8 2v5M8 9v5M3 8h10"/><path d="M5.5 5.5 8 3l2.5 2.5"/><path d="M5.5 10.5 8 13l2.5-2.5"/></svg>
    fold all
  </button>
  <button class="hbtn icon" id="theme" title="Toggle light / dark">
    <svg viewBox="0 0 16 16" id="themeIcon"><path d="M13 9.5A5.5 5.5 0 1 1 6.5 3 4.5 4.5 0 0 0 13 9.5Z"/></svg>
  </button>
</header>

<div id="body">
  <div id="stage">
    <div id="world"><svg id="wires"></svg><div id="content"><div class="booting">reading the live maps…</div></div></div>
    <div id="dock">
      <button id="zin" title="Zoom in"><svg viewBox="0 0 16 16"><path d="M8 4v8M4 8h8"/></svg></button>
      <button id="zout" title="Zoom out"><svg viewBox="0 0 16 16"><path d="M4 8h8"/></svg></button>
      <button id="zfit" title="Fit to view"><svg viewBox="0 0 16 16"><path d="M2 6V2h4M14 6V2h-4M2 10v4h4M14 10v4h-4"/></svg></button>
    </div>
    <div id="hint"></div>
  </div>

  <aside id="panel">
    <div class="sec">
      <div class="sec-h">Layers</div>
      <div class="sec-b"><div class="layers" id="layers"></div></div>
    </div>
    <div class="sec">
      <div class="sec-h">Browse <span class="n" id="revCount"></span></div>
      <div class="sec-b">
        <input class="search" id="search" placeholder="find a module or symbol…">
        <div class="tree" id="tree"></div>
      </div>
    </div>
    <div class="sec" id="inspWrap">
      <div class="sec-h">Inspector</div>
      <div class="insp" id="insp"><div class="phint">Nothing selected. Click any card to inspect it, or <b>unfold</b> a region from the canvas or the tree above. Everything starts folded — reveal only what you want to understand.</div></div>
    </div>
  </aside>
</div>

<script>
"use strict";
/* ========================================================================
   flowmap · unfold — a folded map you open only where you look.
   Pure vanilla, no build step. The .mmd maps are the source of truth;
   hierarchy.json only overlays the two-region responsibility grouping.
   ======================================================================== */
const $=id=>document.getElementById(id);
const h=(t,c,html)=>{const e=document.createElement(t);if(c)e.className=c;if(html!=null)e.innerHTML=html;return e;};
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const NS='http://www.w3.org/2000/svg';
function keyable(el,fn){el.tabIndex=0;el.setAttribute('role','button');el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();fn?fn(e):el.click();}});}
const stage=$('stage'),world=$('world'),wires=$('wires'),content=$('content'),panel=$('panel');

/* ===================== PARSE (.mmd → nodes + edges) ===================== */
/* One generalised parser for all four maps. Handles %% kind / parent / src / fm:meta,
   subgraph nesting, node declarations, and edges (arrow tokens spelled with \x3e so no
   literal - -> exists in this file to upset editors). */
function parse(raw){
  const lines=raw.split(/\r?\n/), nodes=new Map(), edges=[], stack=[], parentOf={}, subOf={};
  const en=id=>{if(!nodes.has(id))nodes.set(id,{id,label:id,kind:null,desc:'',src:'',accepts:[],returns:[],state:[],_named:false});return nodes.get(id);};
  for(const raw0 of lines){const line=raw0.trim();if(!line)continue;let m;
    if(line.startsWith('%%')){
      if(m=line.match(/^%% kind (\S+) (\S+)/)){en(m[1]).kind=m[2];continue;}
      if(m=line.match(/^%% parent (\S+) (\S+)/)){parentOf[m[1]]=m[2];continue;}
      if(m=line.match(/^%% src (\S+) (.+)$/)){en(m[1]).src=m[2].trim();continue;}
      if(m=line.match(/^%% fm:meta (\S+) (.+)$/)){const n=en(m[1]),r=m[2];let mm;
        if(mm=r.match(/^name=(.*)$/)){if(!n._named){n.label=mm[1];n._named=true;}}
        else if(mm=r.match(/^desc=(.*)$/))n.desc=mm[1];
        else if(mm=r.match(/^state=(.*)$/))n.state.push(mm[1]);

    <span class="tdot"></span>
    <span class="tlabel">${esc(u.label)}</span>
    <span class="tchk" title="Show / hide on canvas"></span>`;
  row.querySelector('.ttw').onclick=e=>{e.stopPropagation();if(canOpen){revealNode(id);if(expanded.has(id))collapse(id);else expanded.add(id);render(true);}};
  row.querySelector('.tchk').onclick=e=>{e.stopPropagation();toggleReveal(id);};
  row.querySelector('.tlabel').onclick=e=>{e.stopPropagation();revealNode(id);SEL=id;render(true);};
  wrap.appendChild(row);
  if(canOpen){const kidsBox=h('div','tchildren'+(open?' open':''));
    for(const c of u.children)kidsBox.appendChild(treeRow(c,depth+1));
    wrap.appendChild(kidsBox);}
  return wrap;
}
function toggleReveal(id){
  if(isRendered(id)&&!hidden.has(id)){
    // never let the canvas go fully empty — keep at least one top-level region on screen
    if(ROOTS.includes(id)&&ROOTS.filter(r=>!hidden.has(r)).length<=1)return;
    hidden.add(id);if(SEL===id)SEL=null;
  }
  else{revealNode(id);}
  render(true);
}
function openMatches(){ // when searching, auto-open tree branches that contain a match (panel only)
  const q=QUERY;const hits=new Set();
  for(const id of U.keys()){const u=U.get(id);if((u.label||'').toLowerCase().includes(q)||(u.desc||'').toLowerCase().includes(q)){let x=U.get(id);while(x){hits.add(x.id);x=U.get(x.parent);}}}
  $('tree').querySelectorAll('.trow').forEach(r=>{const id=r.dataset.id;const kb=r.nextElementSibling;
    if(kb&&kb.classList.contains('tchildren')){const show=hits.has(id);kb.classList.toggle('open',show);r.classList.toggle('open',show);}
    r.style.display=hits.size?(hits.has(id)?'':'none'):'';});
}

/* ===================== INSPECTOR ===================== */
function renderInspector(){
  const el=$('insp');
  if(!SEL){el.innerHTML=`<div class="phint">Nothing selected. Click any card to inspect it, or <b>unfold</b> a region from the canvas or the tree above. Everything starts folded — reveal only what you want to understand.</div>`;return;}
  const u=U.get(SEL);if(!u){el.innerHTML='';return;}
  const p=pathOf(u.id);
  const isSym=u.kind==='function'||u.kind==='type'||u.kind==='class'||u.kind==='store';
  const canUnfold=isContainer(u);
  let html=`<div class="ihead">
    <span class="ikind"${layers.color?` style="--kc:var(${KIND_COL[u.kind]||'--k-function'})"`:''}>${esc(u.kind)}</span>
    <div class="iname${isSym?' mono':''}">${esc(u.label)}</div>
    <div class="ipath">${esc([p.region==='app'?'src/':p.region==='tooling'?'tools/':'',...p.parts].filter(Boolean).join('  ›  '))}</div>
    ${u.desc?`<div class="idesc">${esc(u.desc)}</div>`:''}
    ${(canUnfold||isSym)?`<div class="iact">
      ${canUnfold?`<button class="ibtn pri" id="iUnfold">${expanded.has(u.id)?'fold':'unfold'}</button>`:''}
      ${isRendered(u.id)?`<button class="ibtn" id="iHide">remove from view</button>`:`<button class="ibtn" id="iShow">add to view</button>`}
    </div>`:''}
  </div>`;

  // interface (for symbols)
  const ifaceBlock=(l,a)=>a&&a.length?`<div style="padding:12px 18px;border-top:1px solid var(--line)"><div class="ilab">${l}</div>${a.map(x=>`<div class="iline">${ifaceLine(x)}</div>`).join('')}</div>`:'';
  html+=ifaceBlock('accepts',u.accepts)+ifaceBlock('returns',u.returns)+ifaceBlock('state',u.state);

  // connections
  const outs=dedupeConns(OUT[u.id]||[],'to'), ins=dedupeConns(IN[u.id]||[],'from');
  if(outs.length)html+=connBlock('uses →',outs,'to');
  if(ins.length)html+=connBlock('← used by',ins,'from');

  // body (app symbols)
  if(isSym&&u.body)html+=`<div style="padding:12px 18px;border-top:1px solid var(--line)"><div class="ilab">source</div><div class="body-src"><pre>${esc(u.body)}</pre></div></div>`;

  el.innerHTML=html;
  const un=$('iUnfold');if(un)un.onclick=()=>toggleExpand(u.id);
  const hd=$('iHide');if(hd)hd.onclick=()=>{hidden.add(u.id);SEL=null;render(true);};
  const sh=$('iShow');if(sh)sh.onclick=()=>{revealNode(u.id);render(true);};
  el.querySelectorAll('[data-goto]').forEach(r=>r.onclick=()=>{const id=r.dataset.goto;revealNode(id);SEL=id;render(true);});
}
function dedupeConns(arr,key){const m=new Map();for(const e of arr){const id=e[key];if(!m.has(id))m.set(id,{id,labels:new Set()});if(e.label)e.label.split(',').forEach(s=>{s=s.trim();if(s)m.get(id).labels.add(s);});}return [...m.values()];}
function connBlock(title,arr,key){
  return `<div style="padding:12px 18px;border-top:1px solid var(--line)"><div class="ilab">${title} (${arr.length})</div>`+
    arr.map(c=>{const u=U.get(c.id);const ll=[...c.labels].slice(0,2).join(', ');
      return `<div class="conn" data-goto="${esc(c.id)}"><span class="arw">${title[0]==='u'&&title[1]==='s'?'→':'←'}</span><span class="cn">${esc(u?u.label:c.id)}</span>${ll?`<span class="cl">${esc(ll)}</span>`:''}</div>`;}).join('')+`</div>`;
}

/* ===================== LAYERS PANEL ===================== */
const LAYER_DEFS=[
  {k:'wires',   t:'Wires',        d:'draw the dependency edges'},
  {k:'desc',    t:'Descriptions', d:'one-line role under each name'},
  {k:'iface',   t:'Interfaces',   d:'accepts / returns on symbols'},
  {k:'metrics', t:'Metrics',      d:'symbol counts · fan-in · hubs'},
  {k:'color',   t:'Colour',       d:'tint by region and kind'},
];
function renderLayers(){
  const box=$('layers');box.innerHTML='';
  for(const L of LAYER_DEFS){
    const row=h('div','layer'+(layers[L.k]?' on':''));
    row.innerHTML=`<span class="sw"></span><span class="lx"><div class="lt">${L.t}</div><div class="ld">${L.d}</div></span>`;
    row.onclick=()=>{layers[L.k]=!layers[L.k];applyLayerClasses();renderLayers();render(false);};
    keyable(row);
    box.appendChild(row);
  }
}
function applyLayerClasses(){document.body.classList.toggle('desc',layers.desc);document.body.classList.toggle('iface',layers.iface);
  document.body.classList.toggle('metrics',layers.metrics);document.body.classList.toggle('color',layers.color);}

/* ===================== HINT ===================== */
function updateHint(){
  const shown=[...U.keys()].filter(id=>isRendered(id)&&U.get(id).kind!=='region').length;
  const total=[...U.keys()].filter(id=>U.get(id).kind!=='region').length;
  const pct=Math.round((1-shown/total)*100);
  $('hint').innerHTML = shown===0
    ? `Two regions. Everything else is folded away. <b>Unfold</b> what you want to understand.`
    : `<b>${pct}%</b> still folded · ${shown} of ${total} shown`;
}

/* ===================== HEADER ===================== */
$('foldAll').onclick=foldAll;
function applyTheme(dark){
  document.body.classList.toggle('dark',dark);
  $('themeIcon').innerHTML=dark
    ? '<circle cx="8" cy="8" r="3.2"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M12.8 3.2l-1.4 1.4M4.6 11.4l-1.4 1.4"/>'
    : '<path d="M13 9.5A5.5 5.5 0 1 1 6.5 3 4.5 4.5 0 0 0 13 9.5Z"/>';
  localStorage.setItem('unfold.theme',dark?'dark':'light');drawWires();
}
$('theme').onclick=()=>applyTheme(!document.body.classList.contains('dark'));
$('search').oninput=e=>{QUERY=e.target.value.trim().toLowerCase();renderTree();};
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(SEL){SEL=null;render(false);}else if(QUERY){QUERY='';$('search').value='';renderTree();}}});

/* ===================== BOOT ===================== */
async function loadText(cands){let last='';for(const u of cands){try{const r=await fetch(u);if(r.ok)return await r.text();last='HTTP '+r.status+' '+u;}catch(err){last=err.message+' '+u;}}throw new Error(last);}
async function loadJSON(cands){return JSON.parse(await loadText(cands));}
(async function(){try{
  applyTheme(localStorage.getItem('unfold.theme')==='dark');
  const [rootT,bundleT,rtoolsT,toolingT,hier,bodies]=await Promise.all([
    loadText(['/docs/flowmap/root.mmd','../../docs/flowmap/root.mmd']),
    loadText(['/docs/flowmap/_bundle.mmd','../../docs/flowmap/_bundle.mmd']),
    loadText(['/docs/flowmap/root-tools.mmd','../../docs/flowmap/root-tools.mmd']),
    loadText(['/docs/flowmap/_tooling.mmd','../../docs/flowmap/_tooling.mmd']),
    loadJSON(['./hierarchy.json','hierarchy.json']),
    loadJSON(['/public/bodies.json','/bodies.json','../../public/bodies.json']).catch(()=>({})),
  ]);
  buildModel(rootT,bundleT,rtoolsT,toolingT,hier,bodies);
  applyLayerClasses();renderLayers();render(true);
  console.log('[unfold]',{units:U.size,edges:EDGES.length,roots:ROOTS});
}catch(err){content.innerHTML='<div class="booting">Could not load the live maps: '+esc(err.message)+'<br>Serve on the dev server (…/sandbox/unfold/), not file://.</div>';console.error(err);}})();
</script>
