<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Novakai — architecture map</title>
<!-- STANDALONE. Spatial architecture map: nested RESPONSIBILITY containers
     (Editor > Canvas > {rendering, layout, manipulation} ...), dependency wires,
     module interfaces on hover. Reads the app's design without opening the repo.
     No wiring into the novakai app. -->
<style>
  :root{--bg:#0e1116;--panel:#161b22;--panel2:#1c2230;--line:#2a2f3a;--ink:#e6edf3;--dim:#8b949e;--dim2:#6b7280;--accent:#58a6ff;--amber:#e3b341;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font:12px/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  header{display:flex;align-items:center;gap:16px;padding:9px 16px;border-bottom:1px solid var(--line);background:var(--panel);flex-wrap:wrap}
  .brand{font-weight:700}.brand b{color:var(--accent)}
  .ctl{display:flex;align-items:center;gap:6px;color:var(--dim)}
  .ctl select,.ctl label{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:3px 7px;font:inherit}
  .ctl label{display:flex;gap:6px;align-items:center;cursor:pointer}
  .sp{flex:1}
  .hint{color:var(--dim2);font-size:11px}
  main{position:absolute;top:44px;bottom:0;left:0;right:0;overflow:auto;padding:16px}
  svg{display:block}
  text{fill:var(--ink)}
  #tip{position:fixed;pointer-events:none;z-index:60;max-width:360px;background:#0b0e13;border:1px solid var(--line);border-radius:8px;padding:9px 11px;box-shadow:0 10px 34px rgba(0,0,0,.6);display:none;font-size:12px}
  #tip .t{color:var(--accent);font-weight:700}
  #tip .d{color:var(--dim);margin:3px 0}
  #tip .api{color:var(--ink);font-size:11px;margin-top:5px}
  #tip .api div{color:#9ecbff}
  #tip .ty{color:var(--type,#bc8cff);font-size:11px;margin-top:4px}
</style>
</head>
<body>
<header>
  <div class="brand"><b>flow</b>map · architecture map</div>
  <div class="ctl">arrows
    <select id="agg"><option value="top">between subsystems</option><option value="sub">between sub-groups</option><option value="none">off</option></select>
  </div>
  <div class="ctl"><label><input type="checkbox" id="wires"> show every module wire</label></div>
  <div class="sp"></div>
  <div class="hint">nested = responsibility · arrow A→B = A depends on B (thickness = #links) · hover a module for its interface</div>
</header>
<main id="main"></main>
<div id="tip"></div>

<script>
"use strict";
const DATA = {"modules":[{"id":"main","label":"main","desc":"composition root; builds AppContext, runs each initX in dependency order, wires hooks, boots","fanIn":0,"api":["resolve DOM","build AppContext","instantiate modules","wire hooks","bind toolbar DOM","load prefs + restore or seed"],"types":[]},{"id":"state","label":"state","desc":"the live diagram model (nodes, edges, selection, id counters) plus pure geometry + containment helpers","fanIn":17,"api":["createState → StateStore","nodeFootprint → Footprint","snapV → number","portPos → Point","nodeCenter → number; cy: number }","frameTransform → number; y: number; z: number }"],"types":["StateStore","MeasuredCard","Footprint"]},{"id":"frontmatter","label":"frontmatter","desc":"per-node public-interface metadata; create, prune, serialize and parse to Mermaid %% lines","fanIn":4,"api":["emptyInterface → NodeInterface","emptyFrontmatter → Frontmatter","normalizeFrontmatter → Frontmatter","isFrontmatterEmpty → boolean","pruneFrontmatter → Frontmatter","frontmatterToMermaid → string"],"types":["TypeRef"]},{"id":"validate","label":"validate","desc":"pure model integrity and serialize-parse round-trip checks; no DOM, types only","fanIn":0,"api":["validateModel → Issue[]","inParentCycle → boolean","edgeIdentities → Map<string, string>","semanticDiff → Issue[]","fmEqual → boolean"],"types":["Issue"]},{"id":"history","label":"history","desc":"bounded undo/redo stack of JSON model snapshots; restore writes back through hooks","fanIn":1,"api":["createHistory → History","initHistory → HistoryApi","snapshot → string","pushHistory → void","restore → void","undo → void"],"types":["History","HistoryApi"]},{"id":"persistence","label":"persistence","desc":"debounced autosave of model + camera to localStorage, plus load/save of Prefs","fanIn":1,"api":["initPersistence → PersistenceApi","persist → void","loadPersisted → boolean","loadPrefs → void","savePrefs → void"],"types":["PersistenceApi"]},{"id":"camera","label":"camera","desc":"viewport pan and zoom transform; screen-to-world, applyCam, zoomAt, zoomToFit","fanIn":6,"api":["initCamera → CameraApi","applyCam → void","toWorld → Point","zoomAt → void","zoomCenter → void","zoomToFit → void"],"types":["CameraApi"]},{"id":"context","label":"context","desc":"defines AppContext and the cross-module hook seam that breaks import cycles","fanIn":1,"api":["createHooks → Hooks"],"types":["AppContext","DomRefs","Hooks"]},{"id":"config","label":"config","desc":"static lookup tables, palette, themes, fonts, zoom limits, storage keys plus tiny pure helpers","fanIn":8,"api":["nodeFill → string | null","esc → string","escM → string"],"types":["ShapeDefault","Theme","FontDef"]},{"id":"types","label":"types","desc":"shared domain types every module reads and writes; the vocabulary of the whole app","fanIn":7,"api":[],"types":["DiagramNode","DiagramEdge","NodeInterface","Frontmatter","DiagramData","Camera","Point","Prefs"]},{"id":"runtime","label":"runtime","desc":"tiny bag of transient interaction flags the render layer reads and interaction owns","fanIn":1,"api":["createRuntime → Runtime"],"types":["Runtime"]},{"id":"seed","label":"seed","desc":"first-run sample diagram, used only when there is no autosave to restore","fanIn":1,"api":[],"types":[]},{"id":"mermaid","label":"mermaid","desc":"two-way Mermaid text and model serializer/parser; the only module that knows the grammar","fanIn":5,"api":["initMermaid → MermaidApi","toMermaid → string","sync → void","fromMermaid → ParseResult","applyText → void"],"types":["MermaidApi"]},{"id":"layout","label":"layout","desc":"the Tidy automatic layered-tree layout; layers the spine and parks satellites","fanIn":1,"api":["initLayout → LayoutApi","autoLayout → Promise<void>","footprint → Footprint","captureGroups → Record<string, string[]>","isSpineEdge","spineNodeSet → Set<string>"],"types":["LayoutApi"]},{"id":"exporter","label":"exporter","desc":"build a standalone SVG from the model and export as a downloaded SVG or PNG","fanIn":1,"api":["initExport → ExportApi","nodeSVG → string","buildExportSVG → string; W: number; H: number } | null","exportSVG → void","exportPNG → void","downloadBlob → void"],"types":["ExportApi"]},{"id":"files","label":"files","desc":"save the diagram as a .mmd file and load a .mmd or bodies.json back in","fanIn":1,"api":["initFiles → FilesApi","saveMmd → void","downloadBlob → void","applyBodies → void"],"types":["FilesApi"]},{"id":"render","label":"render","desc":"rebuild node DOM from the model each render; frontmatter cards, ports, drill affordance","fanIn":1,"api":["initRender → RenderApi","render → void","updateStatus → void","classFor → string","nodeSig → string","buildInner → void"],"types":["RenderApi"]},{"id":"wires","label":"wires","desc":"draw all edges into the SVG layer plus the path geometry helpers reused by export","fanIn":3,"api":["initWires → () => void; updateWiresFor: (movedIds: Set<string>) => void }","orthoPath → string","polyPath → string","midOf → Point","pathPoints → Point[]","labelAnchor → Point"],"types":[]},{"id":"avoidRouter","label":"avoidRouter","desc":"obstacle-avoiding orthogonal routing of reference edges via the libavoid WASM router","fanIn":2,"api":["routeReferences → Promise<void>","routeFor → Point[] | null","ensureRoutes → void","obstacleSignature → string","sanitizeRect → ElkNode","footprintRect → ElkNode"],"types":["RouteOptions"]},{"id":"minimap","label":"minimap","desc":"paint the overview canvas and translate clicks and drags into camera moves","fanIn":1,"api":["initMinimap → MinimapApi","drawMinimap → void","minimapTo → void"],"types":["MinimapApi"]},{"id":"avoidWorker","label":"avoidWorker","desc":"run the libavoid router in a dedicated worker so routing never blocks the main thread","fanIn":1,"api":["ensureRouter → Promise<void>","routeGraphBatched → Promise<RoutedPoly[]>"],"types":["RouteReq","RoutedPoly","RouteRes"]},{"id":"pointer","label":"pointer","desc":"direct-manipulation on the canvas: drag, marquee, pan, resize, port-drag linking","fanIn":1,"api":["initPointer → PointerApi","startDrag → void","startResize → void","startMarquee → void","startPan → void","startLink → void"],"types":["PointerApi"]},{"id":"nodes","label":"nodes","desc":"create/modify/destroy verbs on the model: addNode, makeEdge, deleteSelection, align, group","fanIn":5,"api":["initNodes → NodesApi","addNode → string","makeEdge → void","deleteSelection → void","alignNodes → void","wrapInGroup → void"],"types":["NodesApi"]},{"id":"selection","label":"selection","desc":"user-facing selection verbs that mutate sel then render and refresh the inspector","fanIn":4,"api":["initSelection → SelectionApi","selectOnly → void","toggleSel → void","selectEdge → void","clearSel → void","selectAll → void"],"types":["SelectionApi"]},{"id":"clipboard","label":"clipboard","desc":"in-memory copy, paste with id remapping, and duplicate of the selection","fanIn":1,"api":["initClipboard → ClipboardApi","copySel → void","pasteClip → void","duplicateSel → void"],"types":["Clipboard","ClipboardApi"]},{"id":"keyboard","label":"keyboard","desc":"global key and wheel handling: undo, clipboard, delete, nudge, quick-add, zoom, pan","fanIn":1,"api":["initKeyboard → void","editing → boolean"],"types":["KeyboardDeps"]},{"id":"inlineEdit","label":"inlineEdit","desc":"double-click contenteditable label editing plus the dblclick drop-and-edit flow","fanIn":1,"api":["initInlineEdit → InlineEditApi","beginEdit → void","openFrontmatterEditor → void"],"types":["InlineEditApi"]},{"id":"contextMenu","label":"contextMenu","desc":"build and position the right-click menu with node or canvas actions","fanIn":1,"api":["initContextMenu → ContextMenuApi","showCtx → void","hideCtx → void"],"types":["ContextMenuApi","ContextMenuDeps"]},{"id":"view","label":"view","desc":"own the current drill level and the verbs that change it, plus the breadcrumb","fanIn":2,"api":["initView → ViewApi","apply → void","enter → void","goUp → void","goTo → void","renderBreadcrumb → void"],"types":["ViewApi"]},{"id":"inspector","label":"inspector","desc":"render the right-hand property editor for a node, multi-selection, or an edge","fanIn":1,"api":["initInspector → InspectorApi","renderInspector → void","updateSource → void","updateStatus → void","renderSingleInspector → void","renderMultiInspector → void"],"types":["InspectorApi"]},{"id":"inspectorFrontmatter","label":"inspectorFrontmatter","desc":"render and wire the frontmatter editor for a single selected node","fanIn":1,"api":["initInspectorFrontmatter → (host: HTMLElement, n: DiagramNode) => void; }","stateRowsHtml → string","ifaceListRowsHtml → string","ifaceBlockHtml → string","render → void","wire → void"],"types":[]},{"id":"tabs","label":"tabs","desc":"switch the right panel between panes, collapse it, and show transient toasts","fanIn":1,"api":["initTabs → TabsApi","showTab → void","togglePanel → void","toast → void"],"types":["TabsApi"]},{"id":"styleControls","label":"styleControls","desc":"build and wire the Style tab: theme chips, font, toggles, routing select","fanIn":1,"api":[],"types":[]},{"id":"theming","label":"theming","desc":"translate prefs into live CSS variables and canvas state at runtime","fanIn":2,"api":["initTheming → ThemingApi","applyTheme → void","applyFont → void","applyCanvasPrefs → void"],"types":["ThemingApi"]},{"id":"diff","label":"diff","desc":"compare two parsed models and compute the semantic delta: added, removed and changed nodes and edges","fanIn":1,"api":["edgeKey → string","fmSig → string","diffModels → MmdDiff"],"types":["DiffInput","NodeChange","MmdDiff"]},{"id":"navigator","label":"navigator","desc":"searchable, filterable node list; click a row to drill, select and centre the camera","fanIn":1,"api":["initNavigator → NavigatorApi","buildKindBar → void","render → void","navigateTo → void"],"types":["NavigatorApi"]},{"id":"slice","label":"slice","desc":"show a self-contained mmd of the selected node's neighbourhood, with a Copy button","fanIn":1,"api":["initSlice → SliceApi","render → void"],"types":["SliceApi"]},{"id":"diffWorkspace","label":"diffWorkspace","desc":"full-screen diff overlay: snapshot, paste a proposal, diff via diffModels, view four ways, apply","fanIn":1,"api":["initDiffWorkspace → DiffWorkspaceApi","open → void","close → void","compare → void","showError → void","renderCounts → void"],"types":["ViewId","DiffWorkspaceApi","ViewArg","DiffModel"]},{"id":"plan","label":"plan","desc":"build-plan overlay model (pure): status/intent/phase changes keyed on real nodes/edges, plus blast-radius and coherence helpers","fanIn":1,"api":["emptyPlan → Plan","normalizePlan → Plan","indexByRef → Record<string, PlanChange>","indexById → Record<string, PlanChange>","blastRadius → string[]; dependencies: string[] }","coherenceWarnings → CoherenceWarning[]"],"types":["ChangeTarget","ChangeIntent","NewNodeSpec","NewEdgeSpec","PlanChange","PlanPhase","Plan","CoherenceWarning"]},{"id":"planner","label":"planner","desc":"full-screen build-plan review surface: status overlay on the real map, tri-pane sync, accept/reject with dependency coherence, gated export to buildspec","fanIn":1,"api":["initPlanner → PlannerApi"],"types":["PlannerApi"]}],"edges":[{"from":"main","to":"state","label":"1 createState","style":"solid"},{"from":"main","to":"context","label":"2 createHooks","style":"solid"},{"from":"main","to":"runtime","label":"3 createRuntime","style":"solid"},{"from":"main","to":"persistence","label":"4 persist + prefs","style":"solid"},{"from":"main","to":"camera","label":"5 camera","style":"solid"},{"from":"main","to":"history","label":"6 history","style":"solid"},{"from":"main","to":"seed","label":"7 seed if empty","style":"solid"},{"from":"main","to":"wires","label":"8 wires","style":"solid"},{"from":"main","to":"render","label":"9 render","style":"solid"},{"from":"main","to":"minimap","label":"10 minimap","style":"solid"},{"from":"main","to":"mermaid","label":"11 mermaid","style":"solid"},{"from":"main","to":"layout","label":"12 layout","style":"solid"},{"from":"main","to":"exporter","label":"13 export","style":"solid"},{"from":"main","to":"files","label":"14 files","style":"solid"},{"from":"main","to":"selection","label":"15 selection","style":"solid"},{"from":"main","to":"nodes","label":"16 nodes","style":"solid"},{"from":"main","to":"clipboard","label":"17 clipboard","style":"solid"},{"from":"main","to":"inspector","label":"18 inspector","style":"solid"},{"from":"main","to":"pointer","label":"19 pointer","style":"solid"},{"from":"main","to":"view","label":"20 view","style":"solid"},{"from":"main","to":"contextMenu","label":"21 contextMenu","style":"solid"},{"from":"main","to":"keyboard","label":"22 keyboard","style":"solid"},{"from":"main","to":"tabs","label":"23 tabs","style":"solid"},{"from":"main","to":"inlineEdit","label":"24 inlineEdit","style":"solid"},{"from":"main","to":"theming","label":"25 theming","style":"solid"},{"from":"main","to":"styleControls","label":"26 styleControls","style":"solid"},{"from":"config","to":"types","label":"types","style":"dotted"},{"from":"state","to":"config","label":"SIDE_MULT, GRID","style":"dotted"},{"from":"state","to":"types","label":"types","style":"dotted"},{"from":"camera","to":"config","label":"Z_MIN, Z_MAX","style":"dotted"},{"from":"camera","to":"state","label":"levelFitBounds","style":"dotted"},{"from":"persistence","to":"config","label":"keys, DEFAULT_PREFS","style":"dotted"},{"from":"persistence","to":"frontmatter","label":"normalizeFrontmatter","style":"dotted"},{"from":"history","to":"state","label":"snapshots","style":"dotted"},{"from":"frontmatter","to":"types","label":"types","style":"dotted"},{"from":"validate","to":"types","label":"types","style":"dotted"},{"from":"seed","to":"state","label":"StateStore","style":"dotted"},{"from":"context","to":"types","label":"types","style":"dotted"},{"from":"render","to":"state","label":"childIdsOf","style":"dotted"},{"from":"render","to":"config","label":"nodeFill, badges","style":"dotted"},{"from":"render","to":"frontmatter","label":"fm cards","style":"dotted"},{"from":"render","to":"wires","label":"drawWires","style":"dotted"},{"from":"wires","to":"state","label":"geometry","style":"dotted"},{"from":"wires","to":"avoidRouter","label":"routes","style":"dotted"},{"from":"avoidRouter","to":"state","label":"footprints","style":"dotted"},{"from":"avoidRouter","to":"avoidWorker","label":"off-thread","style":"dotted"},{"from":"layout","to":"state","label":"positions","style":"dotted"},{"from":"layout","to":"avoidRouter","label":"reroute","style":"dotted"},{"from":"minimap","to":"state","label":"level bounds","style":"dotted"},{"from":"minimap","to":"camera","label":"applyCam","style":"dotted"},{"from":"mermaid","to":"frontmatter","label":"fm lines","style":"dotted"},{"from":"mermaid","to":"config","label":"styles, defaults","style":"dotted"},{"from":"exporter","to":"state","label":"portPos, bestSides","style":"dotted"},{"from":"exporter","to":"wires","label":"orthoPath, midOf","style":"dotted"},{"from":"files","to":"mermaid","label":"applyText","style":"dotted"},{"from":"files","to":"camera","label":"zoomToFit","style":"dotted"},{"from":"pointer","to":"camera","label":"toWorld","style":"dotted"},{"from":"pointer","to":"selection","label":"selectOnly","style":"dotted"},{"from":"pointer","to":"nodes","label":"makeEdge","style":"dotted"},{"from":"nodes","to":"config","label":"defaults","style":"dotted"},{"from":"nodes","to":"selection","label":"selectOnly","style":"dotted"},{"from":"selection","to":"state","label":"childIdsOf","style":"dotted"},{"from":"clipboard","to":"state","label":"snapV","style":"dotted"},{"from":"keyboard","to":"nodes","label":"verbs","style":"dotted"},{"from":"keyboard","to":"camera","label":"zoom","style":"dotted"},{"from":"inlineEdit","to":"state","label":"nodeAtPoint","style":"dotted"},{"from":"contextMenu","to":"nodes","label":"actions","style":"dotted"},{"from":"view","to":"state","label":"containerPath","style":"dotted"},{"from":"inspector","to":"inspectorFrontmatter","label":"fm editor","style":"dotted"},{"from":"inspector","to":"nodes","label":"align, delete","style":"dotted"},{"from":"inspectorFrontmatter","to":"frontmatter","label":"fm helpers","style":"dotted"},{"from":"tabs","to":"mermaid","label":"sync","style":"dotted"},{"from":"styleControls","to":"config","label":"themes","style":"dotted"},{"from":"styleControls","to":"theming","label":"applyTheme","style":"dotted"},{"from":"theming","to":"config","label":"THEMES","style":"dotted"},{"from":"main","to":"navigator","label":"27 navigator","style":"solid"},{"from":"main","to":"slice","label":"28 slice","style":"solid"},{"from":"main","to":"diffWorkspace","label":"29 diff workspace","style":"solid"},{"from":"diff","to":"types","label":"types","style":"dotted"},{"from":"diffWorkspace","to":"diff","label":"diffModels","style":"dotted"},{"from":"diffWorkspace","to":"mermaid","label":"toMermaid, applyText","style":"dotted"},{"from":"navigator","to":"selection","label":"selectOnly","style":"dotted"},{"from":"navigator","to":"view","label":"goTo, enter","style":"dotted"},{"from":"navigator","to":"camera","label":"centre","style":"dotted"},{"from":"navigator","to":"state","label":"childIdsOf","style":"dotted"},{"from":"slice","to":"mermaid","label":"fromMermaid","style":"dotted"},{"from":"slice","to":"state","label":"sliceIds, sliceStubs","style":"dotted"},{"from":"main","to":"planner","label":"30 planner","style":"solid"},{"from":"plan","to":"types","label":"types","style":"dotted"},{"from":"planner","to":"state","label":"childIdsOf, containerOf","style":"dotted"},{"from":"planner","to":"plan","label":"plan overlay","style":"dotted"}]};
const byId = Object.fromEntries(DATA.modules.map(m=>[m.id,m]));

/* ---------- RESPONSIBILITY HIERARCHY (nested) ---------- */
const HIER = {
  'Editor': {
    'Canvas': {
      'Rendering & viewport':['render','wires','camera','minimap','theming'],
      'Layout & routing':['layout','avoidRouter','avoidWorker'],
      'Direct manipulation':['pointer','nodes','selection','clipboard','inlineEdit','keyboard','contextMenu','view'],
    },
    'Side panels':['inspector','inspectorFrontmatter','tabs','styleControls','navigator','slice'],
  },
  'Domain model': {
    'Core model & config':['state','types','config','runtime'],
    'Node metadata':['frontmatter','validate'],
    'History & first-run':['history','seed'],
  },
  'Review & planning':['diff','diffWorkspace','plan','planner'],
  'Persistence & IO':['mermaid','files','persistence','exporter'],
  'Orchestration':['main','context'],
};
// maps: module -> top group, module -> sub group (leaf-group name)
const mod2top={}, mod2sub={};
(function walk(node,top,sub){ if(Array.isArray(node)){ for(const id of node){ mod2top[id]=top; mod2sub[id]=sub; } return; }
  for(const k in node) walk(node[k], top||k, k); })(HIER,null,null);

/* ---------- LAYOUT (nested boxes, alternating orientation) ---------- */
const CHIPW=176, CHIPH=40, GAP=12, PAD=13, TITLE=24;
function layout(node, depth){
  if(Array.isArray(node)){
    const n=node.length, cols=n>4?2:1, rows=Math.ceil(n/cols);
    return {kind:'leaf',mods:node,cols, w:cols*CHIPW+(cols-1)*GAP+PAD*2, h:TITLE+rows*CHIPH+(rows-1)*GAP+PAD*2};
  }
  const H = depth%2===0; // even: row, odd: column
  const kids=Object.keys(node).map(k=>({name:k, box:layout(node[k],depth+1)}));
  let w=0,h=0;
  if(H){ kids.forEach(k=>{w+=k.box.w+GAP; h=Math.max(h,k.box.h);}); w-=GAP; }
  else { kids.forEach(k=>{h+=k.box.h+GAP; w=Math.max(w,k.box.w);}); h-=GAP; }
  return {kind:'cont',H,kids, w:w+PAD*2, h:h+TITLE+PAD*2};
}
function place(box,x,y){
  box.x=x; box.y=y;
  if(box.kind==='leaf'){ box.pos={}; box.mods.forEach((id,i)=>{ const c=i%box.cols, r=(i/box.cols|0);
    box.pos[id]={x:x+PAD+c*(CHIPW+GAP), y:y+TITLE+PAD+r*(CHIPH+GAP), w:CHIPW, h:CHIPH}; }); return; }
  let cx=x+PAD, cy=y+TITLE+PAD;
  for(const k of box.kids){ place(k.box,cx,cy); if(box.H) cx+=k.box.w+GAP; else cy+=k.box.h+GAP; }
}

const root = layout(HIER,0);
// pack top-level subsystems into rows that fit a target width (Editor is large; the
// support subsystems wrap beside/under it) instead of one very wide row.
const TARGETW=1480;
function packRoot(){ let x=0,y=0,rowH=0,maxRow=0; const SP=GAP*2;
  for(const k of root.kids){ if(x>0 && x+k.box.w>TARGETW){ x=0; y+=rowH+SP; rowH=0; }
    place(k.box,x,y); x+=k.box.w+SP; rowH=Math.max(rowH,k.box.h); maxRow=Math.max(maxRow,x-SP); }
  return {w:maxRow,h:y+rowH}; }
const _d=packRoot(); const W=_d.w, Hgt=_d.h;

/* ---------- COLORS ---------- */
const TOPCOL={'Editor':'#58a6ff','Domain model':'#3fb950','Review & planning':'#bc8cff','Persistence & IO':'#e3b341','Orchestration':'#f778ba'};
const chipCenter={};
function collectCenters(box){ if(box.kind==='leaf'){ for(const id in box.pos){ const p=box.pos[id]; chipCenter[id]={x:p.x+p.w/2,y:p.y+p.h/2}; } return; } box.kids&&box.kids.forEach(k=>collectCenters(k.box)); }
collectCenters(root);

/* ---------- RENDER ---------- */
const NS='http://www.w3.org/2000/svg';
const el=(t,a={})=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
const tip=document.getElementById('tip');
const main=document.getElementById('main');
let AGG='top', WIRES=false, HOVER=null;

document.getElementById('agg').onchange=e=>{AGG=e.target.value; draw();};
document.getElementById('wires').onchange=e=>{WIRES=e.target.checked; draw();};

function draw(){
  main.innerHTML='';
  const M=40;
  const availW=(main.clientWidth||1400)-32;
  const scale=Math.min(1, availW/(W+M*2));
  const svg=el('svg',{viewBox:`${-M} ${-M} ${W+M*2} ${Hgt+M*2}`, width:(W+M*2)*scale, height:(Hgt+M*2)*scale});
  main.appendChild(svg);
  svg.appendChild(defs());
  // 1) boxes
  drawBox(svg, {kind:'cont',kids:Object.keys(HIER).map(k=>({name:k,box:findTop(k)})),H:true,x:0,y:0,w:W,h:Hgt}, null, 0, true);
  // 2) wires (module-level) under arrows if enabled
  if(WIRES) drawModuleWires(svg);
  // 3) aggregated dependency arrows
  if(AGG!=='none') drawAgg(svg);
  // 4) chips on top
  drawChips(svg, root);
}
function findTop(name){ // get the placed box for a top group
  return topBoxes[name];
}
// capture top group boxes during place: re-walk root
const topBoxes={};
root.kids.forEach(k=>topBoxes[k.name]=k.box);

function drawBox(svg, box, name, depth, isRoot){
  if(!isRoot){
    const top = name && TOPCOL[name] ? name : null;
    const col = box._topcol || '#7d8590';
    const r=el('rect',{x:box.x,y:box.y,width:box.w,height:box.h,rx:12,
      fill: depth===1?'rgba(255,255,255,.02)': depth===2?'rgba(255,255,255,.015)':'rgba(255,255,255,.03)',
      stroke:col, 'stroke-width': depth===1?2:1, 'stroke-opacity':depth===1?.85:.4});
    svg.appendChild(r);
    const label=el('text',{x:box.x+12,y:box.y+16,'font-size':depth===1?'13':'11','font-weight':'700',fill:col});
    label.textContent=name; svg.appendChild(label);
  }
  if(box.kind==='cont'&&box.kids) box.kids.forEach(k=>{ k.box._topcol = box._topcol || TOPCOL[k.name] || box._topcol; drawBox(svg,k.box,k.name,depth+1,false); });
}
// set top colours before drawing
root.kids.forEach(k=>{ k.box._topcol=TOPCOL[k.name]||'#7d8590'; });

function drawChips(svg, box){
  if(box.kind==='leaf'){
    for(const id of box.mods){ const p=box.pos[id]; const m=byId[id]; if(!m)continue;
      const dim = HOVER && HOVER!==id && !isNeighbor(HOVER,id);
      const g=el('g',{style:'cursor:pointer',opacity:dim?.25:1});
      g.appendChild(el('rect',{x:p.x,y:p.y,width:p.w,height:p.h,rx:7,fill:'#20283a',
        stroke: id===HOVER?'#e3b341': (m.fanIn>=5?'#3b4a63':'#2a3550'),'stroke-width':id===HOVER?2:1}));
      const t=el('text',{x:p.x+9,y:p.y+16,'font-size':'12','font-weight':'700'}); t.textContent=m.label; g.appendChild(t);
      const sub=el('text',{x:p.x+9,y:p.y+30,'font-size':'9.5',fill:'#7f8ba0'});
      sub.textContent=(m.types[0]?m.types[0]:(m.api[0]?m.api[0].split(' ')[0]+'()':''))+(m.fanIn?'  ·  in '+m.fanIn:''); g.appendChild(sub);
      if(m.fanIn>=6){ g.appendChild(el('circle',{cx:p.x+p.w-9,cy:p.y+9,r:3,fill:'#e3b341'})); }
      g.onmouseenter=e=>{ HOVER=id; showTip(m,e); draw(); };
      g.onmousemove=e=>positionTip(e);
      g.onmouseleave=()=>{ HOVER=null; tip.style.display='none'; draw(); };
      svg.appendChild(g);
    }
    return;
  }
  box.kids&&box.kids.forEach(k=>drawChips(svg,k.box));
}
function isNeighbor(a,b){ return DATA.edges.some(e=>(e.from===a&&e.to===b)||(e.from===b&&e.to===a)); }

function aggregate(keyFn){
  const agg={}; // "A||B" -> weight
  for(const e of DATA.edges){ const a=keyFn(e.from), b=keyFn(e.to); if(!a||!b||a===b)continue;
    agg[a+'||'+b]=(agg[a+'||'+b]||0)+1; }
  return agg;
}
function boxOfGroup(name, level){ // find placed box by group name
  let found=null;
  (function rec(box,nm){ if(nm===name){found=box;return;} if(box.kids)box.kids.forEach(k=>rec(k.box,k.name)); })(root, null);
  return found;
}
function groupCenter(name){ const b=boxOfGroup(name); return b?{x:b.x+b.w/2,y:b.y+b.h/2,box:b}:null; }

function drawAgg(svg){
  const keyFn = AGG==='top'? (id=>mod2top[id]) : (id=>mod2sub[id]);
  const agg=aggregate(keyFn);
  const maxW=Math.max(...Object.values(agg),1);
  for(const k in agg){ const [a,b]=k.split('||'); const ca=groupCenter(a), cb=groupCenter(b); if(!ca||!cb)continue;
    const [p1,p2]=clip(ca.box,cb.box);
    const on = HOVER && (keyFn(HOVER)===a || keyFn(HOVER)===b);
    const w=1+ (agg[k]/maxW)*5;
    const col = TOPCOL[a] || '#8b949e';
    const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2 - 24;
    const path=el('path',{d:`M${p1.x} ${p1.y} Q ${mx} ${my} ${p2.x} ${p2.y}`,fill:'none',
      stroke: on?'#e3b341':col, 'stroke-width':on?w+1:w, 'stroke-opacity':HOVER?(on?.95:.12):.5,'marker-end':'url(#ah)'});
    svg.appendChild(path);
  }
}
function drawModuleWires(svg){
  for(const e of DATA.edges){ const a=chipCenter[e.from], b=chipCenter[e.to]; if(!a||!b)continue;
    const on = HOVER && (e.from===HOVER||e.to===HOVER);
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2-14;
    svg.appendChild(el('path',{d:`M${a.x} ${a.y} Q ${mx} ${my} ${b.x} ${b.y}`,fill:'none',
      stroke:on?'#e3b341':'#3a4560', 'stroke-width':on?1.6:0.7,
      'stroke-opacity':HOVER?(on?.9:.05):.16,'marker-end':on?'url(#ah)':''})); }
}
// line between two rect centers clipped to rect borders
function clip(A,B){
  const ax=A.x+A.w/2, ay=A.y+A.h/2, bx=B.x+B.w/2, by=B.y+B.h/2;
  return [clipRect(A,ax,ay,bx,by), clipRect(B,bx,by,ax,ay)];
}
function clipRect(R,cx,cy,tx,ty){
  const dx=tx-cx, dy=ty-cy; const hw=R.w/2, hh=R.h/2;
  let sx=dx?hw/Math.abs(dx):1e9, sy=dy?hh/Math.abs(dy):1e9; const s=Math.min(sx,sy);
  return {x:cx+dx*s, y:cy+dy*s};
}
function defs(){ const d=el('defs'); const m=el('marker',{id:'ah',viewBox:'0 0 10 10',refX:9,refY:5,markerWidth:7,markerHeight:7,orient:'auto-start-reverse'});
  m.appendChild(el('path',{d:'M0 0 L10 5 L0 10 z',fill:'#8b949e'})); d.appendChild(m); return d; }

function showTip(m,e){ const api=m.api.map(a=>`<div>${esc(a)}</div>`).join('');
  tip.innerHTML=`<div class="t">${esc(m.label)}</div><div class="d">${mod2top[m.id]} › ${mod2sub[m.id]||''}</div>`+
    `<div class="d">${esc(m.desc)}</div>`+
    (m.types.length?`<div class="ty">exports type: ${m.types.map(esc).join(', ')}</div>`:'')+
    (api?`<div class="api">API:${api}</div>`:'')+
    `<div class="d">fan-in ${m.fanIn}</div>`;
  positionTip(e);
}
function positionTip(e){ tip.style.display='block'; const w=tip.offsetWidth,h=tip.offsetHeight;
  tip.style.left=Math.min(e.clientX+14, innerWidth-w-8)+'px'; tip.style.top=Math.min(e.clientY+14, innerHeight-h-8)+'px'; }
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
draw();
</script>
