  nav button:hover{color:var(--ink);background:var(--panel2)}
  nav button.on{color:#fff;background:var(--panel2);border-color:var(--line)}
  nav button.on b{color:var(--accent)}
  main{position:absolute;top:49px;left:0;right:0;bottom:0;display:flex;flex-direction:column}

  .viewhead .q{color:var(--dim);font-size:11.5px}.viewhead .q b{color:var(--good)}
  .viewhead .ctl{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}

  .act:hover{border-color:var(--accent)}.act.on{border-color:var(--good);color:var(--good)}
  .stage{position:relative;flex:1;overflow:hidden;background:radial-gradient(circle at 1px 1px,#161d27 1px,transparent 0) 0 0/26px 26px,var(--bg)}
  .stage svg{position:absolute;inset:0;width:100%;height:100%}
  text{fill:var(--ink);font-family:ui-monospace,Menlo,monospace}
  .hint{position:absolute;left:0;right:0;bottom:0;height:26px;display:flex;align-items:center;padding:0 14px;background:var(--panel);border-top:1px solid var(--line);color:var(--dim);font-size:11px;z-index:3;gap:14px}
  .hint b{color:var(--ink)} .hint .k{color:var(--amber)}
  .readout{position:absolute;left:14px;top:12px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:10px 13px;max-width:340px;z-index:4;font-size:12px}
  .readout h4{margin:0 0 5px;font-size:13px}
  .readout .big{font-size:20px;font-weight:700}
  .readout .row{display:flex;justify-content:space-between;gap:10px;padding:2px 0;border-top:1px solid var(--line)}
  .readout code{color:var(--amber)}
  .side{position:absolute;top:0;right:0;bottom:26px;width:300px;background:var(--panel);border-left:1px solid var(--line);padding:13px;overflow:auto;z-index:4;font-size:12px}
  .side h3{margin:0 0 8px;font-size:13px}
  .chip{display:inline-block;padding:1px 7px;border-radius:5px;font-size:10.5px;color:#0d1117;font-weight:700;margin:2px 3px 0 0}
  .legend{display:flex;gap:9px;flex-wrap:wrap;font-size:10.5px;color:var(--dim);align-items:center}
  .legend i{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:3px;vertical-align:middle}
  .pop{position:absolute;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:9px 11px;max-width:300px;box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:6;font-size:11.5px;pointer-events:none}
  .pop h4{margin:0 0 3px;font-size:12.5px}.pop .k{color:var(--dim)}
  select.sc{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:4px 8px;font:inherit;font-size:11.5px}
  .tag{font-size:10px;padding:1px 5px;border-radius:4px;background:var(--panel2);color:var(--dim);border:1px solid var(--line)}

const VW=1280,VH=760;

function esc(s){return(s==null?'':(''+s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function clip(s,n){s=s||'';return s.length>n?s.slice(0,n-1)+'…':s;}
function hint(html){const d=document.createElement('div');d.className='hint';d.innerHTML=html;stage.appendChild(d);}
let popEl=null;
function pop(html,x,y){unpop();popEl=document.createElement('div');popEl.className='pop';popEl.innerHTML=html;stage.appendChild(popEl);const r=stage.getBoundingClientRect();popEl.style.left=Math.min(x+12,r.width-290)+'px';popEl.style.top=Math.min(y+12,r.height-120)+'px';}

function curve(x1,y1,x2,y2){const mx=(x1+x2)/2,my=(y1+y2)/2;return `M${x1} ${y1} Q ${mx} ${my} ${x2} ${y2}`;}
function blastReadout(m,dir){const r=mrel(m);const set=dir==='needs'?r.dependsOn:r.blast;const subs=new Set(set.map(x=>mrel(x).subsystem));
  const sc=REL.subCross[r.subsystem];
  const wire=(arr,lbl,col)=>`<div class="row"><span class="k" style="color:var(--dim)">${lbl}</span><span style="color:${col};text-align:right">${arr.length?esc(clip(arr.join(', '),34)):'—'}</span></div>`;
  return `<h4><span class="chip" style="background:${subCol(m)}">${esc(r.subsystem)}</span></h4>
    <div style="font-weight:700;font-size:14px;margin-bottom:2px">${esc(m)}</div>
    <div class="k" style="color:var(--dim);margin-bottom:6px">${esc(r.desc||'')}</div>
    <div class="big" style="color:${dir==='needs'?'var(--accent)':'var(--bad)'}">${set.length}</div>
    <div class="k" style="color:var(--dim);margin-bottom:4px">${dir==='needs'?'modules it depends on (transitive)':'modules that BREAK if you change it'} · ${subs.size} subsystems</div>
    ${wire(r.directDeps,'wires to →','#58a6ff')}
    ${wire(r.directDependents,'← wired from','#f778ba')}
    ${sc&&sc.siblingsNoCrossTalk?`<div style="margin-top:7px;color:#e3b341;font-size:11px">◇ its section “${esc(r.subsystem)}” has <b>no internal wiring</b> — ${sc.members} siblings, no cross-talk</div>`:''}`;}

/* =========================================================== ① SECTIONS */
function renderSections(){
  // aggregate module dep edges to subsystem-pair ribbons
  const rib=new Map();
  for(const de of depEdges){const a=mrel(de.from).subsystem,b=mrel(de.to).subsystem;if(a===b)continue;const k=a+''+b;
    const o=rib.get(k)||{from:a,to:b,n:0,labels:new Set()};o.n++;de.labels.forEach(l=>l&&o.labels.add(l));rib.set(k,o);}
  const ribs=[...rib.values()];
  const s=svg();stage.appendChild(s);
  // place 9 subsystems on an ellipse, composition-root/domain at bottom
  const cx=VW/2-150,cy=VH/2-15,rx=445,ry=255;
  const pos={};SUBORDER.forEach((sub,i)=>{const ang=-Math.PI/2+ (i/SUBORDER.length)*Math.PI*2;pos[sub]={x:cx+rx*Math.cos(ang),y:cy+ry*Math.sin(ang)};});
  let sel=null;
  const gEdges=el('g',{},s),gNodes=el('g',{},s);
  function draw(){gEdges.innerHTML='';gNodes.innerHTML='';
    for(const r of ribs){const A=pos[r.from],B=pos[r.to];const hot=sel&&(r.from===sel||r.to===sel);
      el('path',{d:curve(A.x,A.y,B.x,B.y),fill:'none',stroke:hot?SUBCOL[r.from]:'#2b3746','stroke-width':hot?Math.min(2+r.n,7):Math.min(1+r.n*0.5,4),'stroke-opacity':sel?(hot?0.9:0.06):0.32},gEdges);
      if(hot){const mx=(A.x+B.x)/2,my=(A.y+B.y)/2;el('text',{x:mx,y:my,'font-size':10,fill:SUBCOL[r.from],'text-anchor':'middle'},gEdges).textContent=clip([...r.labels].slice(0,2).join(', '),22);}}
    for(const sub of SUBORDER){const p=pos[sub];const mods=REL.subsystems[sub];const dim=sel&&sel!==sub&&!ribs.some(r=>(r.from===sel&&r.to===sub)||(r.to===sel&&r.from===sub));
      const w=170,h=54;const g=el('g',{},gNodes);g.style.cursor='pointer';g.style.opacity=dim?0.28:1;
      el('rect',{x:p.x-w/2,y:p.y-h/2,width:w,height:h,rx:10,fill:'#161d27',stroke:SUBCOL[sub],'stroke-width':sel===sub?2.5:1.4},g);
      el('rect',{x:p.x-w/2,y:p.y-h/2,width:6,height:h,rx:3,fill:SUBCOL[sub]},g);
      el('text',{x:p.x-w/2+14,y:p.y-6,'font-size':12,'font-weight':700},g).textContent=clip(sub,20);
      el('text',{x:p.x-w/2+14,y:p.y+11,'font-size':10,fill:'var(--dim)'},g).textContent=mods.length+' modules · blast '+mods.reduce((a,m)=>a+mrel(m).blastN,0);
      g.onclick=ev=>{ev.stopPropagation();sel=sel===sub?null:sub;draw();showSide();};
    }
  }
  function showSide(){let sd=document.getElementById('secside');if(!sel){if(sd)sd.remove();return;}
    if(!sd){sd=document.createElement('div');sd.className='side';sd.id='secside';stage.appendChild(sd);}
    const mods=REL.subsystems[sel];
    const outR=ribs.filter(r=>r.from===sel),inR=ribs.filter(r=>r.to===sel);
    const sc=REL.subCross[sel];
    sd.innerHTML=`<h3><span class="chip" style="background:${SUBCOL[sel]}">${esc(sel)}</span></h3>`+
      (sc&&sc.siblingsNoCrossTalk?`<div style="color:#e3b341;font-size:11px;margin-bottom:6px">◇ ${sc.members} siblings, <b>no cross-talk</b> — these don’t wire to each other</div>`:
        (sc&&sc.intraEdges?`<div class="k" style="color:var(--dim);font-size:11px;margin-bottom:6px">${sc.intraEdges} internal wire${sc.intraEdges>1?'s':''} between members</div>`:''))+
      `<div style="margin:6px 0"><b>Modules (${mods.length})</b></div>`+
      mods.map(m=>`<div style="padding:3px 0;border-top:1px solid var(--line)"><b>${esc(m)}</b> <span class="tag">blast ${mrel(m).blastN}</span><br><span style="color:var(--dim);font-size:11px">${esc(clip(mrel(m).desc||'',60))}</span></div>`).join('')+
      `<div style="margin:10px 0 4px"><b style="color:var(--amber)">→ depends on</b></div>`+
      (outR.length?outR.map(r=>`<div style="font-size:11px">${esc(r.to)} <span class="k" style="color:var(--dim)">via ${esc(clip([...r.labels].join(', '),30))}</span></div>`).join(''):'<div class="k" style="color:var(--dim2)">nothing (foundational/entry)</div>')+
      `<div style="margin:10px 0 4px"><b style="color:var(--bad)">← depended on by</b></div>`+
      (inR.length?inR.map(r=>`<div style="font-size:11px">${esc(r.from)}</div>`).join(''):'<div class="k" style="color:var(--dim2)">nothing</div>');
  }
  draw();
  s.addEventListener('click',()=>{sel=null;draw();showSide();});
  hint(`<b>9 functional sections</b> (named by what they do, not folders). Ribbon width = number of real dependencies. <span class="k">Click a section</span> to see its members + what flows in/out.`);
}

let mapDir='breaks';
function renderMap(){
  vc.innerHTML=`<span class="legend" id="lg"></span>
    <button class="act ${mapDir==='breaks'?'on':''}" id="dB">↑ what breaks if I change it</button>
    <button class="act ${mapDir==='needs'?'on':''}" id="dN">↓ what it depends on</button>`;
  document.getElementById('lg').innerHTML=SUBORDER.map(su=>`<span><i style="background:${SUBCOL[su]}"></i>${clip(su,12)}</span>`).join('');
  document.getElementById('dB').onclick=()=>{mapDir='breaks';render();};
  document.getElementById('dN').onclick=()=>{mapDir='needs';render();};
  const s=svg();stage.appendChild(s);
  // layout: y = dependency depth (rows, base at bottom); x = spread across FULL width,
  // grouped by subsystem within each depth row (colour carries subsystem, so no cramped columns)
  const margin=80;
  const depthMax=Math.max(...MODS.map(m=>mrel(m).depth));
  const yFor=dp=>VH-120-dp*((VH-210)/depthMax);
  const pos={}, byDepth={};
  for(const m of MODS){const dp=mrel(m).depth;(byDepth[dp]=byDepth[dp]||[]).push(m);}
  for(const dp in byDepth){const arr=byDepth[dp].sort((a,b)=>SUBORDER.indexOf(mrel(a).subsystem)-SUBORDER.indexOf(mrel(b).subsystem)||a.localeCompare(b));
    const n=arr.length;arr.forEach((m,i)=>{pos[m]={x:margin+(i+0.5)*(VW-2*margin)/n,y:yFor(dp)};});}
  // depth row guide labels
  for(let dp=0;dp<=depthMax;dp++){el('line',{x1:0,y1:yFor(dp),x2:VW,y2:yFor(dp),stroke:'#1a212b','stroke-width':1},s);
    el('text',{x:8,y:yFor(dp)-4,'font-size':9,fill:'var(--dim2)'},s).textContent=(dp===0?'base ':dp===depthMax?'entry ':'depth ')+dp;}
  const gE=el('g',{},s),gN=el('g',{},s),gL=el('g',{},s);
  let sel=null;
  function draw(){gE.innerHTML='';gN.innerHTML='';gL.innerHTML='';
    const r=sel?mrel(sel):null;const set=sel?new Set([sel,...(mapDir==='needs'?r.dependsOn:r.blast)]):null;
    // edges
    for(const de of depEdges){const A=pos[de.from],B=pos[de.to];if(!A||!B)continue;
      const on=set&&set.has(de.from)&&set.has(de.to);
      el('path',{d:curve(A.x,A.y,B.x,B.y),fill:'none',stroke:on?(mapDir==='needs'?'#58a6ff':'#f85149'):'#2b3746','stroke-width':on?1.7:0.7,'stroke-opacity':sel?(on?0.85:0.05):0.16},gE);
      // labels on edges incident to selected — placed near the OTHER module so they don't bunch at the hub
      if(on && (de.from===sel||de.to===sel) && de.labels.filter(Boolean).length){
        const selp=de.from===sel?A:B, oth=de.from===sel?B:A;
        const lx=selp.x+0.68*(oth.x-selp.x), ly=selp.y+0.68*(oth.y-selp.y);
        el('text',{x:lx,y:ly-2,'font-size':9,fill:'#e6b673','text-anchor':'middle'},gL).textContent=clip(de.labels.filter(Boolean).join(','),16);}}
    // nodes
    for(const m of MODS){const p=pos[m];const rad=5+Math.sqrt(mrel(m).blastN)*2.3;const isHub=m==='state';
      const dim=set&&!set.has(m);const g=el('g',{},gN);g.style.cursor='pointer';g.style.opacity=dim?0.2:1;
      el('circle',{cx:p.x,cy:p.y,r:rad,fill:sel===m?'#fff':subCol(m),stroke:isHub?'#fff':subCol(m),'stroke-width':isHub?2:1,'fill-opacity':sel===m?1:0.85},g);
      if(isHub)el('circle',{cx:p.x,cy:p.y,r:rad+4,fill:'none',stroke:'#fff','stroke-width':0.7,'stroke-dasharray':'2 2'},g);
      el('text',{x:p.x,y:p.y+rad+11,'font-size':isHub?11:9,fill:sel===m?'#fff':(dim?'var(--dim2)':'var(--ink)'),'text-anchor':'middle','font-weight':isHub?700:400},g).textContent=m;
      g.onclick=ev=>{ev.stopPropagation();sel=sel===m?null:m;draw();ro();};
      g.onmouseenter=ev=>{const rr=mrel(m);pop(`<h4>${esc(m)}</h4><div class="k">${esc(rr.subsystem)} · depth ${rr.depth}</div><div>${esc(clip(rr.desc||'',80))}</div><div class="k" style="margin-top:4px">breaks ${rr.blastN} · needs ${rr.dependsOn.length} · reads/used-by ${rr.fanIn}</div>`,ev.offsetX,ev.offsetY);};
      g.onmouseleave=unpop;
    }
  }
  function ro(){let r=document.getElementById('mapro');if(!sel){if(r)r.remove();return;}if(!r){r=document.createElement('div');r.className='readout';r.id='mapro';stage.appendChild(r);}
    r.innerHTML=blastReadout(sel,mapDir==='needs'?'needs':'breaks');}
  draw();s.addEventListener('click',()=>{sel=null;draw();ro();});
  hint(`Vertical = <b>dependency depth</b> (base → entry). Node size = <b>blast radius</b>. <span class="k">Click a module</span> → real wiring + what it does <b>not</b> connect to. <b>state</b> = the hub (dashed).`);
}

/* =========================================================== ③ TYPE FLOW */
function reHas(str,label){return new RegExp('(^|[^A-Za-z0-9_])'+label.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'([^A-Za-z0-9_]|$)').test(str||'');}
let selT=null;
function renderTypeFlow(){
  const types=REL.typeUse; if(!types.length){hint('no typed interfaces');return;}
  if(!selT||!types.find(t=>t.label===selT)) selT=types[0].label;
  const margin=80, depthMax=Math.max(...MODS.map(m=>mrel(m).depth));
  const yFor=dp=>VH-120-dp*((VH-210)/depthMax);
  const pos={}, byDepth={};
  for(const m of MODS){const dp=mrel(m).depth;(byDepth[dp]=byDepth[dp]||[]).push(m);}
  for(const dp in byDepth){const arr=byDepth[dp].sort((a,b)=>SUBORDER.indexOf(mrel(a).subsystem)-SUBORDER.indexOf(mrel(b).subsystem)||a.localeCompare(b));const n=arr.length;arr.forEach((m,i)=>{pos[m]={x:margin+(i+0.5)*(VW-2*margin)/n,y:yFor(dp)};});}
  const wrap=document.createElement('div');wrap.style.cssText='position:absolute;inset:0;display:flex';
  const list=document.createElement('div');list.style.cssText='width:225px;border-right:1px solid var(--line);overflow:auto;background:var(--panel);padding:8px';
  list.innerHTML='<div class="k" style="color:var(--dim);margin-bottom:6px">Types ranked by how many modules touch them. #1 is the app’s <b>shared currency</b>.</div>';
  const canvas=document.createElement('div');canvas.style.cssText='flex:1;position:relative';
  wrap.appendChild(list);wrap.appendChild(canvas);stage.appendChild(wrap);
  types.forEach(t=>{const r=document.createElement('div');r.dataset.t=t.label;
    r.style.cssText='padding:4px 7px;border-radius:6px;cursor:pointer;margin-bottom:2px;border:1px solid '+(t.label===selT?'#56d4dd':'transparent');
    r.innerHTML=`<div style="display:flex;justify-content:space-between"><b>${esc(t.label)}</b><span class="tag">${t.n}</span></div>
      <div style="height:4px;background:#56d4dd;opacity:.6;width:${Math.round(t.n/types[0].n*100)}%;border-radius:2px;margin-top:3px"></div>`;
    r.onmouseenter=()=>r.style.background='var(--panel2)';r.onmouseleave=()=>r.style.background='';
    r.onclick=()=>{selT=t.label;list.querySelectorAll('[data-t]').forEach(x=>x.style.borderColor=x.dataset.t===selT?'#56d4dd':'transparent');draw();};
    list.appendChild(r);});
  function draw(){canvas.querySelectorAll('svg,.readout').forEach(n=>n.remove());const s=svg();canvas.appendChild(s);
    const t=types.find(x=>x.label===selT);const prod=new Set(t.producers),cons=new Set(t.consumers),touch=new Set(t.modules);
    for(const p of t.producers)for(const c of t.consumers){if(p===c)continue;const A=pos[p],B=pos[c];if(!A||!B)continue;
      el('path',{d:curve(A.x,A.y,B.x,B.y),fill:'none',stroke:'#56d4dd','stroke-width':1,'stroke-opacity':.45},s);}
    for(const m of MODS){const p=pos[m];const on=touch.has(m);const isP=prod.has(m);const g=el('g',{},s);g.style.opacity=on?1:0.14;
      el('circle',{cx:p.x,cy:p.y,r:on?9:5,fill:on?(isP?'#3fb950':'#56d4dd'):subCol(m),stroke:on?'#fff':subCol(m),'stroke-width':on?1.5:1},g);
      if(on)el('text',{x:p.x,y:p.y-11,'font-size':9,'text-anchor':'middle',fill:isP?'#3fb950':'#56d4dd'},g).textContent=isP?'▲ makes':'▼ uses';
      el('text',{x:p.x,y:p.y+(on?20:14),'font-size':on?10:8.5,'text-anchor':'middle',fill:on?'#fff':'var(--dim2)'},g).textContent=m;}
    const sigs=[];for(const n of N){if(!n.interfaces)continue;for(const i of n.interfaces){const acc=(i.accepts||[]).some(a=>reHas(a,selT));const ret=reHas(i.returns,selT);if(acc||ret)sigs.push(`${n.module}·${i.name||n.label} ${ret?'→'+selT:''}${acc?' («'+selT+'»)':''}`);}}
    const r=document.createElement('div');r.className='readout';canvas.appendChild(r);
    r.innerHTML=`<h4 style="color:#56d4dd">${esc(selT)}</h4><div class="k" style="color:var(--dim)">defined in: ${esc(t.owner||'—')}</div>
      <div class="big" style="color:#56d4dd">${t.n}</div><div class="k" style="color:var(--dim)">of 40 modules touch it · ${t.producers.length} make ▲ · ${t.consumers.length} use ▼</div>
      <div style="margin-top:8px;max-height:190px;overflow:auto;border-top:1px solid var(--line);padding-top:6px">${sigs.slice(0,12).map(x=>`<div style="font-size:10.5px;color:#c9d4e0;padding:1px 0">${esc(x)}</div>`).join('')}${sigs.length>12?`<div class="k" style="color:var(--dim2)">+${sigs.length-12} more signatures</div>`:''}</div>`;
  }
  draw();
  hint(`<b>Follow a data contract.</b> Pick a type → every module that <b style="color:#3fb950">▲ makes</b> or <b style="color:#56d4dd">▼ uses</b> it lights up, edges show the flow. #1 (<b>${esc(types[0].label)}</b>, ${types[0].n} modules) is this app’s shared currency — like DocDraft.`);
}

/* =========================================================== ③ BEHAVIOR FLOW */
const SCENARIOS=[
  {name:'Cold boot (app start)',type:'boot'},
  {name:'Drag a node',entry:'pointer',verb:'user drags on canvas'},
  {name:'Edit a node’s frontmatter',entry:'inspectorFrontmatter',verb:'user edits the inspector'},
  {name:'Undo',entry:'history',verb:'user presses ⌘Z'},
  {name:'Save / load a .mmd',entry:'files',verb:'user saves or loads a file'},
  {name:'Review a plan',entry:'planner',verb:'user reviews a change plan'},
];
let scIdx=1, flowStep=0, flowTimer=null;
function flowStages(sc){
  if(sc.type==='boot') return BOOT.map(b=>({mods:[b.mod],why:b.label,order:b.order}));
  // interaction trace: entry -> its deps toward the model -> state -> state readers re-derive
  const r=mrel(sc.entry);
  const stages=[{mods:[sc.entry],why:sc.verb}];
  const deps=r.directDeps.filter(x=>x!=='state');
  if(deps.length) stages.push({mods:deps,why:'calls '+deps.map(d=>{const de=depEdges.find(e=>e.from===sc.entry&&e.to===d);return d+(de&&de.labels[0]?'·'+de.labels[0]:'');}).join(', ')});
  stages.push({mods:['state'],why:'mutates the shared model (source of truth)'});
  const readers=['render','wires','camera','minimap','layout','selection'].filter(x=>(mrel('state')?REL.stateReaders.some(s=>s.module===x):false));
  stages.push({mods:readers,why:'everything that reads state re-derives → screen updates'});
  return stages;
}
function renderFlow(){
  vc.innerHTML=`<select class="sc" id="scSel">${SCENARIOS.map((s,i)=>`<option value="${i}" ${i===scIdx?'selected':''}>${esc(s.name)}</option>`).join('')}</select>
    <button class="act" id="fPrev">◂</button><button class="act" id="fPlay">▶ play</button><button class="act" id="fNext">▸</button>`;
  document.getElementById('scSel').onchange=e=>{scIdx=+e.target.value;flowStep=0;render();};
  const sc=SCENARIOS[scIdx], stages=flowStages(sc);
  const s=svg();stage.appendChild(s);
  // lanes = subsystems (rows); stages left->right
  const lanes=SUBORDER;const laneH=(VH-70)/lanes.length;const laneY=su=>50+lanes.indexOf(su)*laneH+laneH/2;
  lanes.forEach((su,i)=>{el('rect',{x:0,y:50+i*laneH,width:VW,height:laneH,fill:i%2?'#10151c':'#0d1117'},s);
    el('text',{x:10,y:50+i*laneH+laneH/2,'font-size':10,fill:SUBCOL[su],'dominant-baseline':'middle'},s).textContent=clip(su,16);});
  const x0=175,x1=VW-40,stepX=(x1-x0)/Math.max(1,stages.length-1);
  function draw(){[...s.querySelectorAll('.dyn')].forEach(n=>n.remove());
    const g=el('g',{class:'dyn'},s);
    // connectors between consecutive stages
    for(let i=0;i<stages.length-1;i++){const a=stages[i],b=stages[i+1];
      for(const ma of a.mods)for(const mb of b.mods){const ax=x0+i*stepX,bx=x0+(i+1)*stepX;
        el('path',{d:curve(ax,laneY(mrel(ma).subsystem),bx,laneY(mrel(mb).subsystem)),fill:'none',stroke:'#2b3746','stroke-width':1,'stroke-opacity':i<flowStep?0.5:0.14},g);}}
    stages.forEach((st,i)=>{const on=i===flowStep,past=i<flowStep;const x=x0+i*stepX;
      // step number marker on top axis
      el('circle',{cx:x,cy:34,r:on?11:8,fill:on?'#fff':(past?'#3fb950':'#161d27'),stroke:'#3fb950','stroke-width':1.5},g);
      el('text',{x:x,y:34,'font-size':on?11:9,'text-anchor':'middle','dominant-baseline':'middle',fill:on?'#0d1117':'#c9d4e0','font-weight':700},g).textContent=(i+1);
      const laneGroups={};st.mods.forEach(mm=>{(laneGroups[mrel(mm).subsystem]=laneGroups[mrel(mm).subsystem]||[]).push(mm);});
      for(const m of st.mods){const lane=mrel(m).subsystem;const grp=laneGroups[lane];const gi=grp.indexOf(m);
        const mx=x+(gi-(grp.length-1)/2)*60; const y=laneY(lane);const w=Math.max(46,m.length*7+14);
        const gg=el('g',{},g);gg.style.opacity=on?1:(past?0.6:0.32);
        el('rect',{x:mx-w/2,y:y-12,width:w,height:24,rx:6,fill:on?'#1b2630':'#161d27',stroke:subCol(m),'stroke-width':on?2:1},gg);
        el('text',{x:mx,y:y,'font-size':11,'text-anchor':'middle','dominant-baseline':'middle',fill:on?'#fff':'#c9d4e0'},gg).textContent=m;}
    });
    // caption for current stage
    const st=stages[flowStep];
    let cap=document.getElementById('flowcap');if(!cap){cap=document.createElement('div');cap.className='readout';cap.id='flowcap';stage.appendChild(cap);}
    cap.style.top='auto';cap.style.bottom='34px';cap.style.left='auto';cap.style.right='14px';
    cap.innerHTML=`<h4>step ${flowStep+1}/${stages.length} — ${esc(sc.name)}</h4><div>${esc(st.mods.join(', '))}</div><div class="k" style="color:var(--dim);margin-top:3px">${esc(st.why||'')}</div>`;
  }
  draw();
  document.getElementById('fPrev').onclick=()=>{flowStep=Math.max(0,flowStep-1);draw();};
  document.getElementById('fNext').onclick=()=>{flowStep=Math.min(stages.length-1,flowStep+1);draw();};
  document.getElementById('fPlay').onclick=function(){if(flowTimer){clearInterval(flowTimer);flowTimer=null;this.textContent='▶ play';return;}this.textContent='❚❚';flowTimer=setInterval(()=>{if(flowStep>=stages.length-1){clearInterval(flowTimer);flowTimer=null;const b=document.getElementById('fPlay');if(b)b.textContent='▶ play';return;}flowStep++;draw();},900);};
  hint(`<b>How it works, as a sequence.</b> Pick a scenario; each step shows which modules fire and <span class="k">why</span>. Cold boot uses the real numbered call-order; interactions trace entry → <b>state</b> → re-derive.`);
}

/* =========================================================== ④ STATE HUB */
function renderHub(){
  const readers=REL.stateReaders;// [{module,uses:[]}]
  const s=svg();stage.appendChild(s);
  const cx=VW/2-140,cy=VH/2,R=270;
  // center
  el('circle',{cx,cy,r:64,fill:'#161d27',stroke:'#fff','stroke-width':2},s);
  el('text',{x:cx,y:cy-6,'font-size':18,'font-weight':700,'text-anchor':'middle',fill:'#fff'},s).textContent='state';
  el('text',{x:cx,y:cy+13,'font-size':10,fill:'var(--dim)','text-anchor':'middle'},s).textContent='source of truth';
  el('text',{x:cx,y:cy+27,'font-size':10,fill:'var(--amber)','text-anchor':'middle'},s).textContent=readers.length+' readers · blast 22';
  const gE=el('g',{},s),gN=el('g',{},s);
  // collect distinct slices
  const slices=[...new Set(readers.flatMap(r=>r.uses))].filter(Boolean);
  let selSlice=null;
  function draw(){gE.innerHTML='';gN.innerHTML='';
    readers.forEach((rd,i)=>{const ang=-Math.PI/2+(i/readers.length)*Math.PI*2;const x=cx+R*Math.cos(ang),y=cy+R*Math.sin(ang);
      const hot=selSlice&&rd.uses.includes(selSlice);const dim=selSlice&&!hot;
      el('path',{d:curve(cx+64*Math.cos(ang),cy+64*Math.sin(ang),x,y),fill:'none',stroke:hot?'#ffa657':subCol(rd.module),'stroke-width':hot?2.4:1.2,'stroke-opacity':dim?0.12:0.7},gE);
      const mx=cx+(64+R)/2*Math.cos(ang),my=cy+(64+R)/2*Math.sin(ang);
      el('text',{x:mx,y:my,'font-size':9,fill:hot?'#ffa657':'var(--dim)','text-anchor':'middle'},gE).textContent=clip(rd.uses.join(','),16);
      const g=el('g',{},gN);g.style.opacity=dim?0.3:1;g.style.cursor='pointer';const w=Math.max(50,rd.module.length*7+12);
      el('rect',{x:x-w/2,y:y-12,width:w,height:24,rx:6,fill:'#1b2630',stroke:subCol(rd.module),'stroke-width':hot?2:1},g);
      el('text',{x,y,'font-size':10.5,'text-anchor':'middle','dominant-baseline':'middle'},g).textContent=rd.module;
    });
  }
  draw();
  // slice selector
  const sd=document.createElement('div');sd.className='side';sd.innerHTML=`<h3>state slices</h3><div class="k" style="color:var(--dim);margin-bottom:8px">Click a slice → the modules that read it light up. Changing that field's shape breaks exactly those.</div>`+
    slices.map(sl=>{const who=readers.filter(r=>r.uses.includes(sl)).map(r=>r.module);
      return `<div class="row" data-sl="${esc(sl)}" style="padding:5px 7px;border-radius:6px;cursor:pointer;border:1px solid var(--line);margin-bottom:4px"><code style="color:var(--amber)">${esc(sl)}</code> <span class="tag">${who.length}</span><br><span style="font-size:10.5px;color:var(--dim)">${esc(who.join(', '))}</span></div>`;}).join('');
  stage.appendChild(sd);
  sd.querySelectorAll('[data-sl]').forEach(el2=>el2.onclick=()=>{selSlice=selSlice===el2.dataset.sl?null:el2.dataset.sl;draw();
    sd.querySelectorAll('[data-sl]').forEach(x=>x.style.borderColor=x.dataset.sl===selSlice?'var(--amber)':'var(--line)');});
  hint(`The app’s architecture in one picture: <b>no module imports another</b> — they all read one shared <b>state</b>. Each spoke shows <span class="k">what slice</span> that module reads. Click a slice for field-level blast radius.`);
}

/* =========================================================== ⑤ BLAST SIMULATOR */
let blastSel=new Set(['state']);
function renderBlast(){
  const ranked=[...MODS].sort((a,b)=>mrel(b).blastN-mrel(a).blastN);
  vc.innerHTML=`<span class="legend"><i style="background:#f85149"></i>impact ripple · pick module(s) on the left</span>`;
  const wrap=document.createElement('div');wrap.style.cssText='position:absolute;inset:0;bottom:26px;display:flex';
  const list=document.createElement('div');list.style.cssText='width:250px;border-right:1px solid var(--line);overflow:auto;background:var(--panel);padding:8px';
  list.innerHTML=`<div class="k" style="color:var(--dim);margin-bottom:6px">Modules ranked by blast radius. Toggle any (multi-select a refactor).</div>`+
    ranked.map(m=>{const r=mrel(m);const on=blastSel.has(m);const bw=Math.round(r.blastN/36*90);
      return `<div class="row" data-m="${m}" style="padding:4px 7px;border-radius:6px;cursor:pointer;border:1px solid ${on?'var(--bad)':'transparent'};background:${on?'#231a1c':'transparent'};margin-bottom:2px">
        <div style="display:flex;justify-content:space-between"><b>${esc(m)}</b><span class="tag">${r.blastN}</span></div>
        <div style="height:4px;background:#f85149;opacity:.6;width:${bw}%;border-radius:2px;margin-top:3px"></div>
        <span style="font-size:10px;color:var(--dim)">${esc(r.subsystem)}${r.blastN===0?' · safe to edit':''}</span></div>`;}).join('');
  const canvas=document.createElement('div');canvas.style.cssText='flex:1;position:relative';
  wrap.appendChild(list);wrap.appendChild(canvas);stage.appendChild(wrap);
  list.querySelectorAll('[data-m]').forEach(el2=>el2.onclick=()=>{const m=el2.dataset.m;if(blastSel.has(m))blastSel.delete(m);else blastSel.add(m);if(!blastSel.size)blastSel.add(m);render();});
  drawBlast(canvas);
  hint(`<b>Plan a change.</b> Select module(s) → the union of everything transitively impacted ripples outward by hop distance, each break labelled with the <span class="k">contract</span> that carries it.`);
}
function drawBlast(canvas){
  const s=svg();canvas.appendChild(s);
  const sel=[...blastSel];
  // union blast with hop distance (BFS over reverse deps)
  const inAdj={};for(const de of depEdges){(inAdj[de.to]=inAdj[de.to]||[]).push(de.from);}
  const hop={};for(const m of sel)hop[m]=0;let frontier=[...sel];let h=0;
  while(frontier.length){h++;const nx=[];for(const x of frontier)for(const y of (inAdj[x]||[]))if(hop[y]==null){hop[y]=h;nx.push(y);}frontier=nx;}
  const impacted=Object.keys(hop).filter(m=>!blastSel.has(m));
  const maxHop=Math.max(1,...Object.values(hop));
  const cx=380,cy=VH/2;
  // rings
  for(let r=1;r<=maxHop;r++){el('circle',{cx,cy,r:r*120,fill:'none',stroke:'#232b36','stroke-dasharray':'3 4'},s);
    el('text',{x:cx,y:cy-r*120+13,'font-size':10,fill:'var(--dim2)','text-anchor':'middle'},s).textContent='hop '+r;}
  // center selection
  sel.forEach((m,i)=>{const a=-Math.PI/2+i/sel.length*Math.PI*2;const x=cx+(sel.length>1?26:0)*Math.cos(a),y=cy+(sel.length>1?26:0)*Math.sin(a);
    el('circle',{cx:x,cy:y,r:16,fill:'#fff',stroke:'#f85149','stroke-width':2},s);
    el('text',{x,y:y-22,'font-size':11,'text-anchor':'middle',fill:'#fff','font-weight':700},s).textContent=m;});
  // impacted nodes placed on their hop ring
  const byHop={};impacted.forEach(m=>{(byHop[hop[m]]=byHop[hop[m]]||[]).push(m);});
  for(const hh in byHop){const arr=byHop[hh];arr.forEach((m,k)=>{const a=-Math.PI/2+ (k/arr.length)*Math.PI*2 + hh*0.3;const x=cx+hh*120*Math.cos(a),y=cy+hh*120*Math.sin(a);
    // edge to a nearer cause
    el('circle',{cx:x,cy:y,r:6,fill:subCol(m)},s);
    el('text',{x,y:y-9,'font-size':9,'text-anchor':'middle',fill:'var(--ink)'},s).textContent=m;});}
  // readout
  const r=document.createElement('div');r.className='readout';r.style.right='14px';r.style.left='auto';
  const subs=new Set(impacted.map(m=>mrel(m).subsystem));
  r.innerHTML=`<h4>change ${sel.map(esc).join(' + ')}</h4><div class="big" style="color:var(--bad)">${impacted.length}</div>
    <div class="k" style="color:var(--dim)">modules to retest · ${subs.size} subsystems · ${maxHop} hops deep</div>
    <div style="margin-top:8px">${[...subs].map(su=>`<span class="chip" style="background:${SUBCOL[su]}">${esc(clip(su,14))}</span>`).join('')}</div>`;
  canvas.appendChild(r);
}

setTabs();render();
</script>
