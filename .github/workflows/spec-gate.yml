name: spec-gate

# Two guarantees on every change:
#   1. buildspec-tests — the tooling's own test suite stays green.
#   2. novakai-drift   — the committed architecture map (docs/novakai) stays
#      fresh, complete, and in sync with the real code under src/. This is the
#      guard that stops a new module from landing undocumented.

# AUD5/F-07: NO path filter — the old one excluded .claude/** (the hooks),
# public/plan.json (the exact file cert/plan-check/acceptance target) and
# root configs, so commits touching only those never ran the gate. Every
# push and PR gates; gate-parity.test.mjs fails if a filter reappears.
on:
  push:
  pull_request:

jobs:
  buildspec-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      # AUD5/F-06 — ONE canonical gate list: CI consumes package.json's
      # spec:test:all verbatim instead of enumerating its own test steps
      # (attack A7 found the two lists diverging in both directions).
      # gate-parity.test.mjs — inside the suite — fails if a CI-only test
      # enumeration ever reappears here or novakai:verify:full loses a gate.
      - run: npm run spec:test:all
      # J1 — no PR step typechecked src/ before this (tsx/esbuild strip types
      # unchecked); deploy.yml's tsc ran post-merge on main only.
      - run: npm run typecheck
      # J1 — the orphaned characterization suite (tests/characterization/),
      # previously not wired into CI at all.
      - run: npm run test:src
      # E2/E4 enforced on the REAL plan (not just the engine's self-test): the
      # in-flight plan's behavioural acceptance contract must stay green.
      - run: npm run novakai:acceptance -- --plan public/plan.json
      # J1 — growing behavioural corpus harvested from completed plans (append-only).
      # Red here means a regression, or deliberately edit/delete the case in
      # docs/novakai/acceptance-corpus.plan.json in the same PR.
      - run: npm run novakai:acceptance -- --plan docs/novakai/acceptance-corpus.plan.json

  # Drift gate for THIS repo's own map. Regenerates the bundle from the
  # per-folder fragments and fails if:
  #   - the committed _bundle.mmd is stale (fragments changed, not re-bundled),
  #   - the map is not grammar-valid or structurally sound (validate + lint),
  #   - a source file is not represented in the map (coverage),
  #   - a documented signature drifted from the real code (gate).
  novakai-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # AUD5/F-02: handoff:check compares commit timestamps per path; a
          # depth-1 clone makes every path resolve to the boundary commit
          # (permanent tie -> the gate was vacuous). Full history required —
          # and handoff-fresh --check now fails closed on shallow clones.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund

      - name: Regenerate the bundle from fragments
        run: npm run novakai:bundle

      - name: Committed bundle must be fresh
        run: |
          git diff --exit-code docs/novakai/_bundle.mmd \
            || (echo "::error::docs/novakai/_bundle.mmd is stale. Run 'npm run novakai:ship' and commit the result." && exit 1)

      - name: Map is grammar-valid
        run: npm run novakai:validate

      - name: Map is structurally sound (not a flat file-mirror)
        run: npm run novakai:lint

      - name: Every source file is represented (file completeness)
        run: npm run novakai:coverage

      - name: Every exported symbol is represented (symbol completeness)
        run: npm run novakai:exports

      - name: Documented signatures match the code (no drift)
        run: npm run novakai:gate

      - name: Every edge is code-backed or audited (A5 — blast-radius is trustworthy)
        run: npm run novakai:edges

      # public/bodies.json is gitignored (client loads its own copy) so it does
      # not exist on a fresh checkout. The G1 step below (contract.mjs) reads
      # it unconditionally and crashes with ENOENT without this — regenerate it
      # here, same position novakai:ship:steps uses (bundle..edges, then bodies).
      - name: Regenerate bodies.json + derived-fn-edges.json (needed by G1 packet contract)
        run: npm run novakai:bodies

      - name: Roadmap status is computed, not prose (no stale status in CLAUDE.md)
        run: npm run novakai:roadmap:audit

      - name: In-flight plan still certifies (apply → stubs → tsc → gate, delta vs base)
        run: npm run novakai:cert -- --plan public/plan.json

      - name: In-flight plan is internally coherent (C3 — real ids, acyclic deps)
        run: npm run novakai:plan-check -- --plan public/plan.json

      - name: slice-completeness gate (G1) — packet emits + cone complete per change
        run: |
          set -euo pipefail
          ids=$(node -e "for (const c of require('./public/plan.json').changes) console.log(c.id);")
          for id in $ids; do
            echo "=== contract packet: $id ==="
            node tools/novakai/contract/contract.mjs --change "$id" --json > /dev/null
          done

      - name: Handoff is not stale vs the code (F4 — the meta-loop is enforced)
        run: npm run novakai:handoff:check

  # J1 — app regression net: Playwright journeys + golden screenshots against
  # the real running app. Separate job/tier (needs a browser install; goldens
  # are linux-only) — deliberately NOT folded into novakai:verify:full.
  app-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
