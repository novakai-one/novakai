name: spec-gate

# Two guarantees on every change:
#   1. buildspec-tests — the tooling's own test suite stays green.
#   2. flowmap-drift   — the committed architecture map (docs/flowmap) stays
#      fresh, complete, and in sync with the real code under src/. This is the
#      guard that stops a new module from landing undocumented.

on:
  push:
    paths:
      - 'src/**'
      - 'docs/flowmap/**'
      - 'tools/**'
      - '.github/workflows/spec-gate.yml'
      - 'package.json'
  pull_request:
    paths:
      - 'src/**'
      - 'docs/flowmap/**'
      - 'tools/**'
      - '.github/workflows/spec-gate.yml'
      - 'package.json'

jobs:
  buildspec-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      # AUD5/F-06 — ONE canonical gate list: CI consumes package.json's
      # spec:test:all verbatim instead of enumerating its own test steps
      # (attack A7 found the two lists diverging in both directions).
      # gate-parity.test.mjs — inside the suite — fails if a CI-only test
      # enumeration ever reappears here or flowmap:verify:full loses a gate.
      - run: npm run spec:test:all
      # E2/E4 enforced on the REAL plan (not just the engine's self-test): the
      # in-flight plan's behavioural acceptance contract must stay green.
      - run: npm run flowmap:acceptance -- --plan public/plan.json

  # Drift gate for THIS repo's own map. Regenerates the bundle from the
  # per-folder fragments and fails if:
  #   - the committed _bundle.mmd is stale (fragments changed, not re-bundled),
  #   - the map is not grammar-valid or structurally sound (validate + lint),
  #   - a source file is not represented in the map (coverage),
  #   - a documented signature drifted from the real code (gate).
  flowmap-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # AUD5/F-02: handoff:check compares commit timestamps per path; a
          # depth-1 clone makes every path resolve to the boundary commit
          # (permanent tie -> the gate was vacuous). Full history required —
          # and handoff-fresh --check now fails closed on shallow clones.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund

      - name: Regenerate the bundle from fragments
        run: npm run flowmap:bundle

      - name: Committed bundle must be fresh
        run: |
          git diff --exit-code docs/flowmap/_bundle.mmd \
            || (echo "::error::docs/flowmap/_bundle.mmd is stale. Run 'npm run flowmap:ship' and commit the result." && exit 1)

      - name: Map is grammar-valid
        run: npm run flowmap:validate

      - name: Map is structurally sound (not a flat file-mirror)
        run: npm run flowmap:lint

      - name: Every source file is represented (file completeness)
        run: npm run flowmap:coverage

      - name: Every exported symbol is represented (symbol completeness)
        run: npm run flowmap:exports

      - name: Documented signatures match the code (no drift)
        run: npm run flowmap:gate

      - name: Every edge is code-backed or audited (A5 — blast-radius is trustworthy)
        run: npm run flowmap:edges

      - name: Roadmap status is computed, not prose (no stale status in CLAUDE.md)
        run: npm run flowmap:roadmap:audit

      - name: In-flight plan still certifies (apply → stubs → tsc → gate, delta vs base)
        run: npm run flowmap:cert -- --plan public/plan.json

      - name: In-flight plan is internally coherent (C3 — real ids, acyclic deps)
        run: npm run flowmap:plan-check -- --plan public/plan.json

      - name: Handoff is not stale vs the code (F4 — the meta-loop is enforced)
        run: npm run flowmap:handoff:check
