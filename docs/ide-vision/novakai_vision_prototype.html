<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>novakai</title>
<style>
/* ============================================================================
   novakai — vision prototype
   one file · no external requests · vanilla everything
   ----------------------------------------------------------------------------
   CSS table of contents
     1. palette + reset
     2. base typography, scrollbars, focus, selection
     3. app shell: rail, header, page host, page transitions
     4. shared components: buttons, chips, cards, ticks, dots, toggles,
        expandable rows, tooltip (hover-evidence), thinking dots
     5. canvas page: grid, vignette, world, nodes, edges, node panel,
        footer strip, first-open hint
     6. draft canvas module (the embedded live prototype)
     7. prototypes page: rest view, thread, draft card, assumptions
     8. builds page: list, document, trust box, spec, contract, activity,
        review, ledger
     9. keyframes
   ========================================================================== */

/* ----------------------------------------------------------------------------
   1. palette + reset
   -------------------------------------------------------------------------- */

:root {
  --bg:#0f1216; --grid:#181c24; --panel:#161a21; --panel-2:#1d222c; --panel-3:#252b38;
  --line:#2a3140; --line-bright:#3a4254;
  --ink:#e7eaf1; --ink-dim:#8b94a6; --ink-faint:#565f6e;
  --accent:#7c8cff; --accent-2:#d9a066; --accent-3:#6f9bd8;
  --danger:#e9697f; --sel:#7c8cff;
  --node-bg:#1d222c; --node-stroke:#3a4254; --node-ink:#e7eaf1;
  --edge:#6a7384; --edge-sel:#4fe0cd; --label-bg:#11151c;
  --proven:#5fd0a0; --attested:#d9a066; --unproven:#565f6e;
  --radius:9px;
  --ground:#12151a;               /* evidence/proof ground — the layer beneath */
  --mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --ease:cubic-bezier(.22,1,.36,1);          /* the one easing, everywhere */
  --ease-sheet:cubic-bezier(.32,.72,0,1);    /* native-sheet curve, panel entry only */

  /* depth = tone + hairline + a 1px inner top highlight; near-zero shadows.
     the ONE drop shadow in the app lives on the selected canvas node. */
  --shadow-node:inset 0 1px 0 rgba(255,255,255,.03);
  --shadow-card:inset 0 1px 0 rgba(255,255,255,.03);
  --shadow-modal:inset 0 1px 0 rgba(255,255,255,.03);
  --glow-sel:0 0 0 1.5px var(--sel), 0 0 24px color-mix(in srgb, var(--sel) 25%, transparent);
}

/* keyboard-initiated actions are never animated — this class is stamped on
   <html> for one frame around Escape handling */
html.kbd-instant *, html.kbd-instant *::before, html.kbd-instant *::after {
  transition-duration:0s !important;
  animation-duration:0s !important;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body { height:100%; }

body {
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  font-size:13px;
  line-height:1.5;
  min-width:1280px;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

/* ----------------------------------------------------------------------------
   2. base typography, scrollbars, focus, selection
   -------------------------------------------------------------------------- */

::selection { background:color-mix(in srgb, var(--accent) 30%, transparent); }

::-webkit-scrollbar { width:8px; height:8px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--panel-3); border-radius:4px; }
::-webkit-scrollbar-thumb:hover { background:var(--line-bright); }
::-webkit-scrollbar-corner { background:transparent; }
* { scrollbar-width:thin; scrollbar-color:var(--panel-3) transparent; }

:focus { outline:none; }
/* crisp gap+ring, appears instantly — focus must never be ambiguous */
:focus-visible {
  outline:2px solid var(--accent);
  outline-offset:2px;
  border-radius:3px;
  transition:none;
}

.mono { font-family:var(--mono); }

/* section titles — 10px mono uppercase, wide tracking */
.sec-title {
  font-family:var(--mono);
  font-size:10px;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:var(--ink-dim);
  user-select:none;
}

/* designed empty state: one dim mono line + beneath it, fainter, the command
   that would populate the view */
.empty {
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-faint);
  text-align:center;
  padding:64px 0;
  user-select:none;
}
.empty .empty-cmd {
  display:block;
  margin-top:6px;
  color:color-mix(in srgb, var(--ink-faint) 55%, transparent);
}
/* the node panel is left-ragged — its empty states align left */
.np-sec .empty { text-align:left; }

/* list pages: the content block sits vertically centered (two auto margins
   split the free space) and a dim mono line anchors the bottom — the §D
   empty-state grammar, so the composition is intentional, never a void */
.list-center { display:flex; flex-direction:column; min-height:100%; }
.list-center > :first-child { margin-top:auto; }
.list-center > .pt-try { align-self:flex-start; }  /* don't stretch the ghost */
.list-anchor {
  margin-top:auto;
  padding-top:56px;
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-faint);
  text-align:center;
  user-select:none;
}
.list-anchor .empty-cmd {
  display:block;
  margin-top:6px;
  color:color-mix(in srgb, var(--ink-faint) 55%, transparent);
}

input, textarea, button { font-family:inherit; font-size:inherit; color:inherit; }

/* ----------------------------------------------------------------------------
   3. app shell
   -------------------------------------------------------------------------- */

#app { display:flex; height:100%; }

/* --- icon rail ----------------------------------------------------------- */

#rail {
  width:68px;
  flex:0 0 auto;
  background:var(--panel);
  border-right:1px solid var(--line);
  display:flex;
  flex-direction:column;
  align-items:stretch;
  padding:10px 0;
  position:relative;
  z-index:40;
  overflow:hidden;
}

.rail-item {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  height:56px;
  padding:0;
  background:none;
  border:none;
  cursor:pointer;
  color:var(--ink-dim);
  position:relative;
  white-space:nowrap;
  transition:color 240ms var(--ease), background 240ms var(--ease);
}
.rail-item:hover { color:var(--ink); background:color-mix(in srgb, var(--panel-2) 60%, transparent); }
.rail-item.active { color:var(--ink); }
.rail-item.active::before {
  content:'';
  position:absolute;
  left:0; top:10px; bottom:10px;
  width:2px;
  border-radius:1px;
  background:var(--accent);
}

.rail-icon {
  width:24px; height:24px;
  flex:0 0 auto;
  display:grid;
  place-items:center;
  position:relative;
}
.rail-icon svg { width:19px; height:19px; display:block; }

/* labels are permanent — a cold user can tell the pages apart at rest */
.rail-label {
  font-family:var(--mono);
  font-size:9.5px;
  letter-spacing:.04em;
  color:var(--ink-faint);
  transition:color 240ms var(--ease);
}
.rail-item:hover .rail-label,
.rail-item.active .rail-label { color:inherit; }

/* the Builds count dot — present only while a build awaits the human */
.rail-dot {
  position:absolute;
  top:-4px; right:-6px;
  min-width:14px; height:14px;
  padding:0 3px;
  border-radius:7px;
  background:var(--accent);
  color:#fff;
  font-family:var(--mono);
  font-size:9px;
  font-weight:600;
  line-height:14px;
  text-align:center;
  opacity:0;
  transform:scale(.6);
  transition:opacity 400ms var(--ease), transform 400ms var(--ease);
  pointer-events:none;
}
.rail-dot.on { opacity:1; transform:scale(1); }

.rail-spacer { flex:1 1 auto; }

/* muted gate glyph at the bottom of the rail */
.rail-gate {
  color:var(--ink-faint);
  cursor:default;
}
.rail-gate:hover { color:var(--ink-dim); background:none; }

/* --- header --------------------------------------------------------------- */

#main { flex:1 1 auto; display:flex; flex-direction:column; min-width:0; }

#header {
  height:44px;
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 20px;
  border-bottom:1px solid var(--line);
  background:var(--bg);
  user-select:none;
}
.wordmark {
  font-family:var(--mono);
  font-size:13px;
  font-weight:600;
  letter-spacing:.02em;
  color:var(--ink);
  display:inline-flex;
  align-items:center;
  gap:7px;
}
/* the smallest always-on trust signal — settles to --proven when the gate's
   verify pulse completes on load, then never moves again */
.wordmark-dot {
  width:2px; height:2px;
  border-radius:50%;
  background:var(--ink-faint);
  transition:background 900ms var(--ease), box-shadow 900ms var(--ease);
}
.wordmark-dot.verified {
  background:var(--proven);
  box-shadow:0 0 5px rgba(95,208,160,.6);
}
.page-name {
  font-size:12.5px;
  color:var(--ink-dim);
  transition:opacity 240ms var(--ease);
}

/* --- page host + transitions ---------------------------------------------- */

#host { flex:1 1 auto; position:relative; overflow:hidden; }

.page {
  position:absolute;
  inset:0;
  opacity:1;
  transform:none;
  transition:opacity 480ms var(--ease), transform 480ms var(--ease);
}
.page.pre-enter { opacity:0; transform:translateY(12px); }
.page.leave     { opacity:0; transform:translateY(-12px); pointer-events:none; }

/* scrollable column pages (prototypes, builds) */
.scroll-page { overflow-y:auto; overflow-x:hidden; }

/* ----------------------------------------------------------------------------
   4. shared components
   -------------------------------------------------------------------------- */

/* --- buttons --------------------------------------------------------------- */

.btn {
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:6px 14px;
  border-radius:7px;
  border:1px solid var(--line);
  background:var(--panel-2);
  color:var(--ink);
  font-size:12.5px;
  cursor:pointer;
  user-select:none;
  transition:border-color 240ms var(--ease), background 240ms var(--ease),
             color 240ms var(--ease), opacity 240ms var(--ease);
}
.btn:hover { border-color:var(--line-bright); background:var(--panel-3); }
.btn:active { transform:translateY(.5px); }
.btn:disabled { opacity:.45; cursor:default; }

.btn-primary {
  border-color:color-mix(in srgb, var(--accent) 45%, var(--line));
  background:color-mix(in srgb, var(--accent) 14%, var(--panel-2));
}
.btn-primary:hover {
  border-color:color-mix(in srgb, var(--accent) 65%, var(--line));
  background:color-mix(in srgb, var(--accent) 20%, var(--panel-2));
}

.btn-quiet {
  border-color:transparent;
  background:transparent;
  color:var(--ink-dim);
  padding:5px 10px;
}
.btn-quiet:hover { border-color:var(--line); background:var(--panel-2); color:var(--ink); }

/* quiet inline link */
.link-quiet {
  background:none; border:none; padding:0;
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-dim);
  cursor:pointer;
  transition:color 240ms var(--ease);
}
.link-quiet:hover { color:var(--accent); }

/* --- status chips ----------------------------------------------------------
   mono 10.5px, quiet tints per state */

.chip {
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-family:var(--mono);
  font-size:10.5px;
  letter-spacing:.03em;
  padding:2px 8px;
  border-radius:5px;   /* squarer chip — no capsule pills (Chris ruling 2026-07-07) */
  border:1px solid var(--line);
  color:var(--ink-dim);
  background:var(--panel);
  white-space:nowrap;
  user-select:none;
  transition:color 500ms var(--ease), border-color 500ms var(--ease),
             background 500ms var(--ease);
}
.chip-faint  { color:var(--ink-faint); }
.chip-accent {
  color:var(--accent);
  border-color:color-mix(in srgb, var(--accent) 35%, var(--line));
  background:color-mix(in srgb, var(--accent) 8%, var(--panel));
}
.chip-amber {
  color:var(--accent-2);
  border-color:color-mix(in srgb, var(--accent-2) 35%, var(--line));
  background:color-mix(in srgb, var(--accent-2) 8%, var(--panel));
}
.chip-green {
  color:var(--proven);
  border-color:color-mix(in srgb, var(--proven) 35%, var(--line));
  background:color-mix(in srgb, var(--proven) 8%, var(--panel));
}
.chip-danger {
  color:var(--danger);
  border-color:color-mix(in srgb, var(--danger) 35%, var(--line));
  background:color-mix(in srgb, var(--danger) 8%, var(--panel));
}

/* status pills — ONE treatment: outline + 6px status dot + mono label,
   states differ only in hue */
.chip-dot { width:6px; height:6px; border-radius:50%; flex:0 0 auto; background:var(--ink-faint); }
.chip-dot.accent { background:var(--accent); }
.chip-dot.amber  { background:var(--accent-2); }
.chip-dot.green  { background:var(--proven); }

/* the slow-breathing dot — the one allowed at-rest animation, and only on a
   genuinely running build */
.chip-breathe-dot {
  width:6px; height:6px;
  border-radius:50%;
  background:var(--accent-2);
  animation:breathe 2800ms var(--ease) infinite;
}

/* tier chips (canvas node panel) — proven is a machine-verified CLAIM, so it
   reads teal; green stays the seal's verdict alone */
.tier-chip { cursor:default; }
.tier-proven   { color:var(--edge-sel); border-color:color-mix(in srgb, var(--edge-sel) 35%, var(--line)); }
.tier-attested { color:var(--attested); border-color:color-mix(in srgb, var(--attested) 35%, var(--line)); }
.tier-unproven { color:var(--unproven); border-style:dashed; }

/* --- cards ------------------------------------------------------------------ */

.card {
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  transition:border-color 240ms var(--ease);
}
.card-raised { box-shadow:var(--shadow-card); }

/* --- circle-check ticks (trust box) ----------------------------------------
   pending: faint circle only.  on: stroke draws over 350ms, one soft glow. */

.tick {
  width:20px; height:20px;
  flex:0 0 auto;
  display:inline-grid;
  place-items:center;
  border-radius:50%;
}
.tick svg { width:20px; height:20px; display:block; overflow:visible; }
.tick circle {
  fill:none;
  stroke:var(--line-bright);
  stroke-width:1.4;
  transition:stroke 500ms var(--ease);
}
.tick path {
  fill:none;
  stroke:var(--proven);
  stroke-width:1.8;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-dasharray:14;
  stroke-dashoffset:14;
  transition:stroke-dashoffset 350ms var(--ease);
}
.tick.on circle { stroke:color-mix(in srgb, var(--proven) 55%, var(--line)); }
.tick.on path { stroke-dashoffset:0; }
.tick.glow1 { animation:glowGreen 1500ms var(--ease) 1; }

/* --- small status dots (criteria + proof rows) --------------------------------
   claims prove in TEAL — green is reserved for the seal's verdict alone.
   pending: hollow. failing: danger. proven: teal-filled, 600ms settle. */

.sp-dot {
  width:8px; height:8px;
  flex:0 0 auto;
  border-radius:50%;
  background:transparent;
  border:1px solid var(--ink-faint);
  transition:background 600ms var(--ease), border-color 600ms var(--ease);
}
.sp-dot.red   { background:var(--danger); border-color:var(--danger); }
.sp-dot.green { background:var(--edge-sel); border-color:var(--edge-sel); }

/* --- two-word mono toggle (assumptions) --------------------------------------- */

.tgl {
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:none;
  border:none;
  cursor:pointer;
  font-family:var(--mono);
  font-size:11px;
  padding:2px 0;
}
.tgl-side { color:var(--ink-faint); transition:color 240ms var(--ease); }
.tgl-side.on { color:var(--ink); }
.tgl-switch {
  width:26px; height:14px;
  border-radius:7px;
  background:var(--panel-3);
  border:1px solid var(--line);
  position:relative;
  transition:background 240ms var(--ease);
}
.tgl-knob {
  position:absolute;
  top:2px; left:2px;
  width:8px; height:8px;
  border-radius:50%;
  background:var(--ink-dim);
  transition:transform 240ms var(--ease), background 240ms var(--ease);
}
.tgl.flip .tgl-knob { transform:translateX(12px); background:var(--accent); }

/* --- expandable body -------------------------------------------------------------
   grid-template-rows 0fr→1fr wrappers: layout animates without measuring,
   never jumps. content lives in .xinner (overflow hidden, min-height 0). */

.xwrap {
  display:grid;
  grid-template-rows:0fr;
  transition:grid-template-rows 240ms var(--ease);
}
.xwrap.open { grid-template-rows:1fr; }
.xwrap > .xinner { overflow:hidden; min-height:0; }

/* --- tooltip: the hover-evidence layer ----------------------------------------- */

#tip {
  position:fixed;
  z-index:200;
  max-width:460px;
  background:var(--panel-3);
  border:1px solid var(--line-bright);
  border-radius:7px;
  box-shadow:var(--shadow-card);
  padding:8px 11px;
  font-family:var(--mono);
  font-size:10.5px;
  line-height:1.7;
  color:var(--ink-dim);
  pointer-events:none;
  opacity:0;
  transform:translateY(4px);
  transition:opacity 180ms var(--ease), transform 180ms var(--ease);
}
#tip.show { opacity:1; transform:none; }
#tip .tip-strong { color:var(--ink); }
#tip .tip-cmd { color:var(--accent-3); white-space:nowrap; }
#tip .tip-ok { color:var(--proven); }

[data-evidence] { cursor:default; }

/* --- honest thinking dots -------------------------------------------------------
   the only repeating animation, present only while genuinely waiting */

.dots { display:inline-flex; gap:5px; align-items:center; padding:4px 0; }
.dots i {
  width:5px; height:5px;
  border-radius:50%;
  background:var(--ink-dim);
  animation:dotFade 1200ms var(--ease) infinite;
}
.dots i:nth-child(2) { animation-delay:200ms; }
.dots i:nth-child(3) { animation-delay:400ms; }

/* ----------------------------------------------------------------------------
   5. canvas page
   -------------------------------------------------------------------------- */

.cv-root {
  overflow:hidden;
  background:var(--bg);
  cursor:default;
}
.cv-root.panning { cursor:grabbing; }

/* dot grid — 24px pitch, 1px dots at .05, every 4th dot lifted to .08 (a
   whispered major rule). a 48px layer crossfades in below zoom ~0.6 so
   density stays constant. no parallax. */
.cv-grid, .cv-grid-lo {
  position:absolute;
  inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(rgba(231,234,241,.08) 1px, transparent 1px),
    radial-gradient(rgba(231,234,241,.05) 1px, transparent 1px);
}
.cv-grid    { background-size:96px 96px, 24px 24px; }
.cv-grid-lo { background-size:192px 192px, 48px 48px; opacity:0; }

/* barely-there radial vignette — ~4% darker edges */
.cv-vignette {
  position:absolute;
  inset:0;
  pointer-events:none;
  background:radial-gradient(ellipse 75% 70% at 50% 45%,
             transparent 60%, rgba(0,0,0,.04) 82%, rgba(0,0,0,.09) 100%);
}

.cv-world {
  position:absolute;
  left:0; top:0;
  width:0; height:0;
  transform-origin:0 0;
  will-change:transform;
}

/* --- edges -------------------------------------------------------------------- */

.cv-edges { position:absolute; overflow:visible; pointer-events:none; }

.cv-edges g.edge path.wire {
  fill:none;
  stroke:var(--edge);
  stroke-width:calc(1.7px * var(--invz, 1));   /* constant screen hairline z≥1 */
  opacity:.3;
  transition:opacity 500ms var(--ease), stroke 500ms var(--ease);
}
.cv-edges g.edge path.head {
  fill:var(--edge);
  stroke:none;
  opacity:0;                       /* arrowheads fade in only on focus */
  transition:opacity 500ms var(--ease), fill 500ms var(--ease);
}

/* focus mode: hovered/selected node's edges lift teal, rest dim to a whisper */
.cv-edges.focus g.edge path.wire { opacity:.12; }
.cv-edges.focus g.edge.lit path.wire { opacity:1; stroke:var(--edge-sel); }
/* arrowheads fade as the source resolves — a fat triangle beside code is noise */
.cv-edges.focus g.edge.lit path.head { opacity:calc(1 - var(--p-code, 0)); fill:var(--edge-sel); }

/* composition edges from main — exist in data, render only while main selected */
.cv-edges g.edge.comp path.wire { stroke:var(--accent-3); stroke-dasharray:5 5; opacity:0; }
.cv-edges g.edge.comp path.head { fill:var(--accent-3); }
.cv-edges g.edge.comp.show path.wire { opacity:.55; }
.cv-edges g.edge.comp.show path.head { opacity:calc(.55 * (1 - var(--p-code, 0))); }

/* --- nodes ---------------------------------------------------------------------- */

.cv-node {
  position:absolute;
  width:176px;
  height:54px;
  isolation:isolate;               /* scope the evidence ground's z-index:-1 */
  background:var(--node-bg);
  border:1px solid var(--node-stroke);
  /* the world-space border fades to transparent as the source resolves; the
     counter-scaled inset hairline below takes over so the node keeps a crisp
     1px screen edge instead of a fat one at deep zoom */
  border-color:color-mix(in srgb,
     var(--node-stroke) calc((1 - var(--p-code, 0)) * 100%), transparent);
  border-radius:var(--radius);
  box-shadow:var(--shadow-node),
     inset 0 0 0 calc(1px * var(--invz, 1))
     color-mix(in srgb, var(--node-stroke) calc(var(--p-code, 0) * 100%), transparent);
  padding:8px 12px 0;
  cursor:pointer;
  user-select:none;
  transition:border-color 240ms var(--ease), box-shadow 400ms var(--ease),
             opacity 500ms var(--ease);
}
.cv-node:hover { border-color:var(--line-bright); }
/* the selected node carries the app's ONE drop shadow */
.cv-node.sel {
  box-shadow:var(--glow-sel), 0 8px 30px rgba(0,0,0,.45);
  border-color:var(--sel);
}
.cv-node.dim { opacity:.35; }

/* the proof seam — a thin teal line that exists only where a runnable
   command verified the node. draws itself once (scaleY, 240ms), then holds
   still forever. unproven/attested nodes carry no seam. */
.cv-seam {
  position:absolute;
  left:0; top:3px; bottom:3px;
  width:calc(2px * var(--invz, 1));   /* constant 2px screen for z ≥ 1 */
  border-radius:1px;
  background:var(--edge-sel);
  box-shadow:0 0 8px rgba(79,224,205,.5);
  transform:scaleY(0);
  transform-origin:top;
  transition:transform 240ms var(--ease);
}
.cv-seam.on { transform:scaleY(1); }

.cv-node .nrow {
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:1px;
}
.cv-node .nkind {
  font-family:var(--mono);
  font-size:9px;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:var(--ink-faint);
  /* clears by --p-code 0.7 in lockstep with the title's header arrival (D4) */
  opacity:calc(1 - clamp(0, var(--p-code, 0) / 0.7, 1));
}
/* tier is deliberately NOT tinted on the map at rest — the canvas stays
   uniform; verification tier lives in the panel chip and its hover-evidence.
   the one exception: the unproven node reads weaker (dashed, faint). */

.cv-node .ntitle {
  font-size:13.5px;
  font-weight:500;
  letter-spacing:-0.006em;
  color:var(--node-ink);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  /* never torn down — the title scrubs into the file header at (12, 4.5) */
  transform-origin:left top;
  /* driven by clamp(--p-code/0.7): the header has fully arrived (position AND
     scale) by --p-code 0.7, clearing the body band before lines resolve, so the
     0.7→1.0 crossfade holds a settled header (D4) */
  transform:translate(0, calc(clamp(0, var(--p-code, 0) / 0.7, 1) * var(--title-dy, -15.5px)))
            scale(calc(1 - 0.45 * clamp(0, var(--p-code, 0) / 0.7, 1)));
}

/* the unproven node reads visibly weaker — and stays honest at depth: it keeps
   its dashed border (no fade) and earns no counter-scaled hairline */
.cv-node.unproven {
  border-style:dashed;
  border-color:var(--node-stroke);
  box-shadow:var(--shadow-node);
}
.cv-node.unproven .ntitle { color:var(--ink-dim); }

/* --- semantic-zoom faces: the card becomes the code --------------------------
   pure consumers of the per-frame scrub vars (--p-sig, --p-code, --invz,
   --mono-adv, --title-dy) written on the world root in applyTransform;
   opacity/transform/width calc() only — no timers, no keyframes. */

/* evidence ground — the darker layer beneath the source (#12151a); opacity is
   set inline per tier (proven full · attested 0.6 · unproven none) */
.cv-ground {
  position:absolute;
  inset:0;
  z-index:-1;
  border-radius:var(--radius);
  background:var(--ground);
  pointer-events:none;
}

/* the signature match-move span — the stage-B sig travels, scrubbed by
   --p-code, from (12,35)@8px to its own substring's offset inside body line 1,
   scaling to body size, then crossfades out over the last third of the band */
.cv-sig {
  position:absolute;
  left:12px; top:44px;   /* clears the full-size title's descenders (D3) */
  font-family:var(--mono);
  font-size:8px;
  line-height:1;
  white-space:pre;
  color:var(--ink-dim);
  pointer-events:none;
  transform-origin:left top;
  /* travel driven by clamp(--p-code/0.7): the sig ARRIVES (final position AND
     body scale) by --p-code 0.7, so the 0.7→1.0 fade crossfades two identically
     sized, identically placed spans — no ghost, no double-vision (D2). Δy lands
     top:44 on body line 1 top:16 → -(44-16) = -28px (D3). */
  transform:
    translate(calc(clamp(0, var(--p-code, 0) / 0.7, 1) * var(--sig-prefix, 0) * var(--mono-adv, 1.44px)),
              calc(clamp(0, var(--p-code, 0) / 0.7, 1) * -28px))
    scale(calc(1 - 0.7 * clamp(0, var(--p-code, 0) / 0.7, 1)));
  opacity:calc(var(--p-sig, 0) *
    (1 - clamp(0, (var(--p-code, 0) - 0.7) / 0.3, 1)));
}

/* the stacked source face — direct small world font-size, no counter-scale
   nesting (probe: nesting reads softer). ink only, never highlighted. */
.cv-code {
  position:absolute;
  left:12px; top:16px;   /* clears the shrunk header's baseline (D5) */
  font-family:var(--mono);
  font-size:2.4px;
  line-height:3px;
  white-space:pre;
  color:color-mix(in srgb, var(--ink) 90%, transparent);
  pointer-events:none;
}
.cv-code.unproven { color:var(--ink-dim); }   /* code shown honestly, just dim */
.cv-code .cl {
  white-space:pre;
  /* lines 2…n resolve beneath with a per-line scrub stagger — start delayed to
     0.5 (gentler 0.03 step) so lines fade in only after the header has cleared
     their rows (D4); step keeps every line reaching full by --p-code 1.0 */
  opacity:clamp(0, (var(--p-code, 0) - 0.5 - var(--i, 0) * 0.03) / 0.2, 1);
}
/* body line 1 is the match-move's crossfade partner — it resolves only in the
   last third so `export function …{` materialises around the words being read */
.cv-code .cl0 {
  opacity:clamp(0, (var(--p-code, 0) - 0.7) / 0.3, 1);
}
.cv-code .more { color:var(--ink-faint); }

/* one-time reveal glow when a freshly built node lands on the map */
.cv-node.glow-new { animation:glowAccent 2200ms var(--ease) 1; }

/* --- node panel -------------------------------------------------------------------- */

.cv-panel {
  position:absolute;
  top:0; right:0; bottom:0;
  width:360px;
  background:var(--panel);
  border-left:1px solid var(--line);
  box-shadow:var(--shadow-card);
  transform:translateX(100%);
  transition:transform 480ms var(--ease-sheet);
  display:flex;
  flex-direction:column;
  z-index:20;
}
.cv-panel.open { transform:none; }

.np-scroll { flex:1 1 auto; overflow-y:auto; padding:20px 20px 16px; }

.np-head { display:flex; align-items:flex-start; gap:10px; margin-bottom:4px; }
.np-name { font-size:16px; font-weight:600; letter-spacing:-.01em; flex:1 1 auto; }
.np-kind {
  font-family:var(--mono);
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:var(--ink-faint);
  margin-bottom:10px;
}
.np-desc { color:var(--ink-dim); font-size:12.5px; margin:10px 0 14px; }

.np-sec { margin-top:18px; }
.np-sec .sec-title { display:block; margin-bottom:8px; }

.np-sig {
  font-family:var(--mono);
  font-size:11px;
  color:var(--accent-3);
  background:var(--label-bg);
  border:1px solid var(--line);
  border-radius:7px;
  padding:8px 10px;
  overflow-x:auto;
  white-space:pre;
}

.np-src {
  font-family:var(--mono);
  font-size:10.5px;
  line-height:1.75;
  color:var(--ink-dim);
  background:var(--label-bg);
  border:1px solid var(--line);
  border-radius:7px;
  padding:10px 12px;
  overflow-x:auto;
  white-space:pre;
  margin-top:8px;
}

.np-edge-row {
  display:flex;
  align-items:center;
  gap:8px;
  width:100%;
  text-align:left;
  background:none;
  border:none;
  border-radius:6px;
  padding:5px 8px;
  cursor:pointer;
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-dim);
  transition:background 240ms var(--ease), color 240ms var(--ease);
}
.np-edge-row:hover { background:var(--panel-2); color:var(--ink); }
.np-edge-row .arrow { color:var(--ink-faint); }

/* change lane at the bottom of the panel */
.np-change {
  flex:0 0 auto;
  border-top:1px solid var(--line);
  padding:14px 20px 16px;
  background:var(--panel);
}
.np-change-input {
  width:100%;
  background:var(--panel-2);
  border:1px solid var(--line);
  border-radius:7px;
  padding:9px 11px;
  font-size:12.5px;
  color:var(--ink);
  transition:border-color 240ms var(--ease);
}
.np-change-input::placeholder { color:var(--ink-faint); }
.np-change-input:hover { border-color:var(--line-bright); }
.np-change-input:focus-visible { outline:none; border-color:var(--accent); }

.np-proposal { margin-top:12px; }
.np-proposal .plain-line { font-size:12.5px; color:var(--ink); margin-bottom:10px; }
.np-slice {
  background:var(--label-bg);
  border:1px solid var(--line);
  border-radius:7px;
  padding:6px;
  margin-bottom:10px;
}
.np-slice svg { display:block; width:100%; height:auto; }

/* --- footer strip + hint --------------------------------------------------------------- */

.cv-footer {
  position:absolute;
  left:16px; bottom:12px;
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-faint);
  user-select:none;
  z-index:10;
  transition:color 240ms var(--ease);
}
.cv-footer:hover { color:var(--ink-dim); }

.cv-hint {
  position:absolute;
  left:50%; bottom:18px;
  transform:translateX(-50%);
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-faint);
  user-select:none;
  pointer-events:none;
  opacity:0;
  transition:opacity 900ms var(--ease);
  z-index:10;
}
.cv-hint.show { opacity:1; }

/* ----------------------------------------------------------------------------
   6. draft canvas module — the embedded live prototype
   -------------------------------------------------------------------------- */

.dc-box {
  position:relative;
  width:700px;
  max-width:100%;
  height:380px;
  background:var(--bg);
  background-image:radial-gradient(rgba(231,234,241,.05) 1px, transparent 1px);
  background-size:24px 24px;
  border:1px solid var(--line);
  border-radius:7px;
  box-shadow:inset 0 2px 14px rgba(0,0,0,.35);
  overflow:hidden;
  /* no touch-action here: the wheel always scrolls the page — the embedded
     canvas never traps scroll. touch-action lives on blocks/handles only. */
}
.dc-box.compact { height:200px; }

.dc-block {
  position:absolute;
  background:var(--node-bg);
  border:1px solid var(--node-stroke);
  border-radius:var(--radius);
  box-shadow:var(--shadow-node);
  cursor:grab;
  user-select:none;
  touch-action:none;
  display:flex;
  align-items:flex-start;
  padding:8px 11px;
  transition:border-color 240ms var(--ease), box-shadow 240ms var(--ease);
}
.dc-block:hover { border-color:var(--line-bright); }
.dc-block.active {
  cursor:grabbing;
  border-color:var(--sel);
  /* the one drop shadow allowed inside the draft canvas — stacking order
     stays legible when blocks overlap */
  box-shadow:var(--glow-sel), 0 6px 18px rgba(0,0,0,.4);
}
/* per-layout / tidy modes: non-active blocks ease to their new geometry */
.dc-block.follow { transition:left 600ms var(--ease), top 600ms var(--ease),
                              width 600ms var(--ease), height 600ms var(--ease),
                              border-color 240ms var(--ease); }

.dc-label {
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.06em;
  color:var(--ink-faint);
  pointer-events:none;
}

.dc-handle {
  position:absolute;
  width:9px; height:9px;
  background:var(--panel-3);
  border:1px solid var(--line-bright);
  border-radius:2.5px;
  opacity:0;
  touch-action:none;
  transition:opacity 200ms var(--ease), border-color 200ms var(--ease);
}
.dc-block:hover .dc-handle, .dc-block.active .dc-handle { opacity:1; }
.dc-handle:hover { border-color:var(--accent); }
.dc-handle.nw { left:-5px;  top:-5px;    cursor:nwse-resize; }
.dc-handle.ne { right:-5px; top:-5px;    cursor:nesw-resize; }
.dc-handle.sw { left:-5px;  bottom:-5px; cursor:nesw-resize; }
.dc-handle.se { right:-5px; bottom:-5px; cursor:nwse-resize; }

.dc-readout {
  position:absolute;
  font-family:var(--mono);
  font-size:10px;
  color:var(--ink);
  background:var(--label-bg);
  border:1px solid var(--line);
  border-radius:5px;
  padding:1px 6px;
  pointer-events:none;
  opacity:0;
  transition:opacity 150ms var(--ease), color 240ms var(--ease),
             border-color 240ms var(--ease);
  z-index:30;
  white-space:nowrap;
}
.dc-readout.show { opacity:1; }
/* resistance you can see: the readout warms toward amber near min/max */
.dc-readout.near-bound {
  color:var(--accent-2);
  border-color:color-mix(in srgb, var(--accent-2) 45%, var(--line));
}

/* decide-by-hovering: the inactive side of a live toggle previews its
   consequence on the draft at low intensity — mouse-out reverts */
.dc-block.ghosting { opacity:.55; }
.dc-block.aspect-hint::after {
  content:'';
  position:absolute;
  inset:3px;
  border:1px dashed color-mix(in srgb, var(--accent) 45%, transparent);
  border-radius:6px;
  pointer-events:none;
}

/* ----------------------------------------------------------------------------
   7. prototypes page
   -------------------------------------------------------------------------- */

.pt-col {
  max-width:760px;
  margin:0 auto;
  padding:56px 24px 96px;
}
.pt-col.list-center { padding-bottom:36px; }

.pt-outcome-input {
  width:100%;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:14px 17px;
  font-size:15px;
  color:var(--ink);
  transition:border-color 240ms var(--ease);
}
.pt-outcome-input::placeholder { color:var(--ink-faint); }
.pt-outcome-input:hover { border-color:var(--line-bright); }
.pt-outcome-input:focus-visible { outline:none; border-color:var(--accent); }

/* click-to-fill ghost suggestion under the outcome input */
.pt-try {
  margin-top:10px;
  background:none;
  border:none;
  padding:2px 4px;
  font-family:var(--mono);
  font-size:10.5px;
  color:var(--ink-faint);
  cursor:pointer;
  transition:color 240ms var(--ease);
}
.pt-try:hover { color:var(--ink-dim); }

.pt-saved { margin-top:44px; }
.pt-saved .sec-title { display:block; margin-bottom:12px; }

.pt-row {
  display:flex;
  align-items:center;
  gap:12px;
  width:100%;
  text-align:left;
  background:none;
  border:none;
  border-bottom:1px solid var(--line);
  padding:13px 6px;
  cursor:pointer;
  transition:background 240ms var(--ease);
}
.pt-row:hover { background:color-mix(in srgb, var(--panel) 65%, transparent); }
.pt-row .pt-title { font-size:13.5px; font-weight:500; letter-spacing:-.006em; flex:1 1 auto; color:var(--ink); }
.pt-row .pt-date { font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); }

/* --- thread ----------------------------------------------------------------------- */

.pt-back { margin-bottom:26px; }

.thread { display:flex; flex-direction:column; gap:18px; }

.turn-user {
  align-self:flex-end;
  max-width:78%;
  background:var(--panel-2);
  border-radius:var(--radius);
  padding:9px 14px;
  font-size:13px;
  color:var(--ink);
}

.turn-ai {
  align-self:flex-start;
  max-width:86%;
  font-size:13px;
  color:var(--ink);
}
.turn-ai .ai-actions { display:flex; gap:8px; margin-top:10px; }

.turn-seal {
  align-self:stretch;
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-faint);
  border-top:1px solid var(--line);
  padding-top:14px;
  margin-top:4px;
}
.turn-seal .seal-link { color:var(--accent-3); cursor:pointer; background:none; border:none; font:inherit; padding:0; }
.turn-seal .seal-link:hover { color:var(--accent); }

/* inline follow-up input revealed by `add specifics` / `adjust` */
.inline-ask { margin-top:10px; }
.inline-ask input {
  width:100%;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:7px;
  padding:8px 11px;
  font-size:12.5px;
}
.inline-ask input::placeholder { color:var(--ink-faint); }
.inline-ask input:focus-visible { outline:none; border-color:var(--accent); }

/* --- draft card -------------------------------------------------------------------- */

.draft-card {
  align-self:stretch;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px 18px 14px;
  position:relative;
  overflow:hidden;
}
/* the proof seam as the card's left spine — teal: this card is backed by
   working behavior, not narration */
.draft-card::before, .draft-sealed::before {
  content:'';
  position:absolute;
  left:0; top:3px; bottom:3px;
  width:2px;
  border-radius:1px;
  background:var(--edge-sel);
  box-shadow:0 0 8px rgba(79,224,205,.5);
}
.draft-head {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:14px;
}
.draft-head .sec-title { color:var(--ink); }
.draft-head .draft-date { margin-left:auto; font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); }

.draft-actions {
  display:flex;
  justify-content:flex-end;
  gap:8px;
  margin-top:14px;
}

/* sealed (compacted) draft row */
.draft-sealed {
  align-self:stretch;
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:11px 16px;
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-dim);
  position:relative;
  overflow:hidden;
}
.draft-sealed .ds-ok { color:var(--proven); }

/* --- assumptions disclosure ----------------------------------------------------------- */

.assump { margin-top:14px; border-top:1px solid var(--line); }
.assump-toggle {
  display:flex;
  align-items:center;
  gap:8px;
  width:100%;
  background:none;
  border:none;
  padding:10px 2px 8px;
  cursor:pointer;
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-dim);
  transition:color 240ms var(--ease);
}
.assump-toggle:hover { color:var(--ink); }
.assump-toggle .caret { transition:transform 400ms var(--ease); color:var(--ink-faint); }
.assump-toggle.open .caret { transform:rotate(90deg); }

.assump-row {
  display:flex;
  align-items:center;
  gap:10px;
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-dim);
  padding:5px 2px;
}
.assump-row .ar-dot { width:3px; height:3px; border-radius:50%; background:var(--ink-faint); flex:0 0 auto; }
.assump-row .ar-label { flex:1 1 auto; }
.assump-row.live .ar-label { color:var(--ink); }

/* ----------------------------------------------------------------------------
   8. builds page
   -------------------------------------------------------------------------- */

.bl-col {
  max-width:760px;
  margin:0 auto;
  padding:52px 24px 36px;
}

/* page eyebrow + large display title — the §D1/D10 hierarchy jump, rendered
   in var(--sans) (NO serif — house mono/sans law §3.8 kept) */
.eyebrow {
  font-family:var(--sans);
  font-size:11px;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:1.5px;
  color:var(--ink-dim);
  user-select:none;
}
.page-title {
  font-family:var(--sans);
  font-size:40px;
  font-weight:500;
  letter-spacing:-.4px;
  line-height:1.1;
  color:var(--ink);
  margin:0;
}

/* Builds/Prototypes list header — eyebrow, display title, right-aligned
   state roll-up computed from live build state */
.bl-head { margin-bottom:30px; }
.bl-title-row {
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:16px;
  margin-top:10px;
}
.bl-rollup { font-family:var(--mono); font-size:11px; color:var(--ink-dim); white-space:nowrap; }
.bl-rollup-you { color:var(--accent); }   /* periwinkle = the human (§3.2) */

/* the actionable build — a raised card (delta 2). neutral slate tone-step
   fill (NOT amber/warm — §3.2), 9px house radius, quiet elevation */
.bl-card {
  display:block;
  width:100%;
  text-align:left;
  background:var(--panel-2);
  border:1px solid var(--line-bright);
  border-radius:var(--radius);
  padding:26px 28px;
  margin-bottom:20px;
  cursor:pointer;
  box-shadow:var(--shadow-card);
  transition:border-color 240ms var(--ease), background 240ms var(--ease);
}
.bl-card:hover { border-color:color-mix(in srgb, var(--accent) 40%, var(--line-bright)); }
.bl-card .bl-card-top { display:flex; align-items:center; gap:12px; }
.bl-card .bl-card-title {
  font-family:var(--sans);
  font-size:22px;
  font-weight:500;
  letter-spacing:-.01em;
  color:var(--ink);
  flex:1 1 auto;
}
.bl-card .bl-card-note { margin-top:10px; font-size:14px; line-height:1.5; color:var(--ink-dim); }
.bl-card .bl-card-action {
  display:inline-block;
  margin-top:16px;
  font-family:var(--mono);
  font-size:12px;
  color:var(--accent);
}

/* completed / other builds — quiet borderless rows (delta 2/11) */
.bl-row {
  display:block;
  width:100%;
  text-align:left;
  background:none;
  border:none;
  border-radius:6px;
  padding:14px 8px;
  cursor:pointer;
  transition:background 240ms var(--ease);
}
.bl-row:hover { background:color-mix(in srgb, var(--panel) 65%, transparent); }
.bl-row .bl-top { display:flex; align-items:center; gap:12px; }
.bl-row .bl-title { font-size:13.5px; font-weight:500; letter-spacing:-.006em; color:var(--ink); flex:1 1 auto; }
.bl-row .bl-dates { font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); }
.bl-row .bl-note { margin-top:5px; font-size:12px; color:var(--ink-dim); }

/* the DONE group label + hairline rule (delta 3) */
.bl-done-head { display:flex; align-items:center; gap:14px; margin:26px 0 8px; }
.bl-done-label {
  font-family:var(--sans);
  font-size:11px;
  font-weight:500;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--ink-faint);
}
.bl-done-rule { flex:1 1 auto; height:1px; background:var(--line); }

/* --- build document — a certificate, not a dashboard --------------------------
   single 760px column with a margin rail in the left gutter. spacing law:
   large between (76px), tight within (8/16px). no boxes except the three
   that earn one: the trust seal, the prototype plate, the contract viewer. */

.bd-col {
  display:grid;
  grid-template-columns:120px minmax(0,760px);
  justify-content:start;   /* left-align the reading column under a persistent header (delta 9); column width unchanged */
  column-gap:28px;
  row-gap:76px;
  padding:44px 40px 140px;
}
.bd-col > * { grid-column:2; min-width:0; }

.bd-back { margin-bottom:-52px; justify-self:start; }

/* the margin rail — small-caps label + state dot, sticky per section.
   the tide mark: a teal seam segment appears beside a section once the
   lifecycle has set it. */
.bd-rail { grid-column:1; position:relative; }
.bd-rail .bd-rail-inner {
  position:sticky;
  top:18px;
  display:flex;
  align-items:center;
  justify-content:flex-end;    /* labels sit ~28px from the content edge */
  gap:8px;
}
.bd-rail .bd-rail-labelwrap { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
.bd-rail .bd-rail-label {
  font-family:var(--mono);
  font-size:11px;
  text-transform:lowercase;
  font-variant:small-caps;
  letter-spacing:.1em;
  color:var(--ink-dim);
  transition:color 500ms var(--ease);
}
/* count metadata beside the rail labels (delta 4, additive) — the rail and
   its labels are otherwise untouched */
.bd-rail .bd-rail-meta {
  font-family:var(--mono);
  font-size:9.5px;
  color:var(--ink-faint);
  text-align:right;
  transition:color 500ms var(--ease);
}

/* collapse-head — the expandable-row trigger for secondary sections (delta 4).
   toggles an .xwrap (grid-template-rows 0fr→1fr, 240ms, house easing); keyboard
   activation is instant via the global html.kbd-instant class. */
.bd-collapse-head {
  display:flex;
  align-items:center;
  gap:8px;
  background:none;
  border:none;
  padding:6px 2px;
  cursor:pointer;
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-dim);
  transition:color 240ms var(--ease);
}
.bd-collapse-head:hover { color:var(--ink); }
.bd-collapse-head .caret { transition:transform 240ms var(--ease); color:var(--ink-faint); }
.bd-collapse-head.open .caret { transform:rotate(90deg); }
.bd-collapse-head .bch-label { text-transform:lowercase; font-variant:small-caps; letter-spacing:.08em; }
.bd-collapse-head .bch-meta { color:var(--ink-faint); font-size:10px; }
.bd-rail .bd-rail-dot {
  width:6px; height:6px;
  flex:0 0 auto;
  border-radius:50%;
  background:transparent;
  border:1px solid var(--ink-faint);
  transition:background 500ms var(--ease), border-color 500ms var(--ease);
}
.bd-rail.set .bd-rail-dot { background:var(--ink-dim); border-color:var(--ink-dim); }
/* the active section — the page's only --accent use; carries the one
   permitted slow breath, and only while the fleet is genuinely working */
.bd-rail.live .bd-rail-dot { background:var(--accent); border-color:var(--accent); }
.bd-rail.live.working .bd-rail-dot { animation:breatheDot 2400ms var(--ease) infinite; }
/* the tide mark — the proof seam grammar on the document margin, risen
   beside the labels in the tightened gutter */
.bd-rail::before {
  content:'';
  position:absolute;
  right:-14px; top:2px; bottom:-36px;
  width:2px;
  border-radius:1px;
  background:var(--edge-sel);
  box-shadow:0 0 8px rgba(79,224,205,.4);
  transform:scaleY(0);
  transform-origin:top;
  transition:transform 500ms var(--ease);
}
.bd-rail.set::before { transform:scaleY(1); }

/* sections sit borderless on the slate */
.bd-section { background:none; border:none; padding:0; }
.bd-section > .sec-title { display:block; margin-bottom:14px; }

/* not-yet-reached sections render as DRAFT — 40% opacity, hollow dots —
   and SET to full ink (500ms) as the lifecycle reaches them, top to bottom */
.bd-section, .bd-rail { transition:opacity 500ms var(--ease); }
.bd-section.pending { opacity:.4; }
.bd-rail.draft { opacity:.4; }

.bd-pending-line {
  font-family:var(--mono);
  font-size:10.5px;
  color:var(--ink-faint);
  padding-top:4px;
}

/* review spotlight — while a build awaits review, every section except
   REVIEW eases to reduced contrast; the attestation card is the only fully
   lit element. interacting with a dimmed section lifts its dim instantly
   (keyboard stays instant via kbd-instant). */
.bd-offer, .bd-back { transition:opacity 500ms var(--ease); }
.review-focus > * { transition:opacity 600ms var(--ease); }
.review-focus > .spot-dim { opacity:.45; }
.review-focus > .spot-dim.spot-lit { opacity:1; transition:none; }

.bd-header { display:flex; flex-direction:column; gap:8px; }
.bd-header .bd-toprow { display:flex; align-items:center; gap:14px; }
/* the document heading: the job's name verbatim, scaled to display size in
   var(--sans) (delta 1). the status pill sits adjacent without crowding. */
.bd-header .bd-title { font-family:var(--sans); font-size:32px; font-weight:500; letter-spacing:-.4px; line-height:1.15; flex:1 1 auto; }
.bd-header .bd-dates { font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); }

/* wide plates — only the embedded prototype and the impact slice may break
   the 760px column */
/* centered by negative margins, NOT transform — entrance animations hold a
   filled transform on these elements and would clobber a translate */
.bd-plate {
  width:min(1000px, calc(100vw - 320px));
  min-width:100%;
  max-width:none;
  margin-left:calc((100% - min(1000px, 100vw - 320px)) / 2);
}

/* --- the trust seal — the page's signature -------------------------------------
   three sworn plain sentences; evidence flush right in dim mono, joined by
   faint dot leaders. while unproven the frame is a dashed dim hairline; when
   all three land, a solid hairline draws itself around the box in one
   continuous stroke and the mono stamp fades in. happens once, ever. */

.trust-seal {
  position:relative;
  border:1px dashed color-mix(in srgb, var(--line) 80%, transparent);
  border-radius:var(--radius);
  padding:22px 24px 18px;
  background:var(--panel);
  box-shadow:var(--shadow-card);
}
.trust-seal.sealed { border-color:transparent; }
.trust-seal .ts-frame {
  position:absolute;
  inset:0;
  width:100%; height:100%;
  pointer-events:none;
  overflow:visible;
}
.trust-seal .ts-frame rect {
  x:.5px; y:.5px;
  width:calc(100% - 1px);
  height:calc(100% - 1px);
  rx:9px;
  fill:none;
  stroke:var(--line-bright);
  stroke-width:1;
  stroke-dasharray:1;
  stroke-dashoffset:1;
}
.trust-seal.sealed .ts-frame rect { stroke-dashoffset:0; }
.trust-seal.sealing .ts-frame rect {
  transition:stroke-dashoffset 1200ms var(--ease);
}
.ts-stamp {
  position:absolute;
  right:14px; bottom:10px;
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.06em;
  color:var(--ink-faint);
  opacity:0;
  transition:opacity 600ms var(--ease);
  user-select:none;
}
.trust-seal.sealed .ts-stamp { opacity:1; }

.tr-row {
  display:flex;
  align-items:baseline;
  gap:12px;
  width:100%;
  text-align:left;
  background:none;
  border:none;
  padding:7px 2px;
  cursor:pointer;
  border-radius:6px;
  font-size:16px;
  line-height:1.7;
  color:var(--ink);
  transition:background 240ms var(--ease), opacity 500ms var(--ease);
}
.tr-row:hover { background:color-mix(in srgb, var(--panel-2) 70%, transparent); }
.tr-row .tr-label { flex:0 0 auto; }
/* faint dot leaders joining sentence to evidence */
.tr-row .tr-leader {
  flex:1 1 auto;
  min-width:24px;
  border-bottom:1px dotted color-mix(in srgb, var(--ink-faint) 55%, transparent);
  transform:translateY(-5px);
}
.tr-row .tr-ev {
  flex:0 0 auto;
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-faint);
  transition:color 500ms var(--ease);
}

/* 6px status glyph: hollow → amber pending → filled */
.ts-glyph {
  width:6px; height:6px;
  flex:0 0 auto;
  border-radius:50%;
  align-self:center;
  background:transparent;
  border:1px solid var(--ink-faint);
  transition:background 500ms var(--ease), border-color 500ms var(--ease);
}
.ts-glyph.pend   { border-color:var(--attested); background:transparent; }
.ts-glyph.teal   { background:var(--edge-sel); border-color:var(--edge-sel); }
.ts-glyph.green  { background:var(--proven); border-color:var(--proven); }
.ts-glyph.glow1  { animation:glowTeal 1500ms var(--ease) 1; }
.ts-glyph.green.glow1 { animation:glowGreen 1500ms var(--ease) 1; }
.tr-row.filled-teal .tr-ev { color:var(--edge-sel); }
.tr-row.filled-green .tr-ev { color:var(--proven); }

/* the keystone rule — line 3 stays dim until lines 1 and 2 have filled:
   trust is visibly derived, never asserted */
.tr-row.keystone-locked { opacity:.45; }

/* proof layer expands onto a darker inset ground — the layer beneath */
.tr-proof {
  margin:2px 0 10px 18px;
  background:var(--ground);
  border:1px solid color-mix(in srgb, var(--line) 60%, transparent);
  border-radius:7px;
  padding:8px 14px;
}
.tt-copy {
  background:none;
  border:none;
  padding:0 0 0 10px;
  font-family:var(--mono);
  font-size:10px;
  color:var(--ink-faint);
  cursor:pointer;
  transition:color 240ms var(--ease), opacity 240ms var(--ease);
}
.tt-copy:hover { color:var(--ink-dim); }
.tt-copy.copied { color:var(--edge-sel); }
/* durations sit in a fixed-width tabular column; ⧉ copy right-aligns to
   one rail on every row */
.tt-dur {
  color:color-mix(in srgb, var(--ink-faint) 70%, transparent);
  flex:0 0 56px;
  margin-left:auto;
  padding-left:10px;
  text-align:right;
  font-variant-numeric:tabular-nums;
}
.tr-test { padding:6px 0; }
.tr-test .tt-top { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--ink-dim); }
.tr-test .tt-cmd {
  display:flex;
  align-items:baseline;
  font-family:var(--mono);
  font-size:10.5px;
  color:var(--ink-faint);
  margin:3px 0 0 16px;
  white-space:nowrap;
  overflow-x:auto;
}
.tr-test .tt-cmd .v-pass { color:var(--proven); }
.tr-test .tt-cmd .v-fail { color:var(--danger); }
.tr-test .tt-cmd .v-pend { color:var(--ink-faint); }

/* spec criteria — tight within: rows sit 12px apart */
.sp-row {
  display:flex;
  align-items:center;
  gap:11px;
  width:100%;
  text-align:left;
  background:none;
  border:none;
  padding:6px 4px;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  color:var(--ink);
  transition:background 240ms var(--ease);
}
.sp-row:hover { background:color-mix(in srgb, var(--panel-2) 70%, transparent); }
.sp-row .sp-text { flex:1 1 auto; text-wrap:balance; }
/* trust-link triangulation — one fact, three places, visibly the same object */
.sp-row.linked, .tr-test.linked { background:color-mix(in srgb, var(--edge-sel) 8%, transparent); border-radius:6px; }
.ct-slice g.linked rect { stroke:var(--edge-sel) !important; }
.ct-slice g.linked text { fill:var(--edge-sel) !important; }
.sp-row input {
  flex:1 1 auto;
  background:var(--panel-2);
  border:1px solid var(--line);
  border-radius:6px;
  padding:5px 9px;
  font-size:12.5px;
}
.sp-row input:focus-visible { outline:none; border-color:var(--accent); }

.sp-detail {
  margin:0 0 8px 23px;
  border-left:1px solid var(--line);
  padding:4px 0 4px 14px;
  font-family:var(--mono);
  font-size:10.5px;
  line-height:1.9;
  color:var(--ink-dim);
}
.sp-detail .gwt-k { color:var(--ink-faint); display:inline-block; width:44px; }
.sp-detail .sp-testid { color:var(--accent-3); }

/* contract viewer — mono viewers on the inset dark ground; the impact slice
   is a still monochrome figure in a paper */
.ct-slice {
  background:var(--ground);
  border:1px solid color-mix(in srgb, var(--line) 60%, transparent);
  border-radius:7px;
  padding:14px 8px 6px;
  margin-bottom:6px;
}
.ct-slice svg { display:block; width:100%; max-width:760px; height:auto; margin:0 auto; }
.ct-caption {
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.08em;
  color:var(--ink-faint);
  text-align:center;
  padding:8px 0 4px;
  user-select:none;
}
.ct-alt {
  font-family:var(--mono);
  font-size:10.5px;
  color:var(--ink-faint);
  padding:6px 2px 12px;
}
.ct-tabs { display:flex; gap:2px; margin-bottom:-1px; position:relative; z-index:1; }
.ct-tab {
  font-family:var(--mono);
  font-size:10.5px;
  color:var(--ink-faint);
  background:var(--panel);
  border:1px solid var(--line);
  border-bottom-color:transparent;
  border-radius:7px 7px 0 0;
  padding:5px 12px;
  cursor:pointer;
  transition:color 240ms var(--ease), background 240ms var(--ease);
}
.ct-tab:hover { color:var(--ink-dim); }
.ct-tab.on { color:var(--ink); background:var(--label-bg); }
.ct-view {
  background:var(--ground);
  border:1px solid var(--line);
  border-radius:0 7px 7px 7px;
  position:relative;
}
.ct-pre {
  font-family:var(--mono);
  font-size:10.5px;
  line-height:1.75;
  color:var(--ink-dim);
  padding:12px 14px;
  overflow-x:auto;
  white-space:pre;
  margin:0;
}
.ct-view.clipped .ct-pre { max-height:186px; overflow:hidden; }
.ct-view.clipped::after {
  content:'';
  position:absolute;
  left:1px; right:1px; bottom:1px;
  height:56px;
  border-radius:0 0 7px 7px;
  background:linear-gradient(transparent, var(--ground));
  pointer-events:none;
}
.ct-expand { margin-top:8px; }

/* activity feed — fixed-height panel, gentle autoscroll only while pinned */
.ac-head { display:flex; align-items:center; margin-bottom:10px; }
.ac-head .sec-title { margin-bottom:0; }
.ac-head .ac-tech { margin-left:auto; }

.ac-wrap { position:relative; }
/* the feed fits its content up to 280px — no hollow dead area */
.ac-feed {
  max-height:280px;
  overflow-y:auto;
  overscroll-behavior:contain;
  display:flex;
  flex-direction:column;
  gap:2px;
  scroll-behavior:smooth;
}
.ac-row {
  display:flex;
  gap:12px;
  padding:4px 2px;
  color:var(--ink-dim);
}
/* the newest line is the live status readout — full ink; history settles dim */
.ac-row:last-child .ac-plain, .ac-row:last-child .ac-techline { color:var(--ink); }
/* the honest wince: a retry line enters danger-tinted and eases to neutral */
.ac-row .ac-fail .ac-plain, .ac-row .ac-fail .ac-techline {
  animation:wince 1500ms var(--ease) 1 forwards;
}
.ac-row .ac-time {
  font-family:var(--mono);
  font-size:10px;
  color:var(--ink-faint);
  flex:0 0 46px;
  padding-top:2px;
  text-align:right;
}

/* plain + technical stacked in one row — opacity-only crossfade, no reflow */
.ac-text { flex:1 1 auto; position:relative; }
.ac-text span {
  position:absolute;
  left:0; top:0;
  width:100%;
  transition:opacity 240ms var(--ease);
}
.ac-text .ac-plain { font-size:12.5px; opacity:1; }
.ac-text .ac-techline {
  font-family:var(--mono);
  font-size:10.5px;
  padding-top:2px;
  opacity:0;
  white-space:normal;
  word-break:break-word;
}
.ac-feed.tech .ac-plain { opacity:0; }
.ac-feed.tech .ac-techline { opacity:1; }

.ac-row .ac-ok .ac-plain, .ac-row .ac-ok .ac-techline { color:var(--proven); }
/* a satisfied CLAIM proves in teal — green stays the gate's verdict alone */
.ac-row .ac-claim .ac-plain, .ac-row .ac-claim .ac-techline { color:var(--edge-sel); }

/* plain · technical — a small-caps toggle; the swap crossfades in place */
.ac-mode {
  display:inline-flex;
  gap:6px;
  background:none;
  border:none;
  padding:0;
  cursor:pointer;
  font-family:var(--mono);
  font-size:10px;
  text-transform:lowercase;
  font-variant:small-caps;
  letter-spacing:.1em;
  color:var(--ink-faint);
}
.ac-mode span { transition:color 240ms var(--ease); }
.ac-mode .on { color:var(--ink); }

/* quiet 'jump to latest' when the reader has scrolled up */
.ac-jump {
  position:absolute;
  right:10px; bottom:8px;
  background:var(--panel-3);
  border:1px solid var(--line);
  border-radius:6px;
  padding:3px 9px;
  font-family:var(--mono);
  font-size:10px;
  color:var(--ink-dim);
  cursor:pointer;
  opacity:0;
  pointer-events:none;
  transition:opacity 240ms var(--ease);
}
.ac-jump.show { opacity:1; pointer-events:auto; }
.ac-jump:hover { color:var(--ink); border-color:var(--line-bright); }

/* review */
.rv-summary { font-size:13px; color:var(--ink); margin-bottom:12px; }

.rv-attest {
  background:var(--panel-2);
  border:1px solid var(--line);
  border-radius:7px;
  padding:12px 14px;
  margin-bottom:14px;
}
.rv-attest .ra-claim { font-size:12.5px; color:var(--ink); margin-bottom:9px; }
.rv-attest .ra-actions { display:flex; gap:8px; }
.rv-attest .ra-sealed { font-family:var(--mono); font-size:10.5px; color:var(--attested); }

/* ledger — thin numerals, mono captions, hover-evidence. a quiet supporting
   row beneath the plain-language review sentence, not the headline */
.ledger {
  display:flex;
  gap:34px;
  padding:14px 4px 2px;
  border-top:1px solid var(--line);
}
.led-cell { text-align:left; }
.led-num {
  font-family:var(--mono);
  font-size:20px;
  font-weight:300;
  font-variant-numeric:tabular-nums;
  letter-spacing:-.01em;
  color:var(--ink);
  line-height:1.2;
}
.led-cap {
  font-family:var(--mono);
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:var(--ink-faint);
  margin-top:2px;
}

/* offer line at the document foot */
.bd-offer {
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:12px;
  padding:4px 6px;
  margin-top:-36px;
}
/* when no raised action exists for this state (e.g. awaiting-review/building —
   attest/defer deliberately stay in REVIEW, §3.10) the row must contribute zero
   height: no reserved band, so TRUST rises under the title at normal rhythm */
.bd-offer:empty { display:none; }
.bd-offer .offer-row { display:flex; align-items:center; gap:14px; width:100%; }
.bd-offer .offer-text { font-size:13px; color:var(--ink-dim); flex:1 1 auto; }
.bd-offer .offer-note { font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); }

/* the handoff ghost — a sealed prototype row physically becoming work.
   absolutely positioned clone, animated toward the Builds rail item. */
.fly-ghost {
  position:fixed;
  z-index:300;
  background:var(--panel-2);
  border:1px solid var(--line-bright);
  border-radius:var(--radius);
  box-shadow:var(--shadow-card);
  padding:11px 16px;
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink);
  white-space:nowrap;
  overflow:hidden;
  pointer-events:none;
}

/* ----------------------------------------------------------------------------
   9. keyframes
   -------------------------------------------------------------------------- */

/* the honest thinking dots */
@keyframes dotFade {
  0%, 100% { opacity:.25; }
  40%      { opacity:1; }
}

/* the slow-breathing dot on a genuinely running build */
@keyframes breathe {
  0%, 100% { opacity:.35; transform:scale(.85); }
  50%      { opacity:1;   transform:scale(1); }
}

/* one soft green glow, decaying — fired once on a state flip, never loops */
@keyframes glowGreen {
  0%   { box-shadow:0 0 0 0 rgba(95,208,160,0); }
  18%  { box-shadow:0 0 18px 2px rgba(95,208,160,.4); }
  100% { box-shadow:0 0 0 0 rgba(95,208,160,0); }
}

/* one soft accent glow — a freshly landed map node */
@keyframes glowAccent {
  0%   { box-shadow:var(--shadow-node); }
  20%  { box-shadow:0 0 0 1.5px var(--sel), 0 0 28px rgba(124,140,255,.4); }
  100% { box-shadow:var(--shadow-node); }
}

/* one soft teal glow — a claim proving, never looping */
@keyframes glowTeal {
  0%   { box-shadow:0 0 0 0 rgba(79,224,205,0); }
  18%  { box-shadow:0 0 18px 2px rgba(79,224,205,.4); }
  100% { box-shadow:0 0 0 0 rgba(79,224,205,0); }
}

/* the honest wince — a retry enters danger-tinted, eases to neutral, stays */
@keyframes wince {
  0%   { color:var(--danger); }
  40%  { color:var(--danger); }
  100% { color:var(--ink-dim); }
}

/* the one permitted slow breath — the active rail dot while the fleet works */
@keyframes breatheDot {
  0%, 100% { opacity:.4; }
  50%      { opacity:1; }
}

/* the impact slice's one-time blast wave — a single soft ring, then still */
@keyframes blastRing {
  0%   { opacity:.5; }
  100% { opacity:0; }
}
</style>
</head>
<body>
<div id="app">
  <nav id="rail" aria-label="pages"></nav>
  <div id="main">
    <header id="header">
      <span class="wordmark">novakai<span class="wordmark-dot" id="wordmark-dot"></span></span>
      <span class="page-name" id="page-name">canvas</span>
    </header>
    <div id="host"></div>
  </div>
</div>
<div id="tip"></div>

<script>
"use strict";

/* ============================================================================
   novakai — vision prototype · script
   ----------------------------------------------------------------------------
   JS table of contents
     §A  named duration constants
     §B  tiny dom + misc utilities
     §C  event bus
     §D  motion helpers (enter, stagger, measured-height, glows, dots)
     §E  tooltip — the hover-evidence layer
     §F  demo dataset (nodes, edges, prototypes, builds)
     §G  app state
     §H  router + rail + header
     §I  canvas page
     §J  draft canvas module (the embedded live prototype)
     §K  prototypes page
     §L  builds page + lifecycle scripts
     §M  boot
   ----------------------------------------------------------------------------
   determinism: no Math.random(), no Date.now() feeding the UI — every date is
   a fixed string, every delay a named constant. same clicks, same run.
   ========================================================================== */

/* ============================================================================
   §A · named duration constants (ms unless noted)
   ========================================================================== */

const D = {
  /* shell */
  PAGE: 450,            // page crossfade + 12px drift

const EASE = 'cubic-bezier(.22,1,.36,1)';   /* the one easing, everywhere */

/* reduced motion: the opening cascade (and other ceremonies) skip to the
   settled frame */

/* ============================================================================
   §B · tiny dom + misc utilities
   ========================================================================== */

function $(sel, root) { return (root || document).querySelector(sel); }

function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text !== undefined) n.textContent = text;
  return n;
}

function btn(cls, text, onClick) {
  const b = el('button', cls, text);
  b.type = 'button';
  if (onClick) b.addEventListener('click', onClick);
  return b;
}

const SVG_NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs) {
  const n = document.createElementNS(SVG_NS, tag);
  if (attrs) for (const k in attrs) n.setAttribute(k, attrs[k]);
  return n;
}

function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }

/* deterministic 7-char fake sha from a string — no randomness anywhere */
function shaFor(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619) >>> 0;
  }
  return ('0000000' + h.toString(16)).slice(-7);
}

/* mm:ss offset label for scripted feeds */
function offsetLabel(ms) {
  const total = Math.round(ms / 1000);
  const m = Math.floor(total / 60);
  const s = total % 60;
  return '+' + m + ':' + (s < 10 ? '0' : '') + s;
}

/* ============================================================================
   §C · event bus — data mutates, open views listen
   ========================================================================== */

const Bus = (() => {
  const map = new Map();
  return {
    on(evt, fn) {
      if (!map.has(evt)) map.set(evt, new Set());
      map.get(evt).add(fn);
      return () => { const s = map.get(evt); if (s) s.delete(fn); };
    },
    emit(evt, payload) {
      const s = map.get(evt);
      if (s) for (const fn of [...s]) fn(payload);
    },
  };
})();

/* ============================================================================
   §D · motion helpers
   ----------------------------------------------------------------------------
   nothing appears instantly; nothing jumps; everything eases; and every
   helper cleans up after itself so the app is motionless at rest.
   ========================================================================== */

/* ease a node in: opacity 0→1 plus a small drift from where it logically
   comes from. dy > 0 means it rises into place; dx for sideways entries.
   Web Animations API: replays cleanly on route re-entry, no forced reflow. */
function enterEl(node, opts) {
  const o = opts || {};
  const dy = o.dy !== undefined ? o.dy : D.DRIFT;
  const dx = o.dx || 0;
  const dur = o.dur || D.ENTER;
  const delay = o.delay || 0;
  node.animate(
    [
      { opacity: 0, transform: 'translate(' + dx + 'px,' + dy + 'px)' },
      { opacity: 1, transform: 'translate(0,0)' },
    ],
    { delay, duration: dur, easing: EASE, fill: 'both' }
  );
  return node;
}

/* stagger a list of children in, 45–70ms apart */
function staggerIn(nodes, opts) {
  const o = opts || {};
  const step = o.step || D.STAGGER;
  const base = o.delay || 0;
  let i = 0;
  for (const n of nodes) {
    enterEl(n, {
      dy: o.dy !== undefined ? o.dy : 8,
      dur: o.dur || D.ENTER_FAST,
      delay: base + i * step,
    });
    i++;
  }
}

/* --------------------------------------------------------------------------
   grid-rows expanders — .xwrap (0fr→1fr) around an .xinner. layout animates
   without measuring, so it can never jump or misjudge a height.
   -------------------------------------------------------------------------- */

function makeX(content, open) {
  const wrap = el('div', 'xwrap' + (open ? ' open' : ''));
  const inner = el('div', 'xinner');
  inner.append(content);
  wrap.append(inner);
  return wrap;
}

function xSet(wrap, open) { wrap.classList.toggle('open', !!open); }
function xIsOpen(wrap) { return wrap.classList.contains('open'); }

/* --------------------------------------------------------------------------
   Escape stack — innermost-open closes first, one level per press.
   push() returns a release; the close fn must call its own release.
   -------------------------------------------------------------------------- */

const EscStack = (() => {
  const stack = [];
  window.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    Tip.hideNow();
    const top = stack[stack.length - 1];
    if (top) {
      e.preventDefault();
      /* keyboard actions are never animated — suppress transitions for the
         frames in which this close applies, then release */
      document.documentElement.classList.add('kbd-instant');
      top.close();
      requestAnimationFrame(() => requestAnimationFrame(() =>
        document.documentElement.classList.remove('kbd-instant')));
    }
  });
  function push(close) {
    const entry = { close };
    stack.push(entry);
    return () => {
      const i = stack.indexOf(entry);
      if (i >= 0) stack.splice(i, 1);
    };
  }
  return { push };
})();

/* one soft glow that decays and never repeats */
function glowOnce(node, cls) {
  const c = cls || 'glow1';
  node.classList.add(c);
  node.addEventListener('animationend', () => node.classList.remove(c), { once: true });
}

/* the honest thinking dots — present only while genuinely waiting */
function makeDots() {
  const d = el('span', 'dots');
  d.append(el('i'), el('i'), el('i'));
  return d;
}

/* circle-check tick (trust box). state: false pending, true on. */
function makeTick(on) {
  const wrap = el('span', 'tick' + (on ? ' on' : ''));
  const svg = svgEl('svg', { viewBox: '0 0 20 20' });
  svg.append(
    svgEl('circle', { cx: 10, cy: 10, r: 8.4 }),
    svgEl('path', { d: 'M6.2 10.4l2.6 2.6 5-5.6' })
  );
  wrap.append(svg);
  return wrap;
}

/* flip a tick on: stroke draws over TICK_DRAW, then one soft glow */
function tickOn(tick) {
  if (tick.classList.contains('on')) return;
  tick.classList.add('on');
  glowOnce(tick);
}

/* ============================================================================
   §E · tooltip — the hover-evidence layer
   ----------------------------------------------------------------------------
   every claim on screen has a runnable command one hover away.
   contentFn returns a DOM node (or string) built lazily on show.
   ========================================================================== */

const Tip = (() => {
  const box = $('#tip');
  let hideTimer = 0;
  let current = null;

  function show(target, contentFn) {
    clearTimeout(hideTimer);
    current = target;
    box.textContent = '';
    const content = contentFn();
    if (typeof content === 'string') box.textContent = content;
    else box.append(content);
    box.classList.add('show');
    /* placement: never over the text the card annotates. prefer above the
       anchor's own card body (its enclosing section), flip below only when
       there is no room, and never overlap the anchor itself. */
    const r = target.getBoundingClientRect();
    box.style.left = '0px';
    box.style.top = '0px';
    const bw = box.offsetWidth, bh = box.offsetHeight;
    const region = target.closest(
      '.bd-section, .trust-seal, .rv-attest, .draft-card, .ct-alt, .cv-panel .np-head'
    );
    const rr = region ? region.getBoundingClientRect() : r;
    let x = r.left + r.width / 2 - bw / 2;
    let y = rr.top - bh - 10;                 /* above the whole card body */
    if (y < 8) {
      y = rr.bottom + 10;                     /* flip below the card body */
      if (y + bh > window.innerHeight - 8) {
        /* cramped both ways: fall back to clear of the anchor alone */
        y = r.top - bh - 10;
        if (y < 8) y = r.bottom + 10;
      }
    }
    x = clamp(x, 8, window.innerWidth - bw - 8);
    box.style.left = Math.round(x) + 'px';
    box.style.top = Math.round(y) + 'px';
  }

  function hide(target) {
    if (target && target !== current) return;
    current = null;
    hideTimer = setTimeout(() => box.classList.remove('show'), 40);
  }

  /* bind hover + keyboard focus evidence to an element */
  function bind(target, contentFn) {
    target.setAttribute('data-evidence', '');
    target.addEventListener('mouseenter', () => show(target, contentFn));
    target.addEventListener('mouseleave', () => hide(target));
    target.addEventListener('focus', () => show(target, contentFn));
    target.addEventListener('blur', () => hide(target));
    return target;
  }

  function hideNow() {
    current = null;
    box.classList.remove('show');
  }

  return { bind, hideNow };
})();

/* evidence card builder: lines of [class, text] pairs, mono, stacked */
function evidence(lines) {
  return () => {
    const wrap = el('span');
    lines.forEach((ln, i) => {
      if (i) wrap.append(el('br'));
      const s = el('span', ln[0] || '');
      s.textContent = ln[1];
      wrap.append(s);
    });
    return wrap;
  };
}

   ========================================================================== */

function setPageName(page) {
  const n = $('#page-name');
  if (n.textContent === page) return;
  n.style.opacity = '0';
  setTimeout(() => {
    n.textContent = page;
    n.style.opacity = '1';
  }, 150);
}

const Router = (() => {
  const registry = {};
  let cur = { key: null, inst: null };

  function register(name, mod) { registry[name] = mod; }

  function parse() {
    let h = location.hash.slice(1);
    if (!h) h = 'canvas';
    const i = h.indexOf('/');
    let page = i < 0 ? h : h.slice(0, i);
    let arg = i < 0 ? null : h.slice(i + 1);
    if (!registry[page]) { page = 'canvas'; arg = null; }
    return { page, arg };
  }

  /* crossfade + 12px vertical drift between pages */
  function apply() {
    const { page, arg } = parse();
    const key = page + (arg ? '/' + arg : '');
    if (cur.key === key) return;
    Tip.hideNow();
    const inst = registry[page].render(arg);
    const host = $('#host');
    const old = cur.inst;
    cur = { key, inst };
    inst.el.classList.add('pre-enter');
    host.append(inst.el);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        inst.el.classList.remove('pre-enter');
        if (old) old.el.classList.add('leave');
      });
    });
    if (old) {
      setTimeout(() => {
        old.el.remove();
        if (old.cleanup) old.cleanup();
      }, D.PAGE + 80);
    }
    if (inst.mounted) requestAnimationFrame(() => inst.mounted());
    Rail.setActive(page);
    setPageName(page);
  }

  function go(hash) {
    if (location.hash === hash) apply();
    else location.hash = hash;
  }

  window.addEventListener('hashchange', apply);
  return { register, go, apply };
})();
