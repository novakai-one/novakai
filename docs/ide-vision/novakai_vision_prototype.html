const Rail = (() => {
  const railEl = $('#rail');
  const items = {};
  let dotEl = null;

  function makeItem(key, label) {
    const b = btn('rail-item');
    const ic = el('span', 'rail-icon');
    ic.innerHTML = RAIL_ICONS[key];
    if (key === 'builds') {
      dotEl = el('span', 'rail-dot', '0');
      ic.append(dotEl);
    }
    b.append(ic, el('span', 'rail-label', label));
    b.addEventListener('click', () => Router.go('#' + key));
    b.setAttribute('aria-label', label);
    items[key] = b;
    return b;
  }

  function build() {
    railEl.append(
      makeItem('canvas', 'canvas'),
      makeItem('prototypes', 'prototypes'),
      makeItem('builds', 'builds'),
      el('div', 'rail-spacer')
    );
    /* the muted gate glyph — hover card is the proving command */
    const gate = el('div', 'rail-item rail-gate');
    const ic = el('span', 'rail-icon');
    ic.innerHTML = RAIL_ICONS.gate;
    gate.append(ic, el('span', 'rail-label', 'map gate'));
    gate.tabIndex = 0;
    Tip.bind(gate, () => evidence([
      ['tip-strong', 'map verified @ ' + S.map.sha + ' · 0 drift'],
      ['tip-cmd', 'npm run novakai:onboard -- --verify'],
      ['', 'regenerated from code · every unit, signature and edge checked'],
    ])());
    railEl.append(gate);
    refreshDot();
  }

  function refreshDot() {
    const n = awaitingCount();
    if (!dotEl) return;
    dotEl.textContent = String(n);
    dotEl.classList.toggle('on', n > 0);
  }

  function setActive(page) {
    for (const k in items) items[k].classList.toggle('active', k === page);
  }

  function getItem(key) { return items[key]; }

  Bus.on('rail', refreshDot);
  return { build, refreshDot, setActive, getItem };
})();

/* ============================================================================
   slice diagrams — small hand-laid SVGs from data (no layout algorithm)
   ----------------------------------------------------------------------------
   spec: { w, h, nw?, nh?, nodes:[{id,label?,x,y,ghost?}], edges:[{from,to,dashed?}] }
   ========================================================================== */

function renderSlice(spec) {
  const nw = spec.nw || 150;
  const nh = spec.nh || 34;
  const svg = svgEl('svg', { viewBox: '0 0 ' + spec.w + ' ' + spec.h });
  const pos = {};
  for (const n of spec.nodes) pos[n.id] = n;

  /* edges first (under the boxes) */
  for (const e of spec.edges) {
    const a = pos[e.from], b = pos[e.to];
    if (!a || !b) continue;
    const acx = a.x + nw / 2, acy = a.y + nh / 2;
    const bcx = b.x + nw / 2, bcy = b.y + nh / 2;
    let x1, y1, x2, y2;
    if (Math.abs(bcx - acx) >= Math.abs(bcy - acy)) {
      /* horizontal attachment */
      if (bcx > acx) { x1 = a.x + nw; y1 = acy; x2 = b.x; y2 = bcy; }
      else { x1 = a.x; y1 = acy; x2 = b.x + nw; y2 = bcy; }
    } else {
      /* vertical attachment */
      if (bcy > acy) { x1 = acx; y1 = a.y + nh; x2 = bcx; y2 = b.y; }
      else { x1 = acx; y1 = a.y; x2 = bcx; y2 = b.y + nh; }
    }
    const line = svgEl('path', { d: 'M' + x1 + ' ' + y1 + ' L' + x2 + ' ' + y2 });
    line.style.fill = 'none';
    line.style.stroke = e.dashed ? 'var(--accent)' : 'var(--edge)';
    line.style.strokeWidth = '1';
    line.style.opacity = e.dashed ? '.6' : '.4';
    if (e.dashed) line.style.strokeDasharray = '4 4';
    svg.append(line);
    /* arrowhead at the target end */
    const ang = Math.atan2(y2 - y1, x2 - x1);
    const hx = x2 - Math.cos(ang) * 1.5, hy = y2 - Math.sin(ang) * 1.5;
    const L = 7, Wd = 3.4;
    const p1x = hx - Math.cos(ang) * L + Math.sin(ang) * Wd;
    const p1y = hy - Math.sin(ang) * L - Math.cos(ang) * Wd;
    const p2x = hx - Math.cos(ang) * L - Math.sin(ang) * Wd;
    const p2y = hy - Math.sin(ang) * L + Math.cos(ang) * Wd;
    const head = svgEl('path', {
      d: 'M' + hx + ' ' + hy + ' L' + p1x + ' ' + p1y + ' L' + p2x + ' ' + p2y + ' Z',
    });
    head.style.fill = e.dashed ? 'var(--accent)' : 'var(--edge)';
    head.style.opacity = e.dashed ? '.6' : '.4';
    svg.append(head);
  }

  /* node boxes — a still monochrome figure in a paper: hollow rings, the
     new/changed node solid with a single accent ring */
  for (const n of spec.nodes) {
    const g = svgEl('g');
    g.setAttribute('data-node', n.id);
    const rect = svgEl('rect', { x: n.x, y: n.y, width: nw, height: nh, rx: 7 });
    rect.style.fill = n.ghost ? 'var(--panel-2)' : 'transparent';
    rect.style.stroke = n.ghost ? 'var(--accent)' : 'rgba(231,234,241,.28)';
    rect.style.strokeWidth = n.ghost ? '1.2' : '1';
    rect.style.transition = 'stroke 240ms ' + EASE;
    const label = svgEl('text', {
      x: n.x + nw / 2, y: n.y + nh / 2 + 3.5, 'text-anchor': 'middle',
    });
    label.textContent = n.label || n.id;
    label.style.fill = n.ghost ? 'var(--accent)' : 'var(--ink-dim)';
    label.style.fontFamily = 'var(--mono)';
    label.style.fontSize = '10.5px';
    label.style.transition = 'fill 240ms ' + EASE;
    g.append(rect, label);
    svg.append(g);
  }
  return svg;
}

/* the impact slice's one-time blast wave — a single soft ring expands from
   the changed node along the plane of the figure, once, then stillness */
function blastWave(svg, spec) {
  const nw = spec.nw || 150, nh = spec.nh || 34;
  const origin = spec.nodes.find((n) => n.ghost) || spec.nodes[0];
  if (!origin) return;
  const cx = origin.x + nw / 2, cy = origin.y + nh / 2;
  const ring = svgEl('circle', { cx, cy, r: 10 });
  ring.style.fill = 'none';
  ring.style.stroke = 'var(--accent)';
  ring.style.strokeWidth = '1';
  ring.style.opacity = '.5';
  svg.append(ring);
  ring.animate(
    [
      { r: '10px', opacity: .5 },
      { r: Math.round(Math.max(spec.w, spec.h) * 0.75) + 'px', opacity: 0 },
    ],
    { duration: 700, easing: EASE, fill: 'forwards' }
  );
  setTimeout(() => ring.remove(), 780);
}

/* ============================================================================
   §I · canvas page — the codebase map, code only, calm
   ========================================================================== */

const CanvasPage = {
  render() {
    const root = el('div', 'page cv-root');
    const grid = el('div', 'cv-grid');
    const gridLo = el('div', 'cv-grid-lo');
    const world = el('div', 'cv-world');
    const vig = el('div', 'cv-vignette');
    const svg = svgEl('svg', { class: 'cv-edges' });
    svg.style.opacity = '0';
    world.append(svg);

    const panel = el('aside', 'cv-panel');
    const footer = el('div', 'cv-footer');
    const hint = el('div', 'cv-hint',
      'click a node · scroll to zoom · double-click to re-fit');
    root.append(grid, gridLo, world, vig, footer, hint, panel);

    const V = S.canvas;
    const unsubs = [];
    const timers = [];

    /* the opening proof cascade runs once per session, on the first canvas
       render only; hash re-entry is instant; reduced motion skips it */
    const willCascade = !S.cascadeDone && !REDUCED_MOTION;
    let cascading = willCascade;
    let gridFade = willCascade ? 0 : 1;

    /* ------------------------------------------------------------------ *
     *  nodes + edges DOM                                                  *
     * ------------------------------------------------------------------ */

    /* nodes render uniform at rest — tier is a panel/hover fact, not a
       traffic light. only the unproven node reads weaker. */
    const nodeEls = new Map();
    const seamEls = new Map();

    /* mount the stacked source face for every node at init (opacity 0 at fit
       zoom — the opening cascade is untouched since the faces stay invisible
       below z 1.25). the sig span match-moves into body line 1; lines 2+ scrub
       in with a per-line stagger.
       ponytail: eager-mounting all ~180 spans is trivial at 17 nodes; lazy
       mount + at-settle viewport culling is the upgrade path at hundreds-of-
       nodes scale — at source zoom the viewport holds ~15 footprints anyway. */
    function mountCodeFace(nd, n) {
      const prefix = Math.max(0, n.body[0].indexOf(n.sig));
      const sig = el('span', 'cv-sig', n.sig);
      sig.style.setProperty('--sig-prefix', String(prefix));
      nd.append(sig);

      const code = el('div', 'cv-code' + (n.tier === 'unproven' ? ' unproven' : ''));
      const CAP = 11;                       /* the reading slot holds 11 lines */
      const over = n.body.length > CAP;
      const shown = over ? n.body.slice(0, CAP - 1) : n.body;
      shown.forEach((ln, i) => {
        const cl = el('div', 'cl' + (i === 0 ? ' cl0' : ''), ln);
        cl.style.setProperty('--i', String(i));
        code.append(cl);
      });
      if (over) {
        code.append(el('div', 'cl more',
          '··· ' + (n.body.length - (CAP - 1)) + ' more lines'));
      }
      nd.append(code);
    }

    for (const n of DATA.nodes) {
      const nd = el('div', 'cv-node' + (n.tier === 'unproven' ? ' unproven' : ''));
      nd.style.left = n.x + 'px';
      nd.style.top = n.y + 'px';
      /* evidence ground beneath the source: proven earns it fully, attested at
         0.6, unproven none (code stays visible — ruling 1.1 — but it has not
         earned the ground). opacity is a pure --p-code consumer. */
      if (n.tier !== 'unproven') {
        const gr = el('div', 'cv-ground');
        gr.style.opacity = n.tier === 'attested'
          ? 'calc(var(--p-code, 0) * 0.6)' : 'var(--p-code, 0)';
        nd.append(gr);
      }
      const row = el('div', 'nrow');
      row.append(el('span', 'nkind', n.kind));
      nd.append(row, el('div', 'ntitle', n.label));
      /* the proof seam — only where a runnable command verified the node */
      if (n.tier === 'proven') {
        const sm = el('span', 'cv-seam' + (willCascade ? '' : ' on'));
        nd.append(sm);
        seamEls.set(n.id, sm);
      }
      mountCodeFace(nd, n);
      nd.dataset.id = n.id;
      if (willCascade) nd.style.opacity = '0';   /* the map arrives unproven */
      world.append(nd);
      nodeEls.set(n.id, nd);
    }

    /* edge groups: functional first, then composition (hidden until main) */
    const edgeEls = [];
    function edgeGeometry(from, to, comp) {
      const a = nodeById(from), b = nodeById(to);
      let sx, sy, ex, ey, c1x, c1y, c2x, c2y;
      if (!comp && Math.abs(a.x - b.x) < 60) {
        /* same-column neighbors connect vertically */
        if (b.y > a.y) {
          sx = a.x + NODE_W / 2; sy = a.y + NODE_H;
          ex = b.x + NODE_W / 2; ey = b.y;
        } else {
          sx = a.x + NODE_W / 2; sy = a.y;
          ex = b.x + NODE_W / 2; ey = b.y + NODE_H;
        }
        const spread = Math.max(Math.abs(ey - sy) * 0.4, 24);
        const dir = ey > sy ? 1 : -1;
        c1x = sx; c1y = sy + dir * spread;
        c2x = ex; c2y = ey - dir * spread;
      } else if (comp) {
        /* main composes rightward */
        sx = a.x + NODE_W; sy = a.y + NODE_H / 2;
        ex = b.x; ey = b.y + NODE_H / 2;
        const spread = Math.max(Math.abs(ex - sx) * 0.42, 36);
        c1x = sx + spread; c1y = sy;
        c2x = ex - spread; c2y = ey;
      } else {
        /* consumer → dependency, flowing left */
        sx = a.x; sy = a.y + NODE_H / 2;
        ex = b.x + NODE_W; ey = b.y + NODE_H / 2;
        const spread = Math.max(Math.abs(ex - sx) * 0.42, 36);
        c1x = sx - spread; c1y = sy;
        c2x = ex + spread; c2y = ey;
      }
      return { sx, sy, ex, ey, c1x, c1y, c2x, c2y };
    }

    function headPath(gm) {
      /* arrowhead aligned with the curve's true arrival direction */
      const ang = Math.atan2(gm.ey - gm.c2y, gm.ex - gm.c2x);
      const L = 8, Wd = 3.8;
      const hx = gm.ex, hy = gm.ey;
      const p1x = hx - Math.cos(ang) * L + Math.sin(ang) * Wd;
      const p1y = hy - Math.sin(ang) * L - Math.cos(ang) * Wd;
      const p2x = hx - Math.cos(ang) * L - Math.sin(ang) * Wd;
      const p2y = hy - Math.sin(ang) * L + Math.cos(ang) * Wd;
      return 'M' + hx + ' ' + hy + ' L' + p1x + ' ' + p1y + ' L' + p2x + ' ' + p2y + ' Z';
    }

    function addEdge(e, comp) {
      const g = svgEl('g', { class: 'edge' + (comp ? ' comp' : '') });
      const gm = edgeGeometry(e.from, e.to, comp);
      const wire = svgEl('path', {
        class: 'wire',
        d: 'M' + gm.sx + ' ' + gm.sy +
           ' C' + gm.c1x + ' ' + gm.c1y + ' ' + gm.c2x + ' ' + gm.c2y +
           ' ' + gm.ex + ' ' + gm.ey,
      });
      const head = svgEl('path', { class: 'head', d: headPath(gm) });
      g.append(wire, head);
      svg.append(g);
      edgeEls.push({ g, from: e.from, to: e.to, comp });
    }

    for (const e of DATA.edges) addEdge(e, false);
    for (const e of DATA.comp) addEdge(e, true);

    /* ------------------------------------------------------------------ *
     *  pan / zoom — inertial, everything through the lerp loop            *
     * ------------------------------------------------------------------ */

    let raf = 0;
    let rootW = 0, rootH = 0;

    function applyTransform(atRest) {
      /* one translate3d + scale; snap to device pixels only at rest */
      const tx = atRest ? Math.round(V.tx) : V.tx;
      const ty = atRest ? Math.round(V.ty) : V.ty;
      world.style.transform =
        'translate3d(' + tx + 'px,' + ty + 'px,0) scale(' + V.z + ')';
      const p = 24 * V.z, P = 96 * V.z;          /* fine pitch + major rule */
      grid.style.backgroundSize =
        P + 'px ' + P + 'px, ' + p + 'px ' + p + 'px';
      grid.style.backgroundPosition = tx + 'px ' + ty + 'px';
      const p2 = 48 * V.z, P2 = 192 * V.z;
      gridLo.style.backgroundSize =
        P2 + 'px ' + P2 + 'px, ' + p2 + 'px ' + p2 + 'px';
      gridLo.style.backgroundPosition = tx + 'px ' + ty + 'px';
      /* below zoom ~0.6 the fine grid crossfades to the 48px layer so the
         perceived density stays constant; the grid also quietens as the source
         resolves so the ink reads (paper recedes to 40% by z = 3) */
      const fine = clamp((V.z - 0.5) / 0.15, 0, 1);
      const gridQuiet = 1 - 0.6 * clamp((V.z - 2.2) / 0.8, 0, 1);
      grid.style.opacity = String(fine * gridFade * gridQuiet);
      gridLo.style.opacity = String((1 - fine) * gridFade * gridQuiet);
      /* the semantic-zoom scrub — written once per frame on the world root;
         every new face is a pure CSS consumer of these (opacity/transform/
         width). zero timers, zero keyframes; hold z anywhere and it is still. */
      world.style.setProperty('--p-sig', String(clamp((V.z - 1.25) / 0.25, 0, 1)));
      world.style.setProperty('--p-code', String(clamp((V.z - 2) / 0.5, 0, 1)));
      world.style.setProperty('--invz', String(1 / Math.max(1, V.z)));
    }

    function settled() {
      return Math.abs(V.txT - V.tx) < 0.12 &&
             Math.abs(V.tyT - V.ty) < 0.12 &&
             Math.abs(V.zT - V.z) < 0.0006;
    }

    function tickLerp() {
      V.tx += (V.txT - V.tx) * D.LERP;
      V.ty += (V.tyT - V.ty) * D.LERP;
      V.z += (V.zT - V.z) * D.LERP;
      if (settled()) {
        V.tx = V.txT; V.ty = V.tyT; V.z = V.zT;
        applyTransform(true);         /* pixel-snap at rest */
        raf = 0;                      /* idle: stop by not rescheduling */
        return;
      }
      applyTransform(false);
      raf = requestAnimationFrame(tickLerp);
    }

    function kick() { if (!raf) raf = requestAnimationFrame(tickLerp); }

    /* fit the whole map, generously. snap=true lands at rest (first visit);
       otherwise the lerp loop eases toward the fit (the re-fit affordance). */
    function fitAll(snap) {
      let minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
      for (const n of DATA.nodes) {
        minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
        maxX = Math.max(maxX, n.x + NODE_W); maxY = Math.max(maxY, n.y + NODE_H);
      }
      const pad = 90;
      const bw = maxX - minX + pad * 2, bh = maxY - minY + pad * 2;
      const z = clamp(Math.min(rootW / bw, rootH / bh), 0.35, 1);
      V.zT = z;
      V.txT = (rootW - (maxX + minX) * z) / 2;
      V.tyT = (rootH - (maxY + minY) * z) / 2;
      if (snap) {
        V.tx = V.txT; V.ty = V.tyT; V.z = V.zT; /* land at rest, no motion */
      } else {
        kick();                                  /* eased re-fit */
      }
      V.fitted = true;
    }

    /* wheel: zoom-to-cursor, solved on TARGET values at wheel time.
       deltaMode normalized; ctrl-wheel = trackpad pinch (exponential). */
    root.addEventListener('wheel', (e) => {
      e.preventDefault();
      markInteracted();
      let dy = e.deltaY;
      if (e.deltaMode === 1) dy *= 16;        /* lines → px */
      else if (e.deltaMode === 2) dy *= 120;  /* pages → px */
      const k = e.ctrlKey ? 0.01 : 0.0013;    /* pinch is finer-grained input */
      const factor = clamp(Math.exp(-dy * k), 0.55, 1.8); /* clamp per event */
      const z2 = clamp(V.zT * factor, 0.35, 4.0);   /* source-reading range */
      const r = root.getBoundingClientRect();
      const mx = e.clientX - r.left, my = e.clientY - r.top;
      const wx = (mx - V.txT) / V.zT;
      const wy = (my - V.tyT) / V.zT;
      V.zT = z2;
      V.txT = mx - wx * z2;
      V.tyT = my - wy * z2;
      kick();
    }, { passive: false });

    /* double-click dive is detected on POINTERDOWN pairs, not the native
       dblclick / click events: the first click's ensureVisible glide slides the
       node out from under the pointer, so the second mousedown/up can straddle
       two elements (the panel is also sliding in) and fire no click — and hence
       no dblclick — at all. pointerdown always fires on the raw press. lastPress
       records the previous press; diveAt suppresses the trailing click's select
       so it can't restart a glide that fights the dive. (D1) */
    let lastPress = { t: 0, x: 0, y: 0, id: null };
    let diveAt = 0;

    /* drag-pan on the background */
    let pan = null;
    root.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return;
      if (e.target.closest('.cv-node') || e.target.closest('.cv-panel') ||
          e.target.closest('.cv-footer')) return;
      markInteracted();
      pan = { x: e.clientX, y: e.clientY, moved: false };
      try { root.setPointerCapture(e.pointerId); } catch (_) { /* no live pointer */ }
    });
    root.addEventListener('pointermove', (e) => {
      if (!pan) return;
      const dx = e.clientX - pan.x, dy = e.clientY - pan.y;
      if (!pan.moved && Math.abs(dx) + Math.abs(dy) > 3) {
        pan.moved = true;
        root.classList.add('panning');
      }
      if (pan.moved) {
        V.txT += dx; V.tyT += dy;
        pan.x = e.clientX; pan.y = e.clientY;
        kick();
      }
    });
    root.addEventListener('pointerup', (e) => {
      if (!pan) return;
      const wasClick = !pan.moved;
      pan = null;
      root.classList.remove('panning');
      if (wasClick) deselect();       /* background click: everything eases back */
    });

    /* background double-click re-fits (native dblclick is reliable here — both
       clicks share the background target). Node dives are NOT handled via the
       native dblclick event: the first click's ensureVisible glide can slide the
       node out from under the pointer, so the second click lands on the panel or
       a neighbour and the browser fires no dblclick at all. Node dives are
       detected manually from click pairs (see onDocClick below). (D1) */
    root.addEventListener('dblclick', (e) => {
      /* a node dive just fired: the browser still emits a dblclick whose target
         is the common ancestor of the two clicks (the background when the node
         glided out from under the 2nd click) — ignore it so it doesn't re-fit
         and undo the dive (D1) */
      if (performance.now() - diveAt < 400) return;
      if (e.target.closest('.cv-node') || e.target.closest('.cv-panel') ||
          e.target.closest('.cv-footer')) return;
      markInteracted();
      fitAll(false);
    });
    /* two left-button presses at the same screen point within 400ms = a
       double-click. Capture phase so it fires before pan/select and regardless
       of what the second press lands on; dive to the node the FIRST press hit
       (the node the user aimed at, even after the glide moved it). stopPropagation
       keeps the second press from starting a pan / deselecting. */
    function onDocPointerDown(e) {
      if (e.button !== 0) return;
      const now = performance.now();
      const nodeEl = e.target.closest && e.target.closest('.cv-node');
      const nid = nodeEl ? nodeEl.dataset.id : null;
      const dbl = now - lastPress.t < 400 &&
                  Math.abs(e.clientX - lastPress.x) < 6 &&
                  Math.abs(e.clientY - lastPress.y) < 6;
      if (dbl && lastPress.id && nodeById(lastPress.id)) {
        lastPress.t = 0;                     /* consume: no re-dive on a 3rd press */
        diveAt = now;
        e.stopPropagation();
        markInteracted();
        diveToNode(nodeById(lastPress.id));
        return;
      }
      lastPress = { t: now, x: e.clientX, y: e.clientY, id: nid };
    }
    /* a press that moves is a drag, not a click half — invalidate the pending
       pair so a drag-release followed by a same-spot drag-release can't be
       read as a double click (same 6px slop as the pair check above). */
    function onDocPointerMove(e) {
      if (!lastPress.t) return;
      if (Math.abs(e.clientX - lastPress.x) >= 6 || Math.abs(e.clientY - lastPress.y) >= 6) {
        lastPress.t = 0;
      }
    }
    window.addEventListener('pointerdown', onDocPointerDown, true);
    window.addEventListener('pointermove', onDocPointerMove, true);
    function onKey(e) {
      if (e.key !== 'f' && e.key !== 'F') return;
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA')) return;
      markInteracted();
      fitAll(false);
    }
    window.addEventListener('keydown', onKey);

    /* programmatic glide — 700ms eased tween of the lerp target */
    let glideRaf = 0;
    function glideToNode(n) {
      cancelAnimationFrame(glideRaf);
      const cx = (rootW - (panel.classList.contains('open') ? 360 : 0)) / 2;
      const cy = rootH / 2;
      const destX = cx - (n.x + NODE_W / 2) * V.zT;
      const destY = cy - (n.y + NODE_H / 2) * V.zT;
      const fromX = V.txT, fromY = V.tyT;
      const t0 = performance.now();
      function step(now) {
        const t = clamp((now - t0) / D.GLIDE, 0, 1);
        const k = 1 - Math.pow(1 - t, 3);     /* ease-out cubic */
        V.txT = fromX + (destX - fromX) * k;
        V.tyT = fromY + (destY - fromY) * k;
        kick();
        if (t < 1) glideRaf = requestAnimationFrame(step);
      }
      glideRaf = requestAnimationFrame(step);
    }

    /* double-click a node dives to source depth (zT 3.2) centered on it —
       the symmetric partner of the background double-click re-fit, through the
       same lerp path. reduced motion snaps instead of gliding. */
    function diveToNode(n) {
      /* the first click of the double-click already fired selectNode →
         ensureVisible → glideToNode; that glide's rAF keeps overwriting txT/tyT
         with fit-zoom destinations. Kill it before we set the dive targets so
         the node actually lands centered at z 3.2 (D1). */
      cancelAnimationFrame(glideRaf);
      const cx = (rootW - (panel.classList.contains('open') ? 360 : 0)) / 2;
      const cy = rootH / 2;
      const z = 3.2;
      V.zT = z;
      V.txT = cx - (n.x + NODE_W / 2) * z;
      V.tyT = cy - (n.y + NODE_H / 2) * z;
      if (REDUCED_MOTION) {
        V.tx = V.txT; V.ty = V.tyT; V.z = V.zT;
        applyTransform(true);
      } else {
        kick();
      }
    }

    /* ------------------------------------------------------------------ *
     *  hover focus + selection                                            *
     * ------------------------------------------------------------------ */

    function neighborsOf(id) {
      const set = new Set([id]);
      for (const e of DATA.edges) {
        if (e.from === id) set.add(e.to);
        if (e.to === id) set.add(e.from);
      }
      if (id === 'main') for (const e of DATA.comp) set.add(e.to);
      return set;
    }

    function setFocus(id) {
      if (!id) {
        svg.classList.remove('focus');
        for (const [, nd] of nodeEls) nd.classList.remove('dim');
        for (const ee of edgeEls) ee.g.classList.remove('lit');
        return;
      }
      const nbr = neighborsOf(id);
      svg.classList.add('focus');
      for (const [nid, nd] of nodeEls) nd.classList.toggle('dim', !nbr.has(nid));
      for (const ee of edgeEls) {
        const lit = !ee.comp && (ee.from === id || ee.to === id);
        ee.g.classList.toggle('lit', lit);
      }
    }

    function showComp(on) {
      for (const ee of edgeEls) if (ee.comp) ee.g.classList.toggle('show', on);
    }

    for (const [id, nd] of nodeEls) {
      nd.addEventListener('mouseenter', () => { if (!V.selected) setFocus(id); });
      nd.addEventListener('mouseleave', () => { if (!V.selected) setFocus(null); });
      nd.addEventListener('click', (e) => {
        e.stopPropagation();
        /* the trailing click of a dive gesture must not re-select (which would
           restart an ensureVisible glide fighting the dive) (D1) */
        if (performance.now() - diveAt < 400) return;
        markInteracted();
        selectNode(id);
      });
      /* dblclick dive is handled at the root (see above) so it still fires when
         the first click's ensureVisible glide moved this node out from under
         the pointer — a per-node listener would simply never fire then (D1). */
    }

    /* Escape order: innermost first — source drill-down closes before the
       panel; the panel closes before anything else. one push per level. */
    let panelEsc = null;
    const panelLocal = { srcClose: null };

    /* the 360px panel must never sit over the selected node — if the node
       would be occluded (or off-screen), glide it into the visible region */
    function ensureVisible(n) {
      if (!rootW) return;
      const vw = rootW - 360;                    /* panel is open */
      const sx = V.txT + n.x * V.zT, sy = V.tyT + n.y * V.zT;
      const sw = NODE_W * V.zT, sh = NODE_H * V.zT;
      if (sx < 24 || sx + sw > vw - 24 || sy < 24 || sy + sh > rootH - 48) {
        glideToNode(n);
      }
    }

    function selectNode(id) {
      if (V.selected) nodeEls.get(V.selected)?.classList.remove('sel');
      V.selected = id;
      nodeEls.get(id)?.classList.add('sel');
      setFocus(id);
      showComp(id === 'main');
      /* push deselect BEFORE openPanel: at depth openPanel pre-expands source
         and pushes closeSrc, which must land ON TOP of deselect so the first
         Escape collapses source and a second closes the panel (D6) */
      if (!panelEsc) panelEsc = EscStack.push(deselect);
      openPanel(nodeById(id));
      ensureVisible(nodeById(id));
    }

    function deselect() {
      if (panelEsc) { panelEsc(); panelEsc = null; }
      if (panelLocal.srcClose) { panelLocal.srcClose(); panelLocal.srcClose = null; }
      if (!V.selected) return;
      nodeEls.get(V.selected)?.classList.remove('sel');
      V.selected = null;
      setFocus(null);
      showComp(false);
      panel.classList.remove('open');
    }

    /* ------------------------------------------------------------------ *
     *  node panel                                                         *
     * ------------------------------------------------------------------ */

    const TIER_EVIDENCE = {
      proven: (n) => evidence([
        ['tip-cmd', 'novakai verify-node ' + n.id],
        ['tip-ok', '→ PROVEN @ ' + S.map.sha],
        ['', 'signature, body and edges match code'],
      ])(),
      attested: (n) => evidence([
        ['tip-cmd', 'novakai verify-node ' + n.id],
        ['tip-strong', '→ ATTESTED'],
        ['', 'human attestation on file · expires if ' + n.id + ' changes'],
      ])(),
      unproven: (n) => evidence([
        ['tip-cmd', 'novakai verify-node ' + n.id],
        ['', '→ UNPROVEN · no test or attestation reaches this node'],
      ])(),
    };

    function openPanel(n) {
      panel.textContent = '';
      const scroll = el('div', 'np-scroll');

      /* head */
      const head = el('div', 'np-head');
      const tier = el('span', 'chip tier-chip tier-' + n.tier, n.tier);
      tier.tabIndex = 0;
      Tip.bind(tier, () => TIER_EVIDENCE[n.tier](n));
      head.append(el('div', 'np-name', n.label), tier);
      scroll.append(head, el('div', 'np-kind', n.kind), el('p', 'np-desc', n.desc));

      /* signature */
      const sigSec = el('div', 'np-sec');
      sigSec.append(el('span', 'sec-title', 'signature'), el('div', 'np-sig', n.sig));
      scroll.append(sigSec);

      /* source drill-down — one click from shape to the real body */
      if (panelLocal.srcClose) { panelLocal.srcClose(); panelLocal.srcClose = null; }
      const srcSec = el('div', 'np-sec');
      srcSec.append(el('span', 'sec-title', 'source'));
      const srcLink = btn('link-quiet', 'view source');
      const srcWrap = makeX(el('pre', 'np-src', n.body.join('\n')), false);
      let srcRel = null;
      function closeSrc() {
        if (srcRel) { srcRel(); srcRel = null; }
        panelLocal.srcClose = null;
        xSet(srcWrap, false);
        srcLink.textContent = 'view source';
      }
      function openSrc() {
        xSet(srcWrap, true);
        srcLink.textContent = 'hide source';
        srcRel = EscStack.push(closeSrc);
        panelLocal.srcClose = closeSrc;
      }
      srcLink.addEventListener('click', () => {
        if (xIsOpen(srcWrap)) { closeSrc(); return; }
        openSrc();
      });
      srcSec.append(srcLink, srcWrap);
      scroll.append(srcSec);
      /* at source depth (--p-code ≥ 0.5, i.e. z ≥ 2.25) a node click lands on
         its body: open the panel with view source already expanded, reusing
         the same expander + Escape plumbing */
      if (clamp((V.z - 2) / 0.5, 0, 1) >= 0.5) openSrc();

      /* IN — nodes that lean on this one; OUT — what this one calls into */
      const ins = DATA.edges.filter((e) => e.to === n.id);
      const outs = n.id === 'main'
        ? DATA.comp.map((e) => ({ from: 'main', to: e.to }))
        : DATA.edges.filter((e) => e.from === n.id);

      function edgeList(title, list, pick) {
        const sec = el('div', 'np-sec');
        sec.append(el('span', 'sec-title', title));
        if (!list.length) {
          const em = el('div', 'empty', 'nothing — quiet by design');
          em.append(el('span', 'empty-cmd', 'novakai map edges ' + n.id + ' → 0'));
          em.style.padding = '10px 0';
          sec.append(em);
          return sec;
        }
        for (const e of list) {
          const other = pick(e);
          const row = btn('np-edge-row');
          row.append(
            el('span', 'arrow', title === 'in' ? '←' : '→'),
            el('span', '', other)
          );
          row.addEventListener('click', () => {
            selectNode(other);
            glideToNode(nodeById(other));
          });
          sec.append(row);
        }
        return sec;
      }
      scroll.append(edgeList('in', ins, (e) => e.from));
      scroll.append(edgeList('out', outs, (e) => e.to));

      panel.append(scroll);

      /* change lane — Scenario B enters here */
      const change = el('div', 'np-change');
      change.append(el('span', 'sec-title', 'change'));
      const form = el('form');
      form.style.marginTop = '8px';
      const input = el('input', 'np-change-input');
      input.placeholder = 'describe a change to this node…';
      input.setAttribute('aria-label', 'describe a change to ' + n.label);
      form.append(input);
      const after = el('div');
      change.append(form, after);
      panel.append(change);

      form.addEventListener('submit', (ev) => {
        ev.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        input.disabled = true;
        after.textContent = '';
        const dots = makeDots();
        dots.style.padding = '10px 2px 2px';
        after.append(dots);
        const t = setTimeout(() => {
          dots.remove();
          after.append(buildProposal(n, text));
        }, D.THINK_PROPOSAL);
        timers.push(t);
      });
    }

    /* the compact change-lane proposal: plain line + mini slice + one button.
       slice rule: clicked node + first IN neighbor + first OUT neighbor
       (with fallbacks), three boxes in a row. */
    function proposalNeighbors(n) {
      let inN = DATA.edges.find((e) => e.to === n.id)?.from || null;
      let outN = (n.id === 'main')
        ? DATA.comp[0].to
        : (DATA.edges.find((e) => e.from === n.id)?.to || null);
      /* fallbacks: the composition parent counts as an IN neighbor, and any
         remaining functional neighbor fills the other slot */
      if (!inN && n.id !== 'main') {
        inN = DATA.comp.find((e) => e.to === n.id)?.from || null;
      }
      const all = [...neighborsOf(n.id)].filter((id) => id !== n.id);
      if (!inN) inN = all.find((id) => id !== outN) || null;
      if (!outN) outN = all.find((id) => id !== inN) || null;
      return { inN, outN };
    }

    function shortName(id) {
      const i = id.lastIndexOf('/');
      return i < 0 ? id : id.slice(i + 1);
    }

    function buildProposal(n, text) {
      const wrap = el('div', 'np-proposal');
      const { inN, outN } = proposalNeighbors(n);
      const nbrs = [inN, outN].filter(Boolean);
      const count = 1 + nbrs.length;
      wrap.append(el('div', 'plain-line',
        'this touches ' + count + ' node' + (count === 1 ? '' : 's') +
        ' · 1 check will prove it'));

      /* miniature slice — in → node → out, one quiet row */
      const sliceNodes = [];
      const sliceEdges = [];
      if (inN) sliceNodes.push({ id: inN, label: shortName(inN), x: 8, y: 40 });
      sliceNodes.push({ id: n.id, label: shortName(n.id), x: 104, y: 40, ghost: true });
      if (outN) sliceNodes.push({ id: outN, label: shortName(outN), x: 200, y: 40 });
      if (inN) sliceEdges.push({ from: inN, to: n.id });
      if (outN) sliceEdges.push({ from: n.id, to: outN });
      const sliceBox = el('div', 'np-slice');
      sliceBox.append(renderSlice({
        w: 292, h: 120, nw: 84, nh: 28,
        nodes: sliceNodes, edges: sliceEdges,
      }));
      wrap.append(sliceBox);

      const create = btn('btn btn-primary', 'create build', (ev) => {
        ev.currentTarget.disabled = true;    /* no double-fire */
        const b = BuildsAPI.createChangeBuild(n, text, nbrs);
        Router.go('#builds/' + b.id);
      });
      wrap.append(create);
      enterEl(wrap, { dy: 8, dur: D.ENTER });
      return wrap;
    }

    /* ------------------------------------------------------------------ *
     *  footer strip + first-open hint                                     *
     * ------------------------------------------------------------------ */

    function footerText() {
      footer.textContent =
        'map verified @ ' + S.map.sha + ' · ' + S.map.nodes + ' nodes · 0 drift';
    }
    footerText();
    footer.tabIndex = 0;
    Tip.bind(footer, () => evidence([
      ['tip-cmd', 'npm run novakai:onboard -- --verify'],
      ['tip-ok', '→ map true + complete as of ' + S.map.sha],
      ['', 'every exported symbol a node or an audited exclusion'],
    ])());
    unsubs.push(Bus.on('map', footerText));

    let hintTimer = 0;
    function markInteracted() {
      if (S.hintDone) return;
      S.hintDone = true;
      clearTimeout(hintTimer);
      hint.classList.remove('show');
    }
    if (!S.hintDone) {
      /* the hint waits out the opening cascade — nothing competes with it */
      hintTimer = setTimeout(() => {
        if (!S.hintDone) hint.classList.add('show');
      }, willCascade ? D.CASCADE_END + D.HINT_IDLE : D.HINT_IDLE);
      timers.push(hintTimer);
    }

    /* Escape is handled by the global EscStack: source drill-down closes
       first, then the panel — one level per press. */

    /* ------------------------------------------------------------------ *
     *  mount                                                              *
     * ------------------------------------------------------------------ */

    /* ------------------------------------------------------------------ *
     *  the opening — the map proves itself in front of you, then goes     *
     *  quiet. one-time, deterministic. no words, no logo, no splash.      *
     *    0.0–0.2  pure bg, deliberate stillness                            *
     *    0.2–0.8  dot grid fades up                                        *
     *    0.8–2.2  nodes fade in BARE, dependency order, 50ms stagger       *
     *    1.2–2.6  the proof cascade: seams draw (30ms stagger); edges      *
     *             draw in after their endpoints; footer counter runs       *
     *    ≤3s      absolute stillness                                       *
     * ------------------------------------------------------------------ */
    function runCascade(ordered) {
      /* grid up — opacity driven by gridFade through applyTransform */
      timers.push(setTimeout(() => {
        grid.style.transition = 'opacity 600ms ' + EASE;
        gridLo.style.transition = 'opacity 600ms ' + EASE;
        gridFade = 1;
        applyTransform(true);
        timers.push(setTimeout(() => {
          grid.style.transition = '';
          gridLo.style.transition = '';
        }, 650));
      }, 200));

      /* nodes arrive bare — hairline only, no seams: the map is unproven */
      ordered.forEach((nd, i) => {
        timers.push(setTimeout(() => { nd.style.opacity = ''; }, 0));
        nd.animate(
          [{ opacity: 0 }, { opacity: 1 }],
          { delay: 800 + i * 50, duration: 420, easing: EASE, fill: 'backwards' }
        );
      });

      /* the proof cascade: each node's teal seam draws itself in */
      const orderedIds = ordered.map((nd) => nd.dataset.id);
      let si = 0;
      for (const id of orderedIds) {
        const sm = seamEls.get(id);
        if (!sm) continue;
        timers.push(setTimeout(() => sm.classList.add('on'), 1200 + si * 30));
        si++;
      }

      /* edges draw in after their endpoints — batched reads before writes,
         initial values set behind visibility:hidden, transition armed on
         the next rAF */
      svg.style.opacity = '1';
      const funcEdges = edgeEls
        .filter((ee) => !ee.comp)
        .sort((a, b) => nodeById(a.from).x - nodeById(b.from).x);
      const wires = funcEdges.map((ee) => ee.g.querySelector('path.wire'));
      const lens = wires.map((w) => w.getTotalLength());   /* all reads first */
      wires.forEach((w, i) => {
        w.style.visibility = 'hidden';
        w.style.strokeDasharray = String(lens[i]);
        w.style.strokeDashoffset = String(lens[i]);
      });
      requestAnimationFrame(() => requestAnimationFrame(() => {
        wires.forEach((w, i) => {
          w.style.visibility = '';
          w.style.transition = 'stroke-dashoffset 420ms ' + EASE + ' ' +
            (1400 + i * 45) + 'ms';
          w.style.strokeDashoffset = '0';
        });
      }));

      /* footer counter in lockstep, then the real line */
      const t0 = performance.now();
      function count(now) {
        const t = clamp((now - t0 - 1200) / 1400, 0, 1);
        const n = Math.round(t * D.CASCADE_CLAIMS);
        footer.textContent = 'claims proven · ' + n;
        if (t < 1 && cascading) requestAnimationFrame(count);
      }
      footer.textContent = 'claims proven · 0';
      requestAnimationFrame(count);

      /* settle: clean every inline hook, restore the real footer — then
         nothing moves again until the human does */
      timers.push(setTimeout(() => {
        cascading = false;
        for (const w of wires) {
          w.style.transition = '';
          w.style.strokeDasharray = '';
          w.style.strokeDashoffset = '';
          w.style.visibility = '';
        }
        for (const nd of ordered) nd.style.opacity = '';
        footerText();
        applyTransform(true);
      }, D.CASCADE_END));
    }

    function mounted() {
      rootW = root.clientWidth;
      rootH = root.clientHeight;
      if (!V.fitted) fitAll(true);
      applyTransform(true);

      /* measure once (one offscreen read): the mono advance for the signature
         match-move, and the title's flow offset for its title→header scrub.
         both feed pure-CSS scrubs; robust if the font stack resolves oddly. */
      if (!MONO_ADV_PX) {
        const probe = el('span');
        probe.style.cssText = 'position:absolute;visibility:hidden;' +
          'white-space:pre;font-family:var(--mono);font-size:100px;';
        probe.textContent = 'M'.repeat(100);
        root.append(probe);
        const w = probe.getBoundingClientRect().width;
        probe.remove();
        MONO_ADV_PX = (w > 0 ? w / 100 / 100 : 0.6) * 2.4;   /* world px @ 2.4px */
      }
      world.style.setProperty('--mono-adv', MONO_ADV_PX + 'px');
      const t0el = world.querySelector('.ntitle');
      world.style.setProperty('--title-dy',
        (4.5 - (t0el ? t0el.offsetTop : 20)) + 'px');

      const ordered = [...nodeEls.entries()]
        .sort((a, b) => nodeById(a[0]).x - nodeById(b[0]).x ||
                        nodeById(a[0]).y - nodeById(b[0]).y)
        .map((p) => p[1]);

      if (willCascade) {
        S.cascadeDone = true;
        runCascade(ordered);
      } else {
        /* re-entry is instant: seams on, edges on, zero motion */
        S.cascadeDone = true;
        svg.style.opacity = '1';
      }

      /* a freshly built node lands with one soft glow */
      if (S.pendingReveal && nodeEls.has(S.pendingReveal)) {
        const nd = nodeEls.get(S.pendingReveal);
        S.pendingReveal = null;
        const t = setTimeout(() => glowOnce(nd, 'glow-new'), 900);
        timers.push(t);
      }

      /* restore selection if we left with one */
      if (V.selected && nodeEls.has(V.selected)) {
        const keep = V.selected;
        V.selected = null;
        selectNode(keep);
      } else {
        V.selected = null;
      }
    }

    /* panel opens by sliding — it has been sitting closed (translateX 100%)
       since page render, so adding the class transitions it in */
    const origOpenPanel = openPanel;
    openPanel = function (n) {
      origOpenPanel(n);
      panel.classList.add('open');
    };

    function cleanup() {
      cancelAnimationFrame(raf);
      cancelAnimationFrame(glideRaf);
      cascading = false;
      window.removeEventListener('keydown', onKey);
      window.removeEventListener('pointerdown', onDocPointerDown, true);
      window.removeEventListener('pointermove', onDocPointerMove, true);
      for (const t of timers) clearTimeout(t);
      for (const u of unsubs) u();
      if (panelEsc) { panelEsc(); panelEsc = null; }
      if (panelLocal.srcClose) { panelLocal.srcClose(); panelLocal.srcClose = null; }
    }

    return { el: root, mounted, cleanup };
  },
};

/* ============================================================================
   §J · draft canvas module — the embedded live prototype
   ----------------------------------------------------------------------------
   a factory returning isolated instances (own copied block state — instances
   never share). blocks genuinely drag and resize with pointer capture,
   corner handles, min/max clamps and a live size readout. the product's
   argument lives here: you decide by touching, not by reading.
   ========================================================================== */

const DC_MIN_W = 60,  DC_MIN_H = 40;
const DC_MAX_W = 340, DC_MAX_H = 240;
const DC_BOX_W = 700, DC_BOX_H = 380;
const DC_SOFT = 18;    /* px of damped resistance before a size clamp */

/* asymptotic approach inside the last DC_SOFT px of a bound — the final
   sub-pixel snaps so the bound itself is genuinely reachable */
function softClamp(v, lo, hi) {
  if (v > hi - DC_SOFT) {
    const excess = Math.min(v, hi + 80) - (hi - DC_SOFT);
    const out = hi - DC_SOFT + DC_SOFT * (1 - Math.exp(-excess / DC_SOFT));
    return hi - out < 1 ? hi : out;
  }
  if (v < lo + DC_SOFT) {
    const excess = (lo + DC_SOFT) - Math.max(v, lo - 80);
    const out = lo + DC_SOFT - DC_SOFT * (1 - Math.exp(-excess / DC_SOFT));
    return out - lo < 1 ? lo : out;
  }
  return v;
}

/* tidy arrangement targets for the generic draft's live toggle */
const DC_TIDY = [
  { x: 40,  y: 135, w: 180, h: 110 },
  { x: 260, y: 135, w: 180, h: 110 },
  { x: 480, y: 135, w: 180, h: 110 },
];

function createDraftCanvas(opts) {
  /* opts: { blocks, state:{persist,aspect,arrange}, persistTo? } */
  const box = el('div', 'dc-box');
  const st = opts.state;
  const blocks = opts.blocks.map((b) => ({ ...b }));   /* isolated copy */
  let zTop = 3;
  let loose = null;    /* stored free layout while 'tidy' is on */

  const readout = el('div', 'dc-readout');

  const blockEls = new Map();

  function apply(b) {
    const be = blockEls.get(b.id);
    be.style.left = b.x + 'px';
    be.style.top = b.y + 'px';
    be.style.width = b.w + 'px';
    be.style.height = b.h + 'px';
    be.style.zIndex = String(b.z || 1);
  }

  function syncBack() {
    if (!opts.persistTo) return;
    for (let i = 0; i < blocks.length; i++) {
      Object.assign(opts.persistTo[i], blocks[i]);
    }
  }

  function boxW() { return box.clientWidth || DC_BOX_W; }
  function boxH() { return box.clientHeight || DC_BOX_H; }

  function setFollow(exceptId, on) {
    for (const [id, be] of blockEls) {
      if (id !== exceptId) be.classList.toggle('follow', on);
    }
  }

  /* live size readout, placed just off the active corner. it warms toward
     amber as the size nears a bound — the clamp announces itself. */
  function showReadout(b, corner) {
    readout.textContent = Math.round(b.w) + ' × ' + Math.round(b.h);
    const near =
      b.w <= DC_MIN_W + 6 || b.w >= DC_MAX_W - 6 ||
      b.h <= DC_MIN_H + 6 || b.h >= DC_MAX_H - 6;
    readout.classList.toggle('near-bound', near);
    let x, y;
    if (corner === 'se') { x = b.x + b.w + 10; y = b.y + b.h - 16; }
    else if (corner === 'ne') { x = b.x + b.w + 10; y = b.y - 2; }
    else if (corner === 'sw') { x = b.x - 74; y = b.y + b.h - 16; }
    else { x = b.x - 74; y = b.y - 2; }
    readout.style.left = clamp(x, 2, boxW() - 76) + 'px';
    readout.style.top = clamp(y, 2, boxH() - 22) + 'px';
    readout.classList.add('show');
  }
  function hideReadout() { readout.classList.remove('show'); }

  /* ------------------------------------------------------------------ *
   *  per-block wiring: drag on the body, resize on the corners          *
   * ------------------------------------------------------------------ */

  function wireBlock(b) {
    const be = el('div', 'dc-block');
    be.append(el('span', 'dc-label', b.label));
    for (const c of ['nw', 'ne', 'sw', 'se']) {
      const h = el('div', 'dc-handle ' + c);
      h.dataset.corner = c;
      be.append(h);
    }
    blockEls.set(b.id, be);
    box.append(be);
    apply(b);

    let gesture = null;   /* {kind:'drag'|'resize', ...} */

    function endGesture(e) {
      if (!gesture) return;
      gesture = null;
      be.classList.remove('active');
      document.body.style.userSelect = '';
      hideReadout();
      /* per-layout followers finish their 600ms ease, then drop the class */
      setTimeout(() => setFollow(null, false), D.LAYOUT_EASE + 40);
      syncBack();
      if (e && e.target && e.target.releasePointerCapture) {
        try { e.target.releasePointerCapture(e.pointerId); } catch (_) { /* released */ }
      }
    }

    be.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return;
      e.preventDefault();
      const corner = e.target.dataset && e.target.dataset.corner;
      b.z = ++zTop;
      be.classList.remove('follow');   /* the active block never lags itself */
      be.classList.add('active');
      document.body.style.userSelect = 'none';
      try { e.target.setPointerCapture(e.pointerId); } catch (_) { /* no live pointer */ }
      if (corner) {
        gesture = {
          kind: 'resize', corner,
          mx: e.clientX, my: e.clientY,
          ox: b.x, oy: b.y, ow: b.w, oh: b.h,
          ratio: b.w / b.h,
        };
        if (st.persist === 'perLayout') setFollow(b.id, true);
        showReadout(b, corner);
      } else {
        gesture = {
          kind: 'drag',
          mx: e.clientX, my: e.clientY,
          ox: b.x, oy: b.y,
        };
      }
      apply(b);
    });

    be.addEventListener('pointermove', (e) => {
      if (!gesture) return;
      const dx = e.clientX - gesture.mx;
      const dy = e.clientY - gesture.my;

      if (gesture.kind === 'drag') {
        b.x = clamp(gesture.ox + dx, 0, boxW() - b.w);
        b.y = clamp(gesture.oy + dy, 0, boxH() - b.h);
        apply(b);
        return;
      }

      /* resize: grow toward the grabbed corner, opposite corner anchored */
      const c = gesture.corner;
      let w = gesture.ow + ((c === 'se' || c === 'ne') ? dx : -dx);
      let h = gesture.oh + ((c === 'se' || c === 'sw') ? dy : -dy);
      if (st.aspect !== 'locked') {
        /* damped approach on the last few px before the clamps — resistance
           you feel. locked aspect keeps the plain clamp (the ratio math
           already owns those px). */
        w = softClamp(w, DC_MIN_W, DC_MAX_W);
        h = softClamp(h, DC_MIN_H, DC_MAX_H);
      }
      w = clamp(w, DC_MIN_W, DC_MAX_W);
      h = clamp(h, DC_MIN_H, DC_MAX_H);
      if (st.aspect === 'locked') {
        /* the dominant axis drives; the other follows the grabbed ratio */
        if (Math.abs(dx) >= Math.abs(dy)) {
          h = clamp(w / gesture.ratio, DC_MIN_H, DC_MAX_H);
          w = clamp(h * gesture.ratio, DC_MIN_W, DC_MAX_W);
        } else {
          w = clamp(h * gesture.ratio, DC_MIN_W, DC_MAX_W);
          h = clamp(w / gesture.ratio, DC_MIN_H, DC_MAX_H);
        }
      }
      let x = gesture.ox, y = gesture.oy;
      if (c === 'nw' || c === 'sw') x = gesture.ox + (gesture.ow - w);
      if (c === 'nw' || c === 'ne') y = gesture.oy + (gesture.oh - h);
      b.x = clamp(x, 0, boxW() - w);
      b.y = clamp(y, 0, boxH() - h);
      b.w = w; b.h = h;
      apply(b);
      showReadout(b, c);

      /* per layout: every other block eases to this size, live */
      if (st.persist === 'perLayout') {
        for (const ob of blocks) {
          if (ob.id === b.id) continue;
          ob.w = w; ob.h = h;
          ob.x = clamp(ob.x, 0, boxW() - ob.w);
          ob.y = clamp(ob.y, 0, boxH() - ob.h);
          apply(ob);
        }
      }
    });

    be.addEventListener('pointerup', endGesture);
    be.addEventListener('pointercancel', endGesture);  /* identical: no stuck drags */
  }

  for (const b of blocks) wireBlock(b);
  box.append(readout);

  /* ------------------------------------------------------------------ *
   *  live toggles reach in through these — flips VISIBLY change the draft
   * ------------------------------------------------------------------ */

  function setPersist(mode) {
    st.persist = mode;
    if (mode === 'perLayout') {
      /* the visible change on flip: every block eases to the top block's size */
      const lead = blocks.reduce((a, b) => ((b.z || 1) > (a.z || 1) ? b : a), blocks[0]);
      setFollow(lead.id, true);
      for (const ob of blocks) {
        if (ob.id === lead.id) continue;
        ob.w = lead.w; ob.h = lead.h;
        ob.x = clamp(ob.x, 0, boxW() - ob.w);
        ob.y = clamp(ob.y, 0, boxH() - ob.h);
        apply(ob);
      }
      setTimeout(() => setFollow(null, false), D.LAYOUT_EASE + 40);
      syncBack();
    }
  }

  function setAspect(mode) { st.aspect = mode; }

  /* ------------------------------------------------------------------ *
   *  decide-by-hovering: preview a toggle's consequence at low intensity
   *  — the same follow/ease path the real flip uses, ~20% of the way at
   *  reduced opacity. mouse-out reverts from state; click commits fully.
   * ------------------------------------------------------------------ */

  function endPreview() {
    setTimeout(() => setFollow(null, false), D.LAYOUT_EASE + 40);
  }

  function previewUnify(on) {
    const lead = blocks.reduce((a, b) => ((b.z || 1) > (a.z || 1) ? b : a), blocks[0]);
    for (const ob of blocks) {
      if (ob.id === lead.id) continue;
      const be = blockEls.get(ob.id);
      be.classList.add('follow');
      be.classList.toggle('ghosting', on);
      if (on) {
        be.style.width = (ob.w + (lead.w - ob.w) * 0.2) + 'px';
        be.style.height = (ob.h + (lead.h - ob.h) * 0.2) + 'px';
      } else apply(ob);           /* state never changed — revert is exact */
    }
    if (!on) endPreview();
  }

  function previewAspect(on) {
    /* a faint constraint outline on the blocks — nothing moves */
    for (const [, be] of blockEls) be.classList.toggle('aspect-hint', on);
  }

  function previewTidy(on) {
    blocks.forEach((ob, i) => {
      const t = DC_TIDY[i % DC_TIDY.length];
      const be = blockEls.get(ob.id);
      be.classList.add('follow');
      be.classList.toggle('ghosting', on);
      if (on) {
        be.style.left = (ob.x + (t.x - ob.x) * 0.2) + 'px';
        be.style.top = (ob.y + (t.y - ob.y) * 0.2) + 'px';
      } else apply(ob);
    });
    if (!on) endPreview();
  }

  function setArrange(mode) {
    st.arrange = mode;
    if (mode === 'tidy') {
      loose = blocks.map((b) => ({ x: b.x, y: b.y, w: b.w, h: b.h }));
      setFollow(null, true);
      blocks.forEach((b, i) => {
        const t = DC_TIDY[i % DC_TIDY.length];
        b.x = t.x; b.y = t.y; b.w = t.w; b.h = t.h;
        apply(b);
      });
    } else if (loose) {
      setFollow(null, true);
      blocks.forEach((b, i) => {
        const t = loose[i];
        if (t) { b.x = t.x; b.y = t.y; b.w = t.w; b.h = t.h; }
        apply(b);
      });
      loose = null;
    }
    setTimeout(() => setFollow(null, false), D.LAYOUT_EASE + 40);
    syncBack();
  }

  return { el: box, setPersist, setAspect, setArrange,
           previewUnify, previewAspect, previewTidy };
}

/* ============================================================================
   §K · prototypes page — see-and-touch draft building
   ========================================================================== */

/* copy the AI actually says — one question, never fifty */
const PT_QUESTION = 'Any specifics in mind, or should I put together a draft to refine?';
const PT_ACK_SPECIFICS = 'Noted — I will fold that into the draft.';
const PT_ACK_ADJUST = 'Adjusted — the draft reflects it. Keep playing, or confirm when it looks right.';
const PT_OFFER = 'Saved. Create a build from this prototype?';
const PT_SUGGESTION = 'resizable blocks on the canvas';

const PT_DEFAULT_BLOCKS = [
  { id: 'a', label: 'block a', x: 64,  y: 52,  w: 200, h: 120, z: 1 },
  { id: 'b', label: 'block b', x: 330, y: 96,  w: 160, h: 96,  z: 1 },
  { id: 'c', label: 'block c', x: 168, y: 224, w: 220, h: 104, z: 1 },
];

/* fixed assumption rows per variant; live toggles are added by the renderer */
const PT_ASSUMPTIONS_RESIZE = [
  'handles appear on hover, all four corners',
  'min 60×40 · max 340×240',
  'resize does not fire while dragging',
  'touch uses the same pointer path',
  'cursor changes over handles',
];
const PT_ASSUMPTIONS_GENERIC = [
  'three blocks stand in for the real content',
  'drag and resize use the same pointer path',
  'sizes are placeholders until content lands',
  'visual style follows the app theme',
  'nothing persists until you confirm',
];

function protoDecisions(p) {
  if (p.variant === 'resize') {
    return (p.draft.persist === 'perBlock' ? 'per block' : 'per layout') +
           ' · ' +
           (p.draft.aspect === 'free' ? 'free aspect' : 'locked aspect');
  }
  if (p.draft.decisions && p.draft.decisions !== 'as drafted') return p.draft.decisions;
  return p.draft.arrange === 'tidy' ? 'tidy arrangement' : 'as drafted';
}

function protoChip(p) {
  if (p.status === 'draft') return el('span', 'chip chip-faint', 'draft');
  const b = p.buildId ? buildById(p.buildId) : null;
  if (b && b.status === 'done') return el('span', 'chip chip-green', 'confirmed');
  /* outline + dot — accent is the human hue, never a machine state */
  const c = el('span', 'chip');
  c.append(el('span', 'chip-dot amber'), el('span', '', 'in build →'));
  return c;
}

/* --------------------------------------------------------------------------
   thread state machine — timers mutate STATE only and emit; open views
   re-render from state. navigating away mid-think loses nothing.
   -------------------------------------------------------------------------- */

const ProtoFlow = (() => {
  function emit(p) { Bus.emit('proto:' + p.id); }

  function start(text) {
    S.draftCount++;
    const variant = /resi[sz]/i.test(text) ? 'resize' : 'generic';
    const p = {
      id: 'p-new-' + S.draftCount,
      title: text,
      status: 'draft',
      buildId: null,
      date: 'jul 6',
      variant,
      draft: {
        confirmed: false,
        persist: 'perBlock', aspect: 'free', arrange: 'loose',
        decisions: null,
        blocks: PT_DEFAULT_BLOCKS.map((b) => ({ ...b })),
      },
      steps: [{ type: 'user', text }],
      pending: 'question',
    };
    DATA.prototypes.unshift(p);
    setTimeout(() => {
      p.steps.push({ type: 'question', resolved: false });
      p.pending = null;
      emit(p);
    }, D.THINK_QUESTION);
    return p;
  }

  function scheduleDraft(p) {
    p.pending = 'draft';
    emit(p);
    setTimeout(() => {
      p.steps.push({ type: 'draft-card', sealed: false });
      p.pending = null;
      emit(p);
    }, D.THINK_DRAFT);
  }

  function questionStep(p) {
    for (const s of p.steps) if (s.type === 'question' && !s.resolved) return s;
    return null;
  }

  function answerDraft(p) {
    const q = questionStep(p);
    if (!q) return;
    q.resolved = true;
    p.steps.push({ type: 'user', text: 'put together a draft' });
    scheduleDraft(p);
  }

  function answerSpecifics(p, text) {
    const q = questionStep(p);
    if (!q) return;
    q.resolved = true;
    p.steps.push({ type: 'user', text });
    p.steps.push({ type: 'ai-text', text: PT_ACK_SPECIFICS });
    scheduleDraft(p);
  }

  function adjust(p, text) {
    p.steps.push({ type: 'user', text });
    p.pending = 'ack';
    emit(p);
    setTimeout(() => {
      p.steps.push({ type: 'ai-text', text: PT_ACK_ADJUST });
      p.pending = null;
      emit(p);
    }, D.THINK_ACK);
  }

  function confirm(p) {
    for (const s of p.steps) if (s.type === 'draft-card') s.sealed = true;
    p.status = 'confirmed';
    p.draft.confirmed = true;
    p.draft.decisions = protoDecisions(p);
    p.steps.push({ type: 'offer-build', resolved: false });
    emit(p);
  }

  function createBuild(p) {
    for (const s of p.steps) if (s.type === 'offer-build') s.resolved = true;
    const b = BuildsAPI.createFeatureBuild(p);
    p.buildId = b.id;
    p.status = 'in-build';
    p.steps.push({ type: 'seal', text: '→ build created · ' + p.title, buildId: b.id });
    emit(p);
    return b;
  }

  return { start, answerDraft, answerSpecifics, adjust, confirm, createBuild };
})();

/* the handoff moment: a ghost of the sealed row physically becomes work */
function flyToBuilds(fromEl, text) {
  const railItem = Rail.getItem('builds');
  if (!fromEl || !railItem) return;
  const r = fromEl.getBoundingClientRect();
  const t = railItem.getBoundingClientRect();
  const g = el('div', 'fly-ghost', text);
  g.style.left = r.left + 'px';
  g.style.top = r.top + 'px';
  g.style.width = Math.min(r.width, 420) + 'px';
  document.body.append(g);
  const dx = (t.left + t.width / 2) - (r.left + Math.min(r.width, 420) / 2);
  const dy = (t.top + t.height / 2) - (r.top + r.height / 2);
  g.animate(
    [
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: 'translate(' + dx + 'px,' + dy + 'px) scale(.1)', opacity: 0 },
    ],
    { duration: D.SEAL, easing: EASE, fill: 'forwards' }
  );
  setTimeout(() => g.remove(), D.SEAL + 80);
}

/* --------------------------------------------------------------------------
   page renderer
   -------------------------------------------------------------------------- */

const ProtoPage = {
  render(arg) {
    if (arg) {
      const p = protoById(arg);
      if (p) return renderThreadView(p);
    }
    return renderRestView();
  },
};

/* --- at rest: one input, saved prototypes, nothing else -------------------- */

function renderRestView() {
  const root = el('div', 'page scroll-page');
  const col = el('div', 'pt-col list-center');
  root.append(col);

  /* persistent page header — same eyebrow + display-title grammar as Builds
     (delta 1; the only change allowed on this tab) */
  const head = el('div', 'bl-head');
  head.append(el('span', 'eyebrow', 'NOVAKAI · PROTOTYPES'),
    el('h1', 'page-title', 'Prototypes'));

  const form = el('form');
  const input = el('input', 'pt-outcome-input');
  input.placeholder = 'describe an outcome…';
  input.setAttribute('aria-label', 'describe an outcome');
  form.append(input);

  const suggestion = btn('pt-try', 'try: ' + PT_SUGGESTION, () => {
    input.value = PT_SUGGESTION;
    input.focus();
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    input.disabled = true;                 /* no double-fire */
    const p = ProtoFlow.start(text);
    Router.go('#prototypes/' + p.id);
  });

  const saved = el('div', 'pt-saved');
  saved.append(el('span', 'sec-title', 'saved prototypes'));
  if (!DATA.prototypes.length) {
    const em = el('div', 'empty', 'nothing saved yet');
    em.append(el('span', 'empty-cmd', 'describe an outcome above to start one'));
    saved.append(em);
  }
  for (const p of DATA.prototypes) {
    const row = btn('pt-row');
    row.append(
      el('span', 'pt-title', p.title),
      protoChip(p),
      el('span', 'pt-date', p.date)
    );
    row.addEventListener('click', () => Router.go('#prototypes/' + p.id));
    saved.append(row);
  }

  /* the bottom anchor — §D empty-state grammar, so the composition is
     intentional rather than a void */
  const anchor = el('div', 'list-anchor',
    'a saved draft is working behavior, not a mockup');
  anchor.append(el('span', 'empty-cmd', 'novakai prototype --list'));

  col.append(head, form, suggestion, saved, anchor);

  function mounted() {
    staggerIn([head, form, suggestion, saved], { dy: 10, dur: D.ENTER, step: D.STAGGER });
  }
  return { el: root, mounted, cleanup() {} };
}

/* --- thread view ------------------------------------------------------------ */

function renderThreadView(p) {
  const root = el('div', 'page scroll-page');
  const col = el('div', 'pt-col');
  root.append(col);

  const back = btn('link-quiet pt-back', '← all prototypes', () => Router.go('#prototypes'));
  const thread = el('div', 'thread');
  col.append(back, thread);

  const unsubs = [];
  const escRels = [];
  let rendered = 0;          /* steps drawn so far */
  let dotsRow = null;
  let lastSealedRow = null;  /* origin element for the fly-to-builds ghost */

  /* ---------------- step renderers ---------------- */

  function userTurn(text) { return el('div', 'turn-user', text); }

  function aiTurn(text) {
    const t = el('div', 'turn-ai');
    t.append(el('span', '', text));
    return t;
  }

  /* the AI's one question arrives word-by-word — a sentence being weighed,
     not typed. ~55ms/word opacity stagger, no caret. */
  function weighedSentence(text) {
    const holder = el('span');
    const words = text.split(' ');
    words.forEach((w, i) => {
      const s = el('span', '', w + (i < words.length - 1 ? ' ' : ''));
      s.style.display = 'inline';
      s.animate(
        [{ opacity: 0 }, { opacity: 1 }],
        { delay: i * 55, duration: 240, easing: EASE, fill: 'backwards' }
      );
      holder.append(s);
    });
    return holder;
  }

  function questionTurn(step) {
    if (step.resolved) return aiTurn(PT_QUESTION);
    const t = el('div', 'turn-ai');
    t.append(weighedSentence(PT_QUESTION));
    const actions = el('div', 'ai-actions');
    const addBtn = btn('btn btn-quiet', 'add specifics');
    const draftBtn = btn('btn', 'put together a draft');
    actions.append(addBtn, draftBtn);
    t.append(actions);

    const askInput = el('input');
    askInput.placeholder = 'what should the draft assume?';
    const ask = makeX(el('div', 'inline-ask'), false);
    ask.querySelector('.inline-ask').append(askInput);
    t.append(ask);

    addBtn.addEventListener('click', () => {
      xSet(ask, true);
      askInput.focus();
    });
    askInput.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const v = askInput.value.trim();
      if (!v) return;
      actions.remove();
      xSet(ask, false);
      ProtoFlow.answerSpecifics(p, v);
    });
    draftBtn.addEventListener('click', () => {
      draftBtn.disabled = true;
      addBtn.disabled = true;
      actions.remove();
      xSet(ask, false);
      ProtoFlow.answerDraft(p);
    });
    return t;
  }

  function sealedDraftRow() {
    const row = el('div', 'draft-sealed');
    row.append(
      el('span', 'ds-ok', '✓'),
      el('span', '', 'DRAFT 1 · confirmed · ' + (p.draft.decisions || protoDecisions(p)))
    );
    lastSealedRow = row;
    return row;
  }

  /* the draft card — the wow path. staggered internals, live canvas,
     assumptions with genuinely live toggles. */
  function draftCard(step) {
    const container = el('div');
    if (step.sealed) {
      container.append(sealedDraftRow());
      return container;
    }

    const card = el('div', 'draft-card');
    container.append(card);

    const head = el('div', 'draft-head');
    head.append(
      el('span', 'sec-title', 'draft 1'),
      el('span', 'chip chip-accent', 'working prototype'),
      el('span', 'draft-date', p.date)
    );

    const dc = createDraftCanvas({
      blocks: p.draft.blocks,
      state: p.draft,
      persistTo: p.draft.blocks,
    });

    /* assumptions disclosure — see-and-touch instead of prose questions */
    const fixed = p.variant === 'resize' ? PT_ASSUMPTIONS_RESIZE : PT_ASSUMPTIONS_GENERIC;
    const liveCount = p.variant === 'resize' ? 2 : 1;
    const assump = el('div', 'assump');
    const rowsBox = el('div');
    rowsBox.style.paddingBottom = '8px';
    for (const a of fixed) {
      const r = el('div', 'assump-row');
      r.append(el('span', 'ar-dot'), el('span', 'ar-label', a));
      rowsBox.append(r);
    }

    function liveToggle(label, sideA, sideB, startB, onFlip, onPreview) {
      const r = el('div', 'assump-row live');
      r.append(el('span', 'ar-dot'), el('span', 'ar-label', label));
      const t = btn('tgl' + (startB ? ' flip' : ''));
      const a = el('span', 'tgl-side' + (startB ? '' : ' on'), sideA);
      const sw = el('span', 'tgl-switch');
      sw.append(el('span', 'tgl-knob'));
      const b2 = el('span', 'tgl-side' + (startB ? ' on' : ''), sideB);
      t.append(a, sw, b2);
      t.addEventListener('click', () => {
        if (onPreview) { onPreview(false, false); onPreview(true, false); }
        const flipped = t.classList.toggle('flip');
        a.classList.toggle('on', !flipped);
        b2.classList.toggle('on', flipped);
        onFlip(flipped);
      });
      /* decide by hovering: the INACTIVE side previews its consequence on
         the draft at low intensity; mouse-out reverts; click commits */
      if (onPreview) {
        const hoverSide = (span, isB) => {
          span.addEventListener('mouseenter', () => {
            if (!span.classList.contains('on')) onPreview(isB, true);
          });
          span.addEventListener('mouseleave', () => onPreview(isB, false));
        };
        hoverSide(a, false);
        hoverSide(b2, true);
      }
      r.append(t);
      rowsBox.append(r);
    }

    if (p.variant === 'resize') {
      liveToggle('size persists', 'per block', 'per layout',
        p.draft.persist === 'perLayout',
        (flip) => { p.draft.persist = flip ? 'perLayout' : 'perBlock'; dc.setPersist(p.draft.persist); },
        (isB, on) => { if (isB) dc.previewUnify(on); });
      liveToggle('aspect ratio', 'free', 'locked',
        p.draft.aspect === 'locked',
        (flip) => { p.draft.aspect = flip ? 'locked' : 'free'; dc.setAspect(p.draft.aspect); },
        (isB, on) => { if (isB) dc.previewAspect(on); });
    } else {
      liveToggle('arrangement', 'loose', 'tidy',
        p.draft.arrange === 'tidy',
        (flip) => { dc.setArrange(flip ? 'tidy' : 'loose'); },
        (isB, on) => { if (isB) dc.previewTidy(on); });
    }

    const rowsWrap = makeX(rowsBox, false);
    const aToggle = btn('assump-toggle');
    aToggle.append(
      el('span', 'caret', '▸'),
      el('span', '', 'assumptions (' + (fixed.length + liveCount) + ')')
    );
    let aRel = null;
    function closeAssump() {
      if (aRel) { aRel(); aRel = null; }
      xSet(rowsWrap, false);
      aToggle.classList.remove('open');
    }
    aToggle.addEventListener('click', () => {
      if (xIsOpen(rowsWrap)) { closeAssump(); return; }
      xSet(rowsWrap, true);
      aToggle.classList.add('open');
      aRel = EscStack.push(closeAssump);
      escRels.push(() => { if (aRel) { aRel(); aRel = null; } });
    });
    assump.append(aToggle, rowsWrap);

    /* adjust input — never a dead button; converges back to confirm */
    const adjInput = el('input');
    adjInput.placeholder = 'what should change?';
    const adjWrap = makeX(el('div', 'inline-ask'), false);
    adjWrap.querySelector('.inline-ask').append(adjInput);
    adjInput.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const v = adjInput.value.trim();
      if (!v) return;
      adjInput.value = '';
      xSet(adjWrap, false);
      ProtoFlow.adjust(p, v);
    });

    const actions = el('div', 'draft-actions');
    const adjBtn = btn('btn btn-quiet', 'adjust', () => {
      xSet(adjWrap, true);
      adjInput.focus();
    });
    const okBtn = btn('btn btn-primary', 'looks right');
    actions.append(adjBtn, okBtn);

    okBtn.addEventListener('click', () => {
      okBtn.disabled = true;                 /* no double-fire */
      adjBtn.disabled = true;
      closeAssump();
      /* NO impact, NO blast radius here — deliberately too early for that.
         the card compacts to a sealed row, then the single offer appears. */
      const sealed = sealedDraftRow();
      const h1 = container.offsetHeight;
      container.style.overflow = 'hidden';
      container.replaceChildren(sealed);
      const h2 = sealed.offsetHeight;
      container.animate(
        [{ height: h1 + 'px' }, { height: h2 + 'px' }],
        { duration: D.SEAL, easing: EASE }
      );
      enterEl(sealed, { dy: 6, dur: D.SEAL });
      setTimeout(() => { container.style.overflow = ''; }, D.SEAL + 40);
      ProtoFlow.confirm(p);
    });

    card.append(head, dc.el, assump, adjWrap, actions);

    /* staggered internals when the card first enters */
    if (!step._entered) {
      step._entered = true;
      staggerIn([head, dc.el, assump, actions], { dy: 10, dur: D.ENTER, step: 80 });
    }
    return container;
  }

  function offerTurn(step) {
    const t = el('div', 'turn-ai');
    t.append(el('span', '', PT_OFFER));
    if (!step.resolved) {
      const actions = el('div', 'ai-actions');
      const create = btn('btn btn-primary', 'create build', () => {
        create.disabled = true;              /* no double-fire */
        const b = ProtoFlow.createBuild(p);
        flyToBuilds(lastSealedRow, '→ ' + p.title);
        Router.go('#builds/' + b.id);
      });
      actions.append(create);
      t.append(actions);
    }
    return t;
  }

  function sealTurn(step) {
    const t = el('div', 'turn-seal');
    t.append(el('span', '', step.text + '  '));
    if (step.buildId) {
      const link = btn('seal-link', 'open build →', () => Router.go('#builds/' + step.buildId));
      t.append(link);
    }
    return t;
  }

  function renderStep(step) {
    switch (step.type) {
      case 'user':       return userTurn(step.text);
      case 'ai-text':    return aiTurn(step.text);
      case 'question':   return questionTurn(step);
      case 'draft-card': return draftCard(step);
      case 'offer-build': return offerTurn(step);
      case 'seal':       return sealTurn(step);
      default:           return el('div');
    }
  }

  /* ---------------- sync: pure render of state, appended steps animated ---- */

  function sync(initial) {
    if (dotsRow) { dotsRow.remove(); dotsRow = null; }
    const news = [];
    while (rendered < p.steps.length) {
      const node = renderStep(p.steps[rendered]);
      thread.append(node);
      news.push(node);
      rendered++;
    }
    if (initial) staggerIn(news, { dy: 10, dur: D.ENTER, step: D.STAGGER });
    else for (const n of news) enterEl(n, {
      dy: 10,
      dur: n.classList && n.classList.contains('turn-user') ? D.ENTER_FAST : D.ENTER_SLOW,
    });
    if (p.pending) {
      dotsRow = el('div', 'turn-ai');
      dotsRow.append(makeDots());
      thread.append(dotsRow);
      enterEl(dotsRow, { dy: 6, dur: D.ENTER_FAST });
    }
    /* offer/seal arrive at the bottom — keep them in view, gently */
    if (!initial && (news.length || p.pending)) {
      root.scrollTo({ top: root.scrollHeight, behavior: 'smooth' });
    }
  }

  sync(true);
  unsubs.push(Bus.on('proto:' + p.id, () => sync(false)));

  function cleanup() {
    for (const u of unsubs) u();
    for (const r of escRels) r();
  }
  return { el: root, mounted() {}, cleanup };
}

/* ============================================================================
   §L · builds page + lifecycle
   ----------------------------------------------------------------------------
   the document spec: every accepted piece of work is a build, and everything
   from decision to done lives on its page. lifecycle scripts mutate STATE
   only; any open view re-renders from state, so navigating away mid-build
   and returning always shows correct progress.
   ========================================================================== */

/* --------------------------------------------------------------------------
   state mutation ops — the one door every scripted change walks through
   -------------------------------------------------------------------------- */

function applyOp(b, op) {
  switch (op.op) {
    case 'activity':
      b.activity.push({ t: op.t, plain: op.plain, tech: op.tech, tone: op.tone });
      Bus.emit('build:' + b.id, { kind: 'activity' });
      break;
    case 'trust':
      b.trust[op.key] = true;
      Bus.emit('build:' + b.id, { kind: 'trust', key: op.key });
      break;
    case 'spec':
      b.spec[op.i].state = op.state;
      Bus.emit('build:' + b.id, { kind: 'spec', i: op.i });
      break;
    case 'sealSpec':
      b.sealed = true;
      for (const c of b.spec) if (c.state === 'pending') c.state = 'failing';
      Bus.emit('build:' + b.id, { kind: 'sealed' });
      break;
    case 'packet': {
      for (const pk of b.packets) if (pk.id === op.id) pk.state = op.state;
      Bus.emit('build:' + b.id, { kind: 'trust', key: 'trusted' });
      break;
    }
    case 'contract':
      b.contract = b.contractData;
      Bus.emit('build:' + b.id, { kind: 'contract' });
      break;
    case 'status':
      b.status = op.v;
      if (op.completed) b.completed = op.completed;
      Bus.emit('build:' + b.id, { kind: 'status' });
      Bus.emit('rail');
      Bus.emit('builds-list');
      break;
    case 'plainState':
      b.plainState = op.v;
      Bus.emit('build:' + b.id, { kind: 'status' });
      Bus.emit('builds-list');
      break;
    case 'review':
      b.review = b.reviewData;
      Bus.emit('build:' + b.id, { kind: 'review' });
      break;
    case 'map':
      S.map = { sha: op.sha, nodes: op.nodes };
      Bus.emit('map');
      break;
    case 'addNode':
      if (!nodeById(DATA.resizeNode.id)) {
        DATA.nodes.push(DATA.resizeNode);
        DATA.edges.push({ from: 'interact/resize', to: 'core/context' });
        DATA.comp.push({ from: 'main', to: 'interact/resize' });
        S.pendingReveal = 'interact/resize';
      }
      break;
    default:
      break;
  }
}

function runSched(b, sched) {
  for (const step of sched) {
    setTimeout(() => { for (const op of step.ops) applyOp(b, op); }, step.at);
  }
}

/* --------------------------------------------------------------------------

const BuildsAPI = (() => {

          { from: 'interact/drag',     to: 'core/context' },
          { from: 'interact/select',   to: 'core/context' },

        nodes: ['interact/resize', 'interact/drag'] },

  /* ------------------------------ creation ------------------------------- */

  function baseBuild(id, title, kind) {

  function createChangeBuild(node, text, nbrs) {

        { op: 'sealSpec' },

        { op: 'activity', t: '+0:15',
