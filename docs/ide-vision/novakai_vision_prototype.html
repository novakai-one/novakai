      { at: 900, ops: [{ op: 'activity', t: '+0:17',
        plain: 'a subagent is building the resize handles',
        tech: 'a41f: interact/resize corner handles · tsc --noEmit' },
        { op: 'plainState', v: 'a subagent is building the resize handles' },
        { op: 'packet', id: 'a41f', state: 'running' }] },
      { at: 2000, ops: [{ op: 'activity', t: '+0:20',
        plain: 'a subagent is wiring resize into the drag path',
        tech: 'b2e2: pointer interlock with interact/drag' },
        { op: 'packet', id: 'b2e2', state: 'running' }] },
      { at: 3100, ops: [{ op: 'activity', t: '+0:23',
        plain: 'a subagent is adding the size readout',
        tech: 'c9d0: live readout near the active handle' },
        { op: 'packet', id: 'c9d0', state: 'running' }] },
      { at: 4300, ops: [{ op: 'activity', t: '+0:26',
        plain: 'checking the work against the spec',
        tech: 'novakai verify-change --packets a41f,b2e2,c9d0 --strict' }] },
      { at: 5200, ops: [
        { op: 'trust', key: 'run' },
        { op: 'activity', t: '+0:28',
          plain: '3 checks are running — they were committed failing on purpose',
          tech: 'run t-resize-limits t-resize-interlock t-resize-readout' }] },
      { at: 6100, ops: [
        { op: 'spec', i: 0, state: 'proven' },
        { op: 'activity', t: '+0:30', tone: 'claim',
          plain: 'one check passed — handles resize within limits',
          tech: 'PASS t-resize-limits' }] },
      { at: 7200, ops: [{ op: 'activity', t: '+0:33', tone: 'fail',
        plain: 'one check failed — rebuilding that piece from its work order',
        tech: 'FAIL t-resize-interlock drag-fired-during-resize · rerun from packet b2e2' },
        { op: 'packet', id: 'b2e2', state: 'retry' },
        { op: 'plainState', v: 'one check failed — a subagent is rebuilding that piece from its work order' }] },
      { at: 8300, ops: [
        { op: 'spec', i: 2, state: 'proven' },
        { op: 'activity', t: '+0:36', tone: 'claim',
          plain: 'the size readout tracks the pointer',
          tech: 'PASS t-resize-readout' }] },
      { at: 9600, ops: [
        { op: 'spec', i: 1, state: 'proven' },
        { op: 'activity', t: '+0:39', tone: 'claim',
          plain: 'the rebuilt piece passed — resize now waits for the drag to finish',
          tech: 'b2e2 rerun → PASS t-resize-interlock' }] },
      { at: 9900, ops: [
        { op: 'trust', key: 'passed' },
        { op: 'activity', t: '+0:40', tone: 'ok',
          plain: 'all checks passed',
          tech: 'verify-change → PASS 3/3 · drift 0' }] },
      { at: 10800, ops: [{ op: 'activity', t: '+0:42',
        plain: 'verifying every piece of work against the contract',
        tech: '--packet a41f → PASS · --packet b2e2 → PASS · --packet c9d0 → PASS' },
        { op: 'packet', id: 'a41f', state: 'verified' },
        { op: 'packet', id: 'b2e2', state: 'verified' },
        { op: 'packet', id: 'c9d0', state: 'verified' }] },
      { at: 11600, ops: [{ op: 'trust', key: 'trusted' }] },
      { at: D.BUILD_TOTAL, ops: [
        { op: 'status', v: 'awaiting-review' },
        { op: 'plainState', v: 'every check passed — one thing needs your eyes' },
        { op: 'review' }] },
    ];
  }

  function buildSchedGenericFeature(b) {
    const pks = b.packets.map((p) => p.id);
    return [
      { at: 0, ops: [
        { op: 'status', v: 'building' },
        { op: 'plainState', v: 'subagents are building from the contract' },
        { op: 'activity', t: '+0:15',
          plain: 'spinning up two subagents from the contract',
          tech: 'packets ' + pks.join(' ') + ' · parallel · worktrees wt/nova-*' }] },
      { at: 1200, ops: [{ op: 'activity', t: '+0:18',
        plain: 'a subagent is building the drafted behavior',
        tech: pks[0] + ': apply patch · tsc --noEmit' },
        { op: 'packet', id: pks[0], state: 'running' }] },
      { at: 2600, ops: [{ op: 'activity', t: '+0:21',
        plain: 'a subagent is guarding the untouched nodes',
        tech: pks[1] + ': drift fence around impacted slice' },
        { op: 'packet', id: pks[1], state: 'running' }] },
      { at: 4000, ops: [{ op: 'activity', t: '+0:24',
        plain: 'checking the work against the spec',
        tech: 'novakai verify-change --packets ' + pks.join(',') + ' --strict' },
        { op: 'trust', key: 'run' }] },
      { at: 5400, ops: [
        { op: 'spec', i: 0, state: 'proven' },
        { op: 'activity', t: '+0:27', tone: 'claim',
          plain: 'the drafted behavior holds',
          tech: 'PASS ' + b.spec[0].testId }] },
      { at: 6600, ops: [
        { op: 'spec', i: 1, state: 'proven' },
        { op: 'trust', key: 'passed' },
        { op: 'activity', t: '+0:30', tone: 'ok',
          plain: 'all checks passed — nothing else moved',
          tech: 'verify-change → PASS 2/2 · drift 0' }] },
      { at: 7800, ops: [{ op: 'activity', t: '+0:32',
        plain: 'verifying every piece of work against the contract',
        tech: pks.map((p) => '--packet ' + p + ' → PASS').join(' · ') },
        { op: 'packet', id: pks[0], state: 'verified' },
        { op: 'packet', id: pks[1], state: 'verified' },
        { op: 'trust', key: 'trusted' }] },
      { at: 9000, ops: [
        { op: 'status', v: 'awaiting-review' },
        { op: 'plainState', v: 'every check passed — one thing needs your eyes' },
        { op: 'review' }] },
    ];
  }

  function buildSchedChange(b) {
    const pk = b.packets[0].id;
    const target = b.targetNode || 'the node';
    return [
      { at: 0, ops: [
        { op: 'status', v: 'building' },
        { op: 'plainState', v: 'a subagent is making the change' },
        { op: 'activity', t: '+0:04',
          plain: 'a subagent is making the change to ' + target,
          tech: pk + ': apply patch · tsc --noEmit' },
        { op: 'packet', id: pk, state: 'running' }] },
      { at: 2200, ops: [{ op: 'activity', t: '+0:08',
        plain: 'checking the work against the spec',
        tech: 'novakai verify-change --packet ' + pk + ' --strict' }] },
      { at: 3000, ops: [{ op: 'trust', key: 'run' }] },
      { at: 3600, ops: [
        { op: 'spec', i: 0, state: 'proven' },
        { op: 'activity', t: '+0:10', tone: 'claim',
          plain: 'the check passed',
          tech: 'PASS ' + b.spec[0].testId }] },
      { at: 4000, ops: [{ op: 'trust', key: 'passed' }] },
      { at: 4600, ops: [{ op: 'activity', t: '+0:12', tone: 'ok',
        plain: 'nothing else moved',
        tech: 'verify-change → PASS 1/1 · drift 0' },
        { op: 'packet', id: pk, state: 'verified' }] },
      { at: 4800, ops: [{ op: 'trust', key: 'trusted' }] },
      { at: D.QUICK_TOTAL, ops: [
        { op: 'status', v: 'done', completed: 'jul 6' },
        { op: 'plainState', v: 'done — every check passed' },
        { op: 'map', sha: b.after.sha, nodes: b.after.nodes }] },
    ];
  }

  function deploy(b) {
    if (b.deployed) return;
    b.deployed = true;
    applyOp(b, { op: 'status', v: 'deploying' });
    applyOp(b, { op: 'plainState', v: 'handing the contract to the subagents' });
    const sched = b.kind === 'change'
      ? buildSchedChange(b)
      : (b.addsNode ? buildSchedResize(b) : buildSchedGenericFeature(b));
    setTimeout(() => runSched(b, sched), D.DEPLOY_HOLD);
  }

  function finishReview(b, sealText, record) {
    b.review.attestation.sealText = sealText;
    b.review.record = record;
    applyOp(b, { op: 'status', v: 'done', completed: 'jul 6' });
    applyOp(b, { op: 'plainState', v: 'done — every check passed and the map is back in sync' });
    if (b.addsNode) applyOp(b, { op: 'addNode' });
    if (b.after) applyOp(b, { op: 'map', sha: b.after.sha, nodes: b.after.nodes });
    Bus.emit('build:' + b.id, { kind: 'review' });
  }

  function attest(b) {
    if (!b.review || !b.review.attestation) return;
    b.review.attestation.state = 'attested';
    finishReview(
      b,
      'attested by you · jul 6 · expires if ' + b.review.attestation.expiresOn + ' changes',
      'reviewed jul 6'
    );
  }

  function defer(b) {
    if (!b.review || !b.review.attestation) return;
    b.review.attestation.state = 'deferred';
    finishReview(
      b,
      'deferred — resurfaces on the next change to ' + b.review.attestation.expiresOn,
      'reviewed jul 6 · attestation deferred'
    );
  }

  return { createFeatureBuild, createChangeBuild, createPatch, approve, deploy, attest, defer };
})();

/* --------------------------------------------------------------------------
   shared small renderers
   -------------------------------------------------------------------------- */

function statusChipEl(b, noDot) {
  /* ONE pill treatment everywhere: outline + 6px status dot + mono label —
     states differ only in hue */
  let hue = '', text = b.status;
  switch (b.status) {
    case 'spec':              hue = '';       text = 'spec'; break;
    case 'awaiting-approval': hue = 'accent'; text = 'awaiting approval'; break;
    case 'deploying':         hue = 'amber';  text = 'deploying'; break;
    case 'building':          hue = 'amber';  text = 'building'; break;
    case 'awaiting-review':   hue = 'amber';  text = 'awaiting review'; break;
    case 'done':              hue = 'green';  text = 'done'; break;
    default: break;
  }
  const c = el('span', 'chip');
  /* inside the build document the margin rail carries the one permitted
     breath — the chip's dot stays still there (at most ONE thing moving) */
  if (b.status === 'building' && !noDot) c.append(el('span', 'chip-breathe-dot'));
  else c.append(el('span', 'chip-dot' + (hue ? ' ' + hue : '')));
  c.append(el('span', '', text));
  return c;
}

/* an evidence-bearing toggle helper: open/close an xwrap, Escape-aware */
function escToggle(wrap, trigger, onState) {
  let rel = null;
  function close() {
    if (rel) { rel(); rel = null; }
    xSet(wrap, false);
    if (onState) onState(false);
  }
  function open() {
    xSet(wrap, true);
    rel = EscStack.push(close);
    if (onState) onState(true);
  }
  trigger.addEventListener('click', () => (xIsOpen(wrap) ? close() : open()));
  return { close };
}

/* --------------------------------------------------------------------------
   builds page — list + document
   -------------------------------------------------------------------------- */

const BuildsPage = {
  render(arg) {
    if (arg) {
      const b = buildById(arg);
      if (b) return renderBuildDoc(b);
    }
    return renderBuildList();
  },
};

/* --- list view -------------------------------------------------------------- */

function renderBuildList() {
  const root = el('div', 'page scroll-page');
  const col = el('div', 'bl-col list-center');
  root.append(col);

  /* the persistent page header — eyebrow + large display title (delta 1/10) +
     a right-aligned state roll-up computed from live state (delta 3) */
  const head = el('div', 'bl-head');
  head.append(el('span', 'eyebrow', 'NOVAKAI · BUILDS'));
  const titleRow = el('div', 'bl-title-row');
  const rollup = el('div', 'bl-rollup');
  titleRow.append(el('h1', 'page-title', 'Builds'), rollup);
  head.append(titleRow);

  const listBox = el('div');
  /* the bottom anchor — §D empty-state grammar */
  const anchor = el('div', 'list-anchor', 'every claim above is a command away');
  anchor.append(el('span', 'empty-cmd', 'novakai verify-change --list <build>'));
  col.append(head, listBox, anchor);

  function paintRollup() {
    rollup.textContent = '';
    rollup.append(document.createTextNode(DATA.builds.length + ' builds · '));
    rollup.append(el('span', 'bl-rollup-you', awaitingCount() + ' needs you'));
  }

  /* the actionable build — a raised card carrying its Review → affordance,
     which triggers the existing row-open behavior (delta 2) */
  function cardFor(b) {
    const card = btn('bl-card');
    const top = el('div', 'bl-card-top');
    top.append(el('span', 'bl-card-title', b.title), statusChipEl(b));
    card.append(top, el('div', 'bl-card-note', b.plainState),
      el('span', 'bl-card-action', 'Review →'));
    card.addEventListener('click', () => Router.go('#builds/' + b.id));
    return card;
  }

  function rowFor(b) {
    const row = btn('bl-row');
    const top = el('div', 'bl-top');
    let dates = 'started ' + b.started;
    if (b.completed) dates += ' · completed ' + b.completed;
    top.append(el('span', 'bl-title', b.title), statusChipEl(b), el('span', 'bl-dates', dates));
    row.append(top, el('div', 'bl-note', b.plainState));
    row.addEventListener('click', () => Router.go('#builds/' + b.id));
    return row;
  }

  /* grouping is pure over live state (engineering law 4.1): a build that
     completes mid-scenario re-renders into the right group on the next paint */
  function paint() {
    listBox.textContent = '';
    paintRollup();
    const cards = DATA.builds.filter(buildNeedsYou);
    const active = DATA.builds.filter((b) => !buildNeedsYou(b) && b.status !== 'done');
    const done = DATA.builds.filter((b) => b.status === 'done');
    for (const b of cards) listBox.append(cardFor(b));
    for (const b of active) listBox.append(rowFor(b));
    if (done.length) {
      const dh = el('div', 'bl-done-head');
      dh.append(el('span', 'bl-done-label', 'DONE'), el('span', 'bl-done-rule'));
      listBox.append(dh);
      for (const b of done) listBox.append(rowFor(b));
    }
  }
  paint();

  const unsub = Bus.on('builds-list', paint);

  function mounted() {
    staggerIn([head, ...listBox.children], { dy: 10, dur: D.ENTER, step: D.STAGGER });
  }
  return { el: root, mounted, cleanup() { unsub(); } };
}

/* --- build document ----------------------------------------------------------
   one scrollable page per build. every section exists from the first paint —
   pending ones are quiet dashed placeholders that expand in place. */

function renderBuildDoc(b) {
  const root = el('div', 'page scroll-page');
  const col = el('div', 'bd-col');
  root.append(col);

  const unsubs = [];
  const escCloses = [];

  const back = btn('link-quiet bd-back', '← all builds', () => Router.go('#builds'));
  col.append(back);

  /* ------------------------------------------------------------------ *
   *  the margin rail — progress without a bar. a gutter label + state   *
   *  dot per section; sections SET top to bottom as the lifecycle       *
   *  reaches them and the teal tide mark rises beside what has set.     *
   * ------------------------------------------------------------------ */

  const railCells = {};
  const railMetas = {};
  function railCell(key, label) {
    const r = el('div', 'bd-rail draft');
    const inner = el('div', 'bd-rail-inner');
    const lw = el('div', 'bd-rail-labelwrap');
    const meta = el('span', 'bd-rail-meta');
    lw.append(el('span', 'bd-rail-label', label), meta);
    inner.append(el('span', 'bd-rail-dot'), lw);
    r.append(inner);
    railCells[key] = r;
    railMetas[key] = meta;
    return r;
  }

  function paintRail() {
    const setStates = {
      trust: b.trust.run,
      tryit: true,
      acceptance: b.spec.length > 0,
      contract: !!b.contract,
      activity: b.activity.length > 0,
      review: !!b.review || (b.kind === 'change' && b.status === 'done'),
    };
    let live = null;
    if (b.status === 'spec') live = 'acceptance';
    else if (b.status === 'awaiting-approval') live = 'contract';
    else if (b.status === 'deploying' || b.status === 'building') live = 'activity';
    else if (b.status === 'awaiting-review') live = 'review';
    const working = b.status === 'deploying' || b.status === 'building';
    for (const key in railCells) {
      const r = railCells[key];
      const isSet = !!setStates[key];
      r.classList.toggle('set', isSet);
      r.classList.toggle('draft', !isSet && key !== live);
      /* the active section's dot is the page's only --accent use; it
         carries the one permitted slow breath while the fleet works */
      r.classList.toggle('live', key === live);
      r.classList.toggle('working', key === live && working);
    }
    /* count metadata beside the rail labels (delta 4) — additive, computed
       from live state; the labels themselves are untouched */
    const total = b.spec.length;
    const proven = b.spec.filter((c) => c.state === 'proven').length;
    const setMeta = (key, txt) => { if (railMetas[key]) railMetas[key].textContent = txt; };
    setMeta('trust', total ? proven + ' / ' + total + ' proven' : '');
    setMeta('acceptance', total ? total + ' check' + (total === 1 ? '' : 's') : '');
    setMeta('contract', b.contract ? b.contract.slice.nodes.length + ' nodes' : '');
    setMeta('activity', b.activity.length ? b.activity.length + ' steps' : '');
  }

  /* ------------------------------------------------------------------ *
   *  1 · header                                                         *
   * ------------------------------------------------------------------ */

  /* no subtitle line: status lives in the pill, and the seal is the first
     place trust is asserted */
  const header = el('section', 'bd-section bd-header');
  header.append(el('span', 'eyebrow', 'NOVAKAI · BUILDS'));
  const topRow = el('div', 'bd-toprow');
  const chipSlot = el('span');
  chipSlot.append(statusChipEl(b, true));
  const datesEl = el('span', 'bd-dates');
  /* the document heading is the job's name verbatim — never prose or a pitch */
  topRow.append(el('span', 'bd-title', b.title), chipSlot, datesEl);
  header.append(topRow);
  col.append(header);

  /* decision-first: the lifecycle action row is raised directly under the
     title area, above the evidence (delta 5) — placement only, same handlers */
  const offerRow = el('div', 'bd-offer');
  col.append(offerRow);

  function paintHeader() {
    chipSlot.textContent = '';
    chipSlot.append(statusChipEl(b, true));
    datesEl.textContent = 'started ' + b.started +
      (b.completed ? ' · completed ' + b.completed : '');
  }
  paintHeader();

  /* ------------------------------------------------------------------ *
   *  2 · TRUST — the seal. three sworn plain sentences with dot leaders  *
   *  and evidence flush right; proof one click deep, on the inset       *
   *  ground beneath the document. line 3 is derived, never asserted.    *
   * ------------------------------------------------------------------ */

  col.append(railCell('trust', 'trust'));
  const trustSec = el('section', 'bd-section trust-seal');
  const tsFrame = svgEl('svg', { class: 'ts-frame' });
  const tsRect = svgEl('rect', { pathLength: 1 });
  tsFrame.append(tsRect);
  const tsStamp = el('div', 'ts-stamp');
  /* the margin-rail label is the only section title */
  trustSec.append(tsFrame, tsStamp);
  col.append(trustSec);

  const TRUST_ROWS = [
    { key: 'run',     label: 'The tests ran.' },
    { key: 'passed',  label: 'The tests passed.' },
    { key: 'trusted', label: 'The work is trusted.' },
  ];
  const trustRowEls = {};
  const trustProofBodies = {};

  /* fixed, deterministic per-test duration for the proof layer */
  function testDur(id) {
    return (parseInt(shaFor(id).slice(0, 3), 16) % 400 + 140) + 'ms';
  }

  /* ⧉ copy — the label crossfades to `copied` in place; no toast */
  function copyBtn(text) {
    const c = btn('tt-copy', '⧉ copy');
    c.addEventListener('click', (e) => {
      e.stopPropagation();
      try {
        if (navigator.clipboard) navigator.clipboard.writeText(text);
      } catch (_) { /* clipboard unavailable — the label still answers */ }
      c.textContent = 'copied';
      c.classList.add('copied');
      setTimeout(() => {
        c.textContent = '⧉ copy';
        c.classList.remove('copied');
      }, 1400);
    });
    return c;
  }

  function verdictFor(c) {
    if (c.state === 'proven') return { cls: 'v-pass', text: 'PASS' };
    if (c.state === 'failing') {
      /* before any run the reds are the honest committed-failing tests;
         once tests are running a red is a real failure */
      return { cls: 'v-fail', text: b.trust.run ? 'FAIL' : 'FAIL (expected — committed failing)' };
    }
    return { cls: 'v-pend', text: '— not yet run' };
  }

  function paintTrustProof(key) {
    const body = trustProofBodies[key];
    if (!body) return;
    body.textContent = '';
    if (key === 'trusted') {
      for (const pk of b.packets) {
        const t = el('div', 'tr-test');
        const top = el('div', 'tt-top');
        top.append(el('span', 'sp-dot ' +
          (pk.state === 'verified' ? 'green' : (pk.state === 'retry' ? 'red' : ''))));
        top.append(el('span', '', 'packet ' + pk.id + ' · ' + pk.state));
        const cmdText = 'novakai verify-change --packet ' + pk.id;
        const cmd = el('div', 'tt-cmd');
        cmd.append(el('span', '', cmdText + ' → '));
        cmd.append(el('span', pk.state === 'verified' ? 'v-pass' : 'v-pend',
          pk.state === 'verified' ? 'PASS' : '—'));
        cmd.append(el('span', 'tt-dur', ''));   /* keeps the copy rail aligned */
        cmd.append(copyBtn(cmdText));
        t.append(top, cmd);
        body.append(t);
      }
      if (!b.packets.length) body.append(el('div', 'bd-pending-line', 'no packets yet'));
      return;
    }
    for (const c of b.spec) {
      const t = el('div', 'tr-test');
      t.dataset.test = c.testId;
      const top = el('div', 'tt-top');
      top.append(el('span', 'sp-dot ' +
        (c.state === 'proven' ? 'green' : (c.state === 'failing' ? 'red' : ''))));
      top.append(el('span', '', c.testId));
      const v = verdictFor(c);
      const cmdText = 'novakai verify-change --test ' + c.testId;
      const cmd = el('div', 'tt-cmd');
      cmd.append(el('span', '', cmdText + ' → '));
      cmd.append(el('span', v.cls, v.text));
      /* the duration column exists on every row so ⧉ copy shares one rail */
      cmd.append(el('span', 'tt-dur', c.state === 'proven' ? testDur(c.testId) : ''));
      cmd.append(copyBtn(cmdText));
      t.append(top, cmd);
      body.append(t);
    }
    if (!b.spec.length) body.append(el('div', 'bd-pending-line', 'no checks yet'));
  }

  for (const tr of TRUST_ROWS) {
    const row = btn('tr-row');
    const glyph = el('span', 'ts-glyph');
    const ev = el('span', 'tr-ev');
    row.append(glyph, el('span', 'tr-label', tr.label), el('span', 'tr-leader'), ev);
    trustRowEls[tr.key] = { row, glyph, ev };
    const body = el('div', 'tr-proof');
    trustProofBodies[tr.key] = body;
    paintTrustProof(tr.key);
    const wrap = makeX(body, false);
    const tg = escToggle(wrap, row);
    escCloses.push(tg.close);
    trustSec.append(row, wrap);
  }

  /* the three sentences: glyph state, evidence counts, the keystone rule */
  function paintTrustRows(flippedKey) {
    const total = b.spec.length;
    const proven = b.spec.filter((c) => c.state === 'proven').length;
    const verified = b.packets.filter((p) => p.state === 'verified').length;
    const working = b.status === 'deploying' || b.status === 'building';
    for (const tr of TRUST_ROWS) {
      const { row, glyph, ev } = trustRowEls[tr.key];
      const on = b.trust[tr.key];
      const isKeystone = tr.key === 'trusted';
      /* the keystone rule: line 3 stays dim until lines 1 and 2 have
         filled — trust is visibly derived, never asserted */
      row.classList.toggle('keystone-locked',
        isKeystone && !(b.trust.run && b.trust.passed));
      glyph.classList.toggle('teal', on && !isKeystone);
      glyph.classList.toggle('green', on && isKeystone);   /* the ONLY green */
      glyph.classList.toggle('pend', !on && working &&
        (!isKeystone || (b.trust.run && b.trust.passed)));
      row.classList.toggle('filled-teal', on && !isKeystone);
      row.classList.toggle('filled-green', on && isKeystone);
      if (tr.key === 'run') {
        ev.textContent = on ? total + ' / ' + total + ' run'
          : (b.sealed ? total + ' committed' : '—');
      } else if (tr.key === 'passed') {
        /* parallel units across the three lines: run · pass · verified */
        ev.textContent = b.sealed ? proven + ' / ' + total + ' pass' : '—';
      } else {
        ev.textContent = b.packets.length
          ? verified + ' / ' + b.packets.length + ' pieces of work verified' : '—';
      }
      if (flippedKey === tr.key && on) glowOnce(glyph);
    }
  }
  paintTrustRows();
  let sealScheduled = false;

  /* the seal-stroke ceremony: when all three land, a solid hairline draws
     itself around the box in one continuous stroke and the stamp fades in.
     happens once, ever. */
  function maybeSeal(animate) {
    if (!(b.trust.run && b.trust.passed && b.trust.trusted)) return;
    tsStamp.textContent = 'sealed ' + (b.completed || 'jul 6') + ' · ' +
      ((b.after && b.after.sha) || shaFor(b.id));   /* the sealing merge's sha */
    if (b._sealDone) { trustSec.classList.add('sealed'); return; }
    b._sealDone = true;
    if (animate && !REDUCED_MOTION) {
      trustSec.classList.add('sealing');
      requestAnimationFrame(() => requestAnimationFrame(() => {
        trustSec.classList.add('sealed');
      }));
      setTimeout(() => trustSec.classList.remove('sealing'), 1400);
    } else {
      trustSec.classList.add('sealed');
    }
  }
  /* sealed long ago → static frame now; a fresh all-green seal waits for
     mounted() so the ceremony is not lost under the entry stagger */
  if (b._sealDone) maybeSeal(false);

  /* ------------------------------------------------------------------ *
   *  3 · PROTOTYPE — the saved draft, embedded, still interactive       *
   * ------------------------------------------------------------------ */

  if (b.protoId) {
    const p = protoById(b.protoId);
    if (p) {
      col.append(railCell('tryit', 'try it'));
      const sec = el('section', 'bd-section');
      const dc = createDraftCanvas({
        blocks: p.draft.blocks,       /* isolated copy inside the factory */
        state: { persist: p.draft.persist, aspect: p.draft.aspect, arrange: p.draft.arrange },
      });
      dc.el.classList.add('bd-plate');   /* the prototype may break the column */
      sec.append(dc.el);
      const sealedRow = el('div', 'draft-sealed');
      sealedRow.style.marginTop = '10px';
      sealedRow.append(
        el('span', 'ds-ok', '✓'),
        el('span', '', 'sealed decisions · ' + (p.draft.decisions || protoDecisions(p)))
      );
      const link = btn('link-quiet', 'open in prototypes →',
        () => Router.go('#prototypes/' + p.id));
      link.style.marginTop = '8px';
      sec.append(sealedRow, link);
      col.append(sec);
    }
  }

  /* ------------------------------------------------------------------ *
   *  4 · SPEC — plain criteria; given/when/then one click deep          *
   * ------------------------------------------------------------------ */

  col.append(railCell('acceptance', 'acceptance'));
  const specSec = el('section', 'bd-section');
  const specBox = el('div');
  specSec.append(specBox);
  const specNote = el('div', 'bd-pending-line');
  specSec.append(specNote);
  col.append(specSec);

  const specDots = [];

  function paintSpec() {
    specBox.textContent = '';
    specDots.length = 0;
    b.spec.forEach((c, i) => {
      const dot = el('span', 'sp-dot ' +
        (c.state === 'proven' ? 'green' : (c.state === 'failing' ? 'red' : '')));
      specDots.push(dot);
      if (!b.sealed) {
        /* pre-approval: criteria are editable inputs */
        const row = el('div', 'sp-row');
        const input = el('input');
        input.value = c.text;
        input.setAttribute('aria-label', 'acceptance criterion ' + (i + 1));
        input.addEventListener('input', () => { c.text = input.value; });
        row.append(dot, input);
        specBox.append(row);
      } else {
        /* post-approval: sealed text, click for given/when/then + test id */
        const row = btn('sp-row');
        row.dataset.test = c.testId;
        row.append(dot, el('span', 'sp-text', c.text));
        const detail = el('div', 'sp-detail');
        const gwt = [['given', c.given], ['when', c.when], ['then', c.then]];
        for (const [k, v] of gwt) {
          const ln = el('div');
          ln.append(el('span', 'gwt-k', k), el('span', '', v));
          detail.append(ln);
        }
        const idLn = el('div');
        idLn.append(el('span', 'gwt-k', 'test'), el('span', 'sp-testid', c.testId));
        detail.append(idLn);
        const wrap = makeX(detail, false);
        const tg = escToggle(wrap, row);
        escCloses.push(tg.close);
        specBox.append(row, wrap);
      }
    });
    specNote.textContent = !b.sealed
      ? 'editable until the contract is authored'
      : (b.spec.every((c) => c.state === 'proven')
          ? b.spec.length + ' of ' + b.spec.length + ' proven'
          : b.spec.length + ' check' + (b.spec.length === 1 ? '' : 's') +
            ' committed · failing (expected)');
  }
  paintSpec();

  /* ------------------------------------------------------------------ *
   *  5 · CONTRACT — impact slice + two-tab mono viewer                  *
   * ------------------------------------------------------------------ */

  col.append(railCell('contract', 'contract'));
  const ctSec = el('section', 'bd-section pending');
  const ctPend = el('div', 'bd-pending-line', 'appears once the patch exists');
  const ctBody = el('div');
  const ctWrap = makeX(ctBody, false);
  /* secondary section: collapsed to an expandable row to cut first-look
     density (delta 4). the xwrap is grid-template-rows 0fr→1fr, house easing;
     keyboard toggles are instant via html.kbd-instant */
  const ctHead = btn('bd-collapse-head');
  ctHead.style.display = 'none';
  const ctHeadMeta = el('span', 'bch-meta');
  ctHead.append(el('span', 'caret', '▸'), el('span', 'bch-label', 'contract'), ctHeadMeta);
  ctSec.append(ctPend, ctHead, ctWrap);
  const ctTg = escToggle(ctWrap, ctHead, (o) => ctHead.classList.toggle('open', o));
  escCloses.push(ctTg.close);
  col.append(ctSec);

  let ctBuilt = false;
  function buildContract(live) {
    if (ctBuilt || !b.contract) return;
    ctBuilt = true;
    ctSec.classList.remove('pending');
    ctPend.remove();
    ctHead.style.display = '';
    ctHeadMeta.textContent = b.contract.slice.nodes.length + ' nodes touched';

    /* the IMPACT slice — a still monochrome figure in a paper, wide plate */
    const sliceBox = el('div', 'ct-slice bd-plate');
    const sliceSvg = renderSlice(b.contract.slice);
    sliceBox.append(sliceSvg, el('div', 'ct-caption',
      'impact slice — ' + b.contract.slice.nodes.length + ' nodes touched'));
    ctBody.append(sliceBox);

    /* its one-time blast wave: a single soft ring from the changed node,
       only when the contract arrives live — then stillness */
    if (live && !REDUCED_MOTION) {
      setTimeout(() => blastWave(sliceSvg, b.contract.slice), 500);
    }

    if (b.contract.alt) {
      const alt = el('div', 'ct-alt', 'alternative rejected — ' + b.contract.alt.plain);
      alt.tabIndex = 0;
      Tip.bind(alt, evidence([
        ['tip-strong', 'rejected shape'],
        ['tip-cmd', b.contract.alt.tech],
      ]));
      ctBody.append(alt);
    }

    const tabs = el('div', 'ct-tabs');
    const view = el('div', 'ct-view clipped');
    const pre = el('pre', 'ct-pre');
    view.append(pre);
    const tabDefs = [
      { name: 'patch.json', lines: b.contract.patch },
      { name: 'map.mmd', lines: b.contract.mmd },
    ];
    const tabEls = [];
    let active = 0;
    function paintTab() {
      pre.textContent = tabDefs[active].lines.join('\n');
      tabEls.forEach((t, i) => t.classList.toggle('on', i === active));
    }
    tabDefs.forEach((td, i) => {
      const t = btn('ct-tab', td.name, () => { active = i; paintTab(); });
      tabEls.push(t);
      tabs.append(t);
    });
    const expand = btn('link-quiet ct-expand', 'expand', () => {
      const clipped = view.classList.toggle('clipped');
      expand.textContent = clipped ? 'expand' : 'collapse';
    });
    paintTab();
    ctBody.append(tabs, view, expand);
    /* default collapsed for first-look calm; a live arrival opens itself so
       the one-time blast-wave ring beat is not hidden */
    if (live) { ctHead.click(); }
    staggerIn([sliceBox, tabs, view], { dy: 10, dur: D.ENTER_SLOW, step: 90 });
  }
  if (b.contract) { buildContract(false); }

  /* ------------------------------------------------------------------ *
   *  6 · ACTIVITY — the clean feed; technical exactly one click away    *
   * ------------------------------------------------------------------ */

  col.append(railCell('activity', 'activity'));
  const acSec = el('section', 'bd-section' + (b.activity.length ? '' : ' pending'));
  const acHead = el('div', 'ac-head');
  /* plain · technical — a small-caps mode toggle; the swap crossfades each
     row in place (paired strings, stacked spans, zero reflow) */
  /* secondary section: collapsed to an expandable row (delta 4) */
  const acToggle = btn('bd-collapse-head');
  const acToggleMeta = el('span', 'bch-meta');
  acToggle.append(el('span', 'caret', '▸'), el('span', 'bch-label', 'activity'), acToggleMeta);
  const techBtn = btn('ac-mode ac-tech');
  const modePlain = el('span', b.tech ? '' : 'on', 'plain');
  const modeTech = el('span', b.tech ? 'on' : '', 'technical');
  techBtn.append(modePlain, el('span', '', '·'), modeTech);
  acHead.append(acToggle, techBtn);
  acSec.append(acHead);
  const acPend = el('div', 'bd-pending-line', 'quiet until work starts');
  const acWrapBox = el('div', 'ac-wrap');
  const feed = el('div', 'ac-feed' + (b.tech ? ' tech' : ''));
  const jump = btn('ac-jump', 'jump to latest');
  acWrapBox.append(feed, jump);
  const acX = makeX(acWrapBox, false);   /* default collapsed for first-look calm */
  const acTg = escToggle(acX, acToggle, (o) => acToggle.classList.toggle('open', o));
  escCloses.push(acTg.close);
  acSec.append(acPend, acX);
  acToggle.style.display = b.activity.length ? '' : 'none';
  if (b.activity.length) acPend.remove();
  col.append(acSec);

  techBtn.style.display = b.activity.length ? '' : 'none';
  techBtn.addEventListener('click', () => {
    b.tech = !b.tech;
    feed.classList.toggle('tech', b.tech);
    modePlain.classList.toggle('on', !b.tech);
    modeTech.classList.toggle('on', b.tech);
  });

  let acRendered = 0;
  function pinned() {
    return feed.scrollTop + feed.clientHeight >= feed.scrollHeight - 28;
  }
  function measureRow(textBox) {
    const hs = [...textBox.children].map((s) => s.offsetHeight);
    const h = Math.max(18, ...hs);
    textBox.style.minHeight = h + 'px';
  }
  function appendActivityRows(animate) {
    const wasPinned = pinned();
    const added = [];
    while (acRendered < b.activity.length) {
      const a = b.activity[acRendered];
      const row = el('div', 'ac-row');
      row.append(el('span', 'ac-time', a.t));
      const txt = el('div', 'ac-text' + (a.tone === 'fail' ? ' ac-fail'
        : (a.tone === 'ok' ? ' ac-ok' : (a.tone === 'claim' ? ' ac-claim' : ''))));
      txt.append(el('span', 'ac-plain', a.plain), el('span', 'ac-techline', a.tech));
      row.append(txt);
      feed.append(row);
      added.push([row, txt]);
      acRendered++;
    }
    for (const [row, txt] of added) {
      measureRow(txt);
      if (animate) enterEl(row, { dy: 6, dur: D.ENTER_FAST });
    }
    if (added.length) {
      if (wasPinned) feed.scrollTop = feed.scrollHeight;
      else jump.classList.add('show');
    }
    acToggleMeta.textContent = b.activity.length ? b.activity.length + ' steps' : '';
  }
  feed.addEventListener('scroll', () => { if (pinned()) jump.classList.remove('show'); });
  jump.addEventListener('click', () => {
    feed.scrollTo({ top: feed.scrollHeight, behavior: 'smooth' });
    jump.classList.remove('show');
  });

  function activateActivity() {
    if (acSec.classList.contains('pending')) {
      acSec.classList.remove('pending');
      acPend.remove();
      techBtn.style.display = '';
      acToggle.style.display = '';
    }
    /* a live feed opens itself so the settling-narration beat is seen */
    if (!xIsOpen(acX)) acToggle.click();
  }

  /* ------------------------------------------------------------------ *
   *  7 · REVIEW — one plain sentence first; proof and ledger beneath    *
   * ------------------------------------------------------------------ */

  col.append(railCell('review', 'review'));
  const rvSec = el('section', 'bd-section' + (b.review ? '' : ' pending'));
  const rvPend = el('div', 'bd-pending-line',
    b.kind === 'change' ? 'nothing should need your eyes here' : 'appears when the work completes');
  const rvBody = el('div');
  const rvX = makeX(rvBody, !!b.review);
  rvSec.append(rvPend, rvX);
  if (b.review) rvPend.remove();
  col.append(rvSec);

  function paintReview() {
    if (!b.review) {
      if (b.kind === 'change' && b.status === 'done') {
        rvPend.textContent = 'nothing needed your eyes — every check passed';
      }
      return;
    }
    rvSec.classList.remove('pending');
    rvPend.remove();
    rvBody.textContent = '';

    rvBody.append(el('div', 'rv-summary', b.review.lead || b.review.summary));

    if (b.review.attestation) {
      const at = b.review.attestation;
      const card = el('div', 'rv-attest');
      card.append(el('div', 'ra-claim', at.claim));
      if (at.state === 'open') {
        const actions = el('div', 'ra-actions');
        const attestBtn = btn('btn btn-primary', 'attest', () => {
          attestBtn.disabled = true;
          deferBtn.disabled = true;
          BuildsAPI.attest(b);
        });
        const deferBtn = btn('btn btn-quiet', 'defer', () => {
          attestBtn.disabled = true;
          deferBtn.disabled = true;
          BuildsAPI.defer(b);
        });
        actions.append(attestBtn, deferBtn);
        card.append(actions);
      } else {
        const sealed = el('div', 'ra-sealed', at.sealText || '');
        sealed.tabIndex = 0;
        Tip.bind(sealed, evidence([
          ['tip-cmd', 'novakai attest --build ' + b.id + ' --claim "' + at.claim.split(' — ')[0] + '"'],
          ['tip-ok', '→ recorded .novakai/attest/' + b.id + '.json'],
          ['', 'expires if ' + at.expiresOn + ' changes'],
        ]));
        card.append(sealed);
      }
      rvBody.append(card);
    }

    if (b.ledger) {
      const led = el('div', 'ledger');
      for (const cell of b.ledger) {
        const c = el('div', 'led-cell');
        c.append(el('div', 'led-num', cell.num), el('div', 'led-cap', cell.cap));
        c.tabIndex = 0;
        Tip.bind(c, evidence([
          ['tip-strong', cell.ev[0]],
          ['tip-cmd', cell.ev[1]],
        ]));
        led.append(c);
      }
      rvBody.append(led);
    }

    if (b.review.record) {
      const rec = el('div', 'bd-pending-line', b.review.record);
      rec.style.paddingTop = '10px';
      rvBody.append(rec);
    }
    xSet(rvX, true);
  }
  paintReview();

  /* ------------------------------------------------------------------ *
   *  8 · offer line — the agent's single quiet question (raised to sit      *
   *      under the title area at creation time, above; see delta 5)         *
   * ------------------------------------------------------------------ */

  function paintOffer() {
    offerRow.textContent = '';
    if (b.status === 'spec' && b.kind === 'feature' && !b.patchStarted) {
      const r = el('div', 'offer-row');
      r.append(el('span', 'offer-text', 'Want me to create the patch for this?'));
      const go = btn('btn btn-primary', 'create patch', () => {
        go.disabled = true;
        BuildsAPI.createPatch(b);
      });
      r.append(go);
      offerRow.append(r);
      return;
    }
    if (b.status === 'awaiting-approval') {
      if (!b.approvedAt) {
        const r = el('div', 'offer-row');
        r.append(el('span', 'offer-text',
          'the impact is above — approve to accept the contract'));
        const ap = btn('btn btn-primary', 'approve', () => {
          ap.disabled = true;
          BuildsAPI.approve(b);
        });
        r.append(ap);
        offerRow.append(r);
      } else {
        /* deliberate two-step: the approval seals into a recorded line and
           deploy appears as its OWN row below — never under the cursor that
           just clicked approve — and stays quiet for 400ms after it lands */
        const rec = el('div', 'offer-row');
        const note = el('span', 'offer-note', 'approved · ' + b.approvedAt);
        note.tabIndex = 0;
        Tip.bind(note, evidence([
          ['tip-cmd', 'novakai approve --build ' + b.id],
          ['tip-ok', '→ recorded .novakai/approvals/' + b.id + '.json'],
        ]));
        rec.append(el('span', 'offer-text', 'approved — the contract is recorded'), note);
        const drow = el('div', 'offer-row');
        drow.append(el('span', 'offer-text', 'deploy when ready'));
        const dp = btn('btn btn-primary', 'deploy', () => {
          dp.disabled = true;
          BuildsAPI.deploy(b);
        });
        dp.disabled = true;                      /* no double-fire from the
                                                    approve click */
        setTimeout(() => { dp.disabled = false; }, 400);
        drow.append(dp);
        offerRow.append(rec, drow);
      }
    }
  }
  paintOffer();

  /* ------------------------------------------------------------------ *
   *  review spotlight — while the build awaits review, every section    *
   *  except REVIEW eases to reduced contrast; the attestation card is   *
   *  the only fully-lit element. hover/click on a dimmed section lifts  *
   *  its dim instantly; after attest/defer the page eases back to full. *
   * ------------------------------------------------------------------ */

  function setSpotlight(on) {
    col.classList.toggle('review-focus', on);
    for (const child of col.children) {
      const keep = child === rvSec || child === railCells.review;
      if (on && !keep) {
        /* entry animations hold a filled opacity — clear them (now, or the
           moment they finish) so the CSS dim can apply */
        for (const a of child.getAnimations()) {
          if (a.playState === 'finished') a.cancel();
          else a.addEventListener('finish', () => a.cancel(), { once: true });
        }
      }
      child.classList.toggle('spot-dim', on && !keep);
      if (!on) child.classList.remove('spot-lit');
    }
  }
  function spotChild(e) {
    if (!col.classList.contains('review-focus')) return null;
    let n = e.target;
    while (n && n.parentElement !== col) n = n.parentElement;
    return (n && n.classList && n.classList.contains('spot-dim')) ? n : null;
  }
  col.addEventListener('mouseover', (e) => {
    const t = spotChild(e);
    if (t) t.classList.add('spot-lit');
  });
  col.addEventListener('mouseout', (e) => {
    const t = spotChild(e);
    if (t && !(e.relatedTarget && t.contains(e.relatedTarget))) t.classList.remove('spot-lit');
  });
  setSpotlight(b.status === 'awaiting-review');

  /* trust-link triangulation: hovering a criterion softly highlights its
     nodes in the impact slice and its test row in the seal's proof layer —
     one fact, three places, visibly the same object */
  function setLinked(testId, on) {
    if (!testId) return;
    col.querySelectorAll('[data-test="' + testId + '"]')
      .forEach((n) => n.classList.toggle('linked', on));
    const c = b.spec.find((x) => x.testId === testId);
    for (const id of (c && c.nodes) || []) {
      col.querySelectorAll('.ct-slice [data-node="' + id + '"]')
        .forEach((g) => g.classList.toggle('linked', on));
    }
  }
  col.addEventListener('mouseover', (e) => {
    const t = e.target.closest('[data-test]');
    if (t) setLinked(t.dataset.test, true);
  });
  col.addEventListener('mouseout', (e) => {
    const t = e.target.closest('[data-test]');
    if (t) setLinked(t.dataset.test, false);
  });

  /* ------------------------------------------------------------------ *
   *  live updates — state changed elsewhere; this view re-renders       *
   * ------------------------------------------------------------------ */

  unsubs.push(Bus.on('build:' + b.id, (ev) => {
    const kind = ev && ev.kind;
    if (kind === 'activity') {
      activateActivity();
      appendActivityRows(true);
    } else if (kind === 'trust') {
      paintTrustRows(ev.key);
      for (const tr of TRUST_ROWS) paintTrustProof(tr.key);
      maybeSeal(true);
    } else if (kind === 'spec') {
      const i = ev.i;
      const c = b.spec[i];
      const dot = specDots[i];
      if (dot && c) {
        /* criteria settle teal in a 600ms crossfade — no flash */
        dot.classList.toggle('green', c.state === 'proven');
        dot.classList.toggle('red', c.state === 'failing');
      }
      paintTrustProof('run');
      paintTrustProof('passed');
      paintTrustRows();
      /* keep the plain summary line honest */
      if (b.sealed) {
        specNote.textContent = b.spec.every((x) => x.state === 'proven')
          ? b.spec.length + ' of ' + b.spec.length + ' proven'
          : b.spec.length + ' check' + (b.spec.length === 1 ? '' : 's') +
            ' committed · failing (expected)';
      }
    } else if (kind === 'sealed') {
      paintSpec();
      paintTrustProof('run');
      paintTrustProof('passed');
      paintTrustRows();
    } else if (kind === 'contract') {
      buildContract(true);
    } else if (kind === 'status') {
      paintHeader();
      paintOffer();
      paintTrustRows();
      setSpotlight(b.status === 'awaiting-review');
      if (b.kind === 'change') paintReview();
    } else if (kind === 'review') {
      paintReview();
    }
    paintRail();
  }));
  paintRail();

  function mounted() {
    const sections = [...col.children];
    staggerIn(sections, { dy: 12, dur: D.ENTER, step: D.STAGGER });
    /* the entry stagger fills opacity — once it settles, re-assert the
       spotlight so an already-awaiting-review doc dims correctly */
    setTimeout(() => setSpotlight(b.status === 'awaiting-review'),
      sections.length * D.STAGGER + D.ENTER + 100);
    appendActivityRows(false);
    if (b.activity.length) feed.scrollTop = feed.scrollHeight;
    /* a build that arrives all-green and unsealed earns its ceremony now,
       after the entry stagger has quieted */
    if (!sealScheduled && !b._sealDone) {
      sealScheduled = true;
      setTimeout(() => maybeSeal(true), 700);
    }
  }

  function cleanup() {
    for (const u of unsubs) u();
    for (const c of escCloses) c();
  }

  return { el: root, mounted, cleanup };
}

/* ============================================================================
   §M · boot
   ========================================================================== */

function startPreseededScripts() {
  /* builds that arrived already all-green sealed long before this session —
     their seal frame renders static; the ceremony is never replayed */
  for (const b of DATA.builds) {
    if (b.trust.run && b.trust.passed && b.trust.trusted) b._sealDone = true;
  }
  /* the one genuinely running build completes for real, ~25s after open */
  for (const b of DATA.builds) {
    if (b.sched && !b._schedStarted) {
      b._schedStarted = true;
      runSched(b, b.sched);
    }
  }
}

Rail.build();
Router.register('canvas', CanvasPage);
Router.register('prototypes', ProtoPage);
Router.register('builds', BuildsPage);
startPreseededScripts();
Router.apply();

/* the wordmark's 2px dot settles to --proven once the gate's verify pulse
   completes on load — the smallest always-on trust signal */
setTimeout(() => {
  const d = $('#wordmark-dot');
  if (d) d.classList.add('verified');
}, REDUCED_MOTION ? 0 : 3200);

</script>
</body>
</html>
